body:
  text: 詩詠詩乃心聲有觸即發此風人之旨也凡世間嬉笑唾罵與夫飲食宴樂皆足以陶寫性靈琢磨新句而況名勝莊嚴有如武林靈隱者乎鷲峰小朵載二猿以西來慧理大師懸一瓢於東土冷泉亭下泉響淙淙桂子月中天香冉冉仰殿閣之宏制不信人間禮金像之慈容儼然天上其他一石一樹一鳥一花今今古古往往來來接引多端暢滌人意興至詩隨沉吟良久有意無意固已得之不即不離其有會矣為誌詩詠十二五言古三生石謝靈運四城有頓躓三世無極已浮歡昧眼前沉憂貫終始壯齡緩前期頹年迫暮齒揮霍夢幻頃飄忽風雷起良緣殆未謝時逝不可俟驚擬靈鷲山尚想祗洹軌絕溜飛庭前高林映窗裏禪室棲空觀講宇析妙理與從姪杭州刺史良遊天竺寺唐以前靈鷲稱南天竺有論在首卷李白掛席淩蓬丘觀濤憩樟樓三山動逸興五馬同遨遊天竺森在眼松風颯驚秋覽雲測變化弄水窮清幽疊嶂隔瑤海當軒瀉歸流詩成傲雲月佳趣滿吳州題天竺寺崔顥晨登天竺山山殿朝陽曉澗泉爭噴薄江岫相縈繞直上孤頂高平看眾峰小南州十二月地暖冰雪少青翠滿寒山藤蘿覆冬沼花龕瀑布側青壁石林杪鳴鐘集人天施飯聚猿鳥洗意歸清淨澄心悟空了始知世上人萬物一何擾北高峰蘇軾言遊高峰塔蓐食治埜裝火雲秋未衰及此初旦涼霧霏巃谷暝日出草木香嘉我同來人久便雲水鄉稍觀小舉足前路高且長古松攀龍蛇怪石坐牛羊漸聞鐘磬音飛鳥皆下翔入門空無有雲海浩茫茫唯見聾道人老病時絕糧問年笑不答但指空藜牀心知不復來欲歸更傍徨贈別留疋布今歲天早霜靈隱寺林逋山堂氣相合旦暮日秋陰松門韻虛籟靜若鳴瑤琴舉目羣狀動傾耳百慮沉按部既優遊此時振衣襟泓澄冷泉色寫我清曠心飄颻白猿聲答我雅正吟經臺復丹井捫蘿嘗徧臨鶴蓋青霞映玉趾蒼苔侵温顏照喬木真性訝幽禽所以仁惠政及物一何深灑翰嶙峋壁近駕栴檀林回瞻窣堵峰天半千萬尋靈隱寺梅詢詢知仁和有靈隱寺詩十首勒石冷泉亭上今存七首千峰凌紫煙中有𣑽王闕靈盻樹幽棲塵心自超越松篁發春靄桂實墜秋月爭得謝人世茲焉老華髮右本寺古竇鳴幽泉蒼崖結虛宇六月期客遊披襟苦徂暑開窗弄清淺吹鬢疑風雨不見白使君煙蘿為誰語右冷泉亭竺慧指此峰飛來自靈鷲猿鳥曾未知煙嵐尚依舊興亡謾千古天地豈關紐秪恐丹壑移他年卻西走右飛來峰鶴髮山中人流水鑿幽石如凭青玉案分遞白雲液泠泠濺鼎俎琴瑟穿瑤席醉坐三伏中煩襟自消釋右曲水亭矯矯淵下龍潛神在靈府雲興雖有時泥沙可長處陰崖寒氣腥峭壁灼痕古何當救旱暵奮起為霖雨右龍泓洞巨石如芙蕖天然匪彫飾䃲礴峰頂邊嬋娟秋江側涉川試誰探作礪當自惜坐與榮華同正心未嘗易右蓮華石古澗飛白雲寂歷不知處風激石上泉僧疑月中樹微茫認松雪髣髴橫樵路悵望增爾思蒼蒼奈煙霧右呼猿洞靈隱寺遵式乾坤持中樞動運非物圖鬱鬱彼靈鷲飄飄如飛鳧層空累怪石古木生石膚仁虎終安棲白猿時號呼錢源注蛟室謝月揚天衢曩喆多遺塵清風來四隅白猿峰人死𤠔亦亡碧峰空崔嵬六龍馭圓景巨壑流紅埃今亦看誠古後還思悲哀茲山俯南澗水潔影如頹春篠生嫩筠秋蘭變枯荄方新林下寺吟此心悠哉飛來峰慧洪意行忽出門欲留聊執杖雲間飛來峰巋然眉睫上氣勢欲翔舞秀色無千嶂萬物皆我造何從有來往大千等毫末今古歸俯仰心知目所見皆即是幻妾如窺鏡中容容豈他人相頗怪胡阿師乃作去來想此意果是非一笑聲輙放但復臨冷泉舉手弄清漲飛來峰陳剛中寒峰插天出玲瓏萬菡萏微風起松際怪石勢搖撼上有百尺松幽花綴紅糝野猿忽躍出滴下露千點回首冷泉亭天鏡光瀲瀲平生山水癖如人嗜昌歜對此一壺酒玉色翻醉臉路逢老祝髮絳袍金光閃茲山信自佳恨為緇塵染置之且復醉天竺鼓紞紞冷泉亭白珽靈山本清淨一泉渟其中靈山孤飛來此水將無同山影厭不盡照見天玲瓏分明千尺冰不獨疑寒蟲京洛多風塵到此一洗空炎寒無二心凛有操者風留然守空梵萬劫豈終窮驪山有温泉虛築華清宮翠微亭張履信朝朝鳥北去夜夜鳥南歸所謀在一食所息在一枝人生竟何得與鳥同此機身世與思慮泉石良自怡月上飛來峰更誰登翠微同項可立宿靈隱寺黃溍薄遊厭人境振策窮幽躅理公所開鑿遺蹟在巖麓秋杪霜葉丹石面寒泉綠仰窺條上猿攀蘿共相逐物情一何適人事有覊束卻過猊峰迴遙望松林曲前山夜來雨溼雲漲巖谷縹緲辨朱甍禪房帶修竹故人丹丘彥抱被能投宿名篇聊一咏異書欣共讀蹉跎未聞道黽勉尚干祿夙有邱壑期吾居幾時卜飛來峰顧璘靈峰自何來嶔𡼭峙蒼鳳羽翮不肯斂時時欲飛動海雲結輪囷㟏岈互勾控虛房綴懸蜂橫梁亘垂蝀巨靈若雕削真宰資玩弄初臨側躬入稍深復軒洞蹈危若浮槎瞰空疑覆甕霔深日影墜谷轉風馭送陰深絺衣寒躑躅芒履重班荊趺舊席剜苔記新頌歸來眠不穩一夜勞噩夢靈隱寺顧璘水泛趣已綿山行路仍窕迤𨓦經層巒花宮冠林杪峭壁概微霄下映樓觀小崖傾樹孤撐亭遠泉重繚蕭條僧氣閒肅穆人聲悄來遊屬秋暮蕉葉青嫋嫋入徑薰名香憩澗狎幽鳥顧瞻桃源深捐佩苦不早寄言都城子來者一何少誅茅倘吾遂庶離寰中擾飛來峰蘇濬吾聞靈鷲峰乃在渤海濱天然不雕琢抱朴全其真夜半有力者負之置江津六龍無停轡徙倚若有神泠泠羣籟響粲粲百花新鬼鑿詎不工象罔已沉淪玄黃實災木翡翠豈藏身曷若摧毛羽元邱絕世塵上北高峰黃省曾半涉神已慄極振且逾眩分野照可捐山雲詎能辨藩周縣界絡江木海光見松表鼯見清崖間羽棲晏東月已吐暉西驪將隕晛創觀世可遺薄迎情猶眷翠微搆翳隱初春沃葱蒨飱霞哂彼晚遯谷矜我先物軌諒有齊意適無所羨逍遙茲永言抒心布明彥靈鷲看紅葉期沈無回不至同吳伯霖鄒孟陽方回嚴印持聞子將飲冷泉亭同邵古菴江邦申分韻得山字李流芳故人紅葉下頻期來此山經旬始載酒惆悵不同攀邂逅愜心賞歡焉開容顏寒嚴愛晚氣移席臨溪灣泉光照酒白木葉上衣斑況接隱者論暫令人意間冷泉紅樹圖二十日西湖領略猶未了一朝別子歸使我意悄悄當我欲別時千山秋已老更得少日留霜深變林抄子常為我言靈隱楓葉好千紅與萬紫亂插向晴昊爛然列錦繡森然建旂旐一生未得見何異說食飽至今追昔遊懊殺歸來早豈意今復爾萬事有魔嬈相牽可奈何是身如籠鳥歸來千日餘昨日試閒眺澗邊小紅樹向人亦嫋嫋轉憶故人遊西湖攬懷抱開緘讀素書因風為子道萬曆癸丑季秋與丹陽周仲純來遊韜光靜坐三七日而去書二詩紀勝遊云高攀龍偶來山中坐兀兀二旬餘心中澹無事宛若生民初流泉當几席眾山立庭除高樹依巖秀修竹夾路疏所至得心賞終日欣欣如流光易蹉跎此日良不虛寄言養性者速駕深山居其二落日在平野悵然懷千秋緬彼臨安區當年棲王侯樓臺何鬱鬱冠蓋紛相酬一朝世事盡百代成荒丘徒存指點迹令人心傷憂何如蓬廬士偃息巖壑幽詩書共朝夕花木遞春秋觴酌洽朋好卧起親鳬鷗豈不念世故中心自有求生有無窮娛既沒名長流和高忠憲公韜光菴二首沈捷大匡結伴巖上宿夢魂恬有餘曉起更清曠再逢開關初振策登危峰緩步如堦除嶔崎六七人高下密復疏三休竹樹間共笑畫不如廓然至其頂仰面親太虛歷覽不欲去欲息難久居開帙遇前輩慄然悲九秋先生不朽人腐鼠嗤公侯矢志踵其韻高言誰能酬今日復何日社屋齊蒿邱異代嗟興亡何如身世憂乾坤一漆室俯仰白日幽綰彼二三子登眺延窮愁我師佛圖澄狎虎如狎鷗何必去五嶽目前縱所求當年三七日鴻名千載留重登韜光步韻七言律山中雪後溜春泉竹筧清冷高下眠日上海門懸玉斗山臨江岸漾清蓮琳宮已占大千界仙宅應標尺五天莫笑老人詩思怯近來筋力減于前九日同諸友登飛來峰查繼佐伊璜扶笻峰頂快登高千里湖山一望遙黛色敲開靈鷲石波光飛到浙江潮圖攅翠壑看三竺錦醉青楓見六橋狂嘯直舒天地外滄洲共訂老漁樵七言古丁隱君歌陸龜蒙華陽道士南遊歸手中半捲青蘿衣自言逋客持贈我乃是錢塘丁翰之連江大抵多奇岫獨話君家最孤秀盤燒天竺春筍肥琴倚洞庭秋石瘦草堂暗引龍泓溜老樹根株若蹲獸霜濃果熟未容收往往兒童雜猿狖去歲猖狂有黃㓂官軍駭散無人鬥滿城奔迸翰之間祗把枯松塞圭竇前度相逢止賣文一錢不值虛云云今來利作採樵客可以抛身麋鹿羣丁隱君丁隱君昻頭且莫變名氏即日便尋丁隱君和李杞題靈隱寺蘇軾君不見錢塘湖錢王壯觀今已無屋堆黃金斗量珠運盡不勞折簡呼四方宦遊散其拏宮闕留與人間娛盛衰哀樂兩須臾何用多憂心鬱紆溪山處處皆可廬最後靈隱飛來孤喬松百丈蒼髯鬚優優下笑柳與蒲高堂會食羅千夫撞鐘擊鼓喧朝晡凝香方丈眠𣰽毺絕勝絮被縫海圖清風時來驚睡餘遂起羲皇傲几籧歸時棲鴉正早逋孤煙落日不可逋冷泉亭送唐林夫蘇軾靈隱前三竺後兩澗春淙一靈鷲不知水從何處來跳波赴壑如奔雷無情有意兩莫測肯向冷泉亭下相縈迴我在錢塘六百日山中暫來不暖席今君欲就靈隱居葛衣草履隨僧蔬肯與冷泉作主一百日不用二十四考書中書靈隱寺恭行己靈山鑿開山骨路慈雲側把黃金布峰擎小朵凝華煙井暗葛洪煉丹處洞猿抱子隨人呼竹龍弄珠愁水枯列剎相望五天近梵僧往還無時無埽石雲堆命分坐展眼三生容易過李源別棹上瞿塘牧竪唱歌天人和西風昨夜吹早秋千年辛苦驚白頭耆婆樹下客歸去茶瓢打翻方自由虛白亭見心復洞然一室生虛白包括須彌百千億卧遊恍訝玻璃宮幻出諸天帝青色常作清靜觀廓達含太空水晶寒映座上月玉氣晴射窗間虹神光圓照徹中外萬物朗融無隔礙空明一色鏡涵天觸目如居焰摩界我光此室依靈光閻浮大樹多陰涼門開冷泉境路入無何鄉道人不起那伽定夜明簾捲當銀潢扶過毘耶城超出摩竭方身本無來亦無住那用三萬二千獅子牀了知有相皆非實明暗色空誰辨的莫教童子窺習禪誤作水光投瓦礫掃除聖解并凡情純清絕點泯見精忽驚兜率夢覺海天曉紅輪輾破琉璃青北高峰洪鍾策杖直上北高顛俯視萬象皆茫然螺攢翠擁互起伏芙蓉朵朵相爭妍江流東去自今古山勢飛來如鳳舞湖光十里傍城開畫船日日聞簫鼓簫鼓聲和發浩歌人生志節當如何功成身退有明訓乞歸便向山之阿山中風景真堪樂朋徒詩酒常相約香山洛社有遺芳誰謂今人不如昨𡵺嶁山房皇甫涍虎林勝擅飛來峰谿梁亘度名廻龍蒼松迎風鼓琴瑟巧石向日開芙蓉中隱仙人鍊鉛蕊虛調槖籥分金水週行神火退陰魔幻出神珠細如米赫奕光騰五色霓服之壽與天皇齊驅雷逐電護丹鼎竊取應防后羿妻我是青城鶴背客洗頭猶怪南溟窄攀翻靈鷲挹少微暖煙蒸發山花赤彷彿身遊何有鄉萬竿修竹披雲房劈芝饌玉奏鶯簧瓦爐將爇柏鈴香蟠桃酒瀉癭瓢滿醉卧山中歲月長贈靈隱晦山大師歌柯維楨翰周我昨登匡阜秀絕不可名香爐五老得髣髴屏風九疊煙嵐橫宗雷慧遠近已久東林精舍誰尋盟攬師匡廬咏奇偉洵可驚奔騰飛瀑數千仞矯矯筆力雄相爭前聞黃鶴曾題句蟻視禰衡鸚鵡賦崔顥當年浪得名卻笑青蓮投筆去武林湖山最明秀西域飛來有靈鷲禪席東南說五山祖庭法乳親承授去年持缽來嘉禾余方鼓柁湘江