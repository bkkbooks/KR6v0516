期銀燭消殘唄金蓮冒小池山將情共寂莫謂有文移韜光錢受益連雨催遊興登臨及小晴嵐開羣樹出湍響眾山鳴江水雲間起湖光竹外平卧橋虹屢飲踏石虎前迎納子渾如舊神仙若可成扶攜行碧落憩息坐青屏更上奇難盡盤旋趣轉并悵然天欲雨啜茗說長生遺事孫宇台之誌靈隱也有山林碎錄一卷其言曰高僧之迹名賢之概既詳之矣而遺言逸事亦何可廢耶宇台之好賢樂善舉前人之一言一動不敢遺漏用心良苦矣為誌遺事第十三飛來峰下龍泓洞側或云有洞通浙東蕭山徹浙江下有採石乳者入洞不已聞波浪篙櫓之聲懼而返新城縣有靈隱洞在新安鄉高十丈濶五丈深莫測中有澗水四時不竭昔有人遊洞中逾三日不出忽見坐洞前石上問之曰入洞深處逢神人叱之不覺身出至此月中桂子見唐天寶年間宋天聖丁卯秋七月八月十五兩夜皆雨桂子已詳慈雲詩序又張君房為錢唐令夜宿月輪山寺僧報曰桂子下塔遽起望之紛如煙霧回旋成穗散墜如牽牛子黃白相間咀之無味則桂子之落往往有之本草圖經註云江東諸處多于衢路拾得桂子也今北高峰後名月桂以此也邵山子曰唐九里松今將千歲大者五六人抱虬枝偃蹇龍幹攫拿有一根雙幹挺然者有苓窠蒼翠鬱茂者有樛枝下垂可手按者奇形怪狀為海內異觀數年之間所存略盡已絕無極大可入畫者此山後桐村塢土穀祠有松六株甚奇古好事者欲觀九里舊松于此地訪之可也下竺古名天竺其地其景蓋皆靈隱也如李太白崔顥之詩皆可入誌而以天竺限之李詩有桂子落秋月崔詩有青翠滿山藤蘿覆沼之句非靈隱而何或謂宋時以南山演福寺為南天竺以北山靈峰寺為北天竺以西方為尊而三竺同謂之西天竺似三竺與靈隱無與不知上竺創于石晉中竺開于唐時而下竺則與靈隱同建于慧理故凡古人之稱天竺者當與靈隱同稱也天目山有二水一條東流經於潛臨安百五十里至餘杭為苕溪又東三十里抱錢唐又東北流六十里過湖州入太湖一條西趨於潛為紫溪合桐廬之水滙於錢唐此郭璞所謂天目兩乳也南山如龍北山如鳳此郭璞所謂龍飛鳳舞也海門一日兩潮日輪正從鼈子門上此郭璞所謂金星也其塊土為帝王都會璞留讖記蓋預知五百年潮打西興然後為帝王都會也夫自郭璞以前南北皆為武林山嗣後始有龍飛鳳舞之目然南山有鳳凰山是南山亦可曰鳳而北山有橋曰迴龍有洞曰龍泓是北山亦可曰龍也宋僧祖秀所撰華陽宮艮嶽記曰因土積為岡陵山骨暴露峰稜如削飄然有雲姿鶴態者名飛來峰也才人文士之品題飛來峰者多矣未若雲姿鶴態四字為能得其神也楊應詔先生記飛來峰曰側見諸洞窟玲瓏余穿崖隙入恍石乳垂垂其上石青紫有光每窟穴處雲滃滃然起至此不覺神怡氣釋此可謂得其狀者矣葛稚川隱於飛來峰故有稚川亭畔而唐時又有葛道人隱居於飛來峰仙去故唐人有詩云二葛已仙去是飛來峰有二葛也道濟化後有人遇於六和塔寄嵩少林書有空屋退還主人衣鉢任人將去僧之神通莫可端倪未有如濟顛也贊寧博聞多識雖張茂先不能遠過徐常侍鉉仕江南日嘗襆被入直澄心堂至飛虹橋馬輒不進裂鞍斷轡箠之流血掣韁卻立鉉遺書贊寧贊寧答曰下必有海馬骨水火俱不能毁惟漚以腐糟隨毁者是也鉉斸之去土丈餘果得巨獸骨上脛可長五尺膝而下長三尺髀骨若段柱然積薪焚三日不動以腐糟漚之遂爛焉徐諤嘗得畫牛一幅晝嚙草欄外夜則歸卧欄中持以獻後主煜煜獻之宋太宗以示諸臣無能辨其理贊寧曰南倭海水或滅灘磧微露倭人抬方諸蚌腊中有餘淚和色著物則晝隱夜見沃焦山或風燒飄擊有石落海岸滴水碧色染物則晝見夜隱此二形殆二物所畫也錢王有鐵幢三一在舊便門東南小巷一在舊薦橋門外一在利津橋蓋其時塘未成也慮潮蕩幢用鐵輪護其趾而以鐵綆貫幢幹且引綆維於上下之楗然後實土築塘蓋其難也然不如六和塔成而潮可平塘可就也為之者僧都統贊寧禪師延壽也皆靈隱知識也錢王以强弩五百人射潮而使之平欲以就塘也然不如炬菩薩咒龍而使之聽法也又不如曇超之能致吳行人之以形見也甚矣靈隱僧之多奇也三竺靈隱屢有高僧然不如靈隱為盛也即以著書而言之如所謂宗鏡錄證宗論三教編十地歌輔教編定祖論正宗記鐔津集高僧傳內典集靈苑集林道集蒲室集倦遊集奏對錄皆斌斌可觀也甚矣靈隱僧之多奇也禪家之于詩偈頌之餘也而靈隱僧之以詩名者自清晝而外不能悉數即如延壽夜坐詩曰孤猿叫落中巖月野客吟殘半夜燈即詩人亦當遜步契嵩與章安唱和詩皆清新不媿古人至惠遠奏對九重鐵牛咸傑皆有遺句若見心守仁以能詩著名又不必言矣如無文景隆皆深透宗旨而詩都雅可觀豁公為三峰嫡孫其佛法舉世共推而詩名早已著海內有破堂諸詩尤膾炙人口可貴哉靈隱僧之能詩也歐公集古最富其靈隱最勝幢寶大二年歲次乙酉未之見也五代史謂錢氏有改元而無稱帝之事然獨得其封落星石制書稱寶正六年辛卯耳不知其先朱梁篡唐之明年為戊辰改元天寶臨安府尊勝幢云時天寶四年歲次辛未此一證也歐陽見其一而不知其猶有二也要以錢氏當朱梁李唐有用正朔不用正朔之時至漢晉周則無不奉正朔者矣若清泰廣福開運會同乾祐顯德諸石刻皆可見廬山記云謝靈運見遠公而異之以北本涅槃經繙為南本三十七卷則臺在廬山而茲山更見豈後人希謝氏之高蹤而託名耶邵古菴曰不然也廬山之所謂繙經者繙譯也此所謂翻經者翻閱也義各不同至正壬辰月中娑羅子隨雨而落仁如松子與張君房慈雲懺主所見桂子又異是月中有桂又有娑羅也齎神尼舍利至靈鷲者隋時慧誕法師也誕當時有名講席高流也所發石函與舍利函不差尺寸又何奇也神尼名智仙相傳為神尼舍利塔然當年塔舍利非塔神尼也按釋迦舍利珠八斛四斗其三之一住人間阿育王置塔八萬四千東震旦得塔十九其粒不可得計也康僧會懸佛七日得七粒曇榮懇之自三粒至三百粒隋文帝遇阿羅漢授舍利一裹與法師曇遷數之數多數少莫能定乃七寶函致雍岐等州州各一塔則靈鷲亦其一也安得謂為神尼耶邵古菴曰七寶廂或尼督造有名而訛至今亦未可知雖然他州不言神尼而此獨言神尼則又安知其不為神尼而塔也天醫波利多乃天醫菩提化身淳熙間居飛來峰天台臨海婁氏子年十五厭俗來參師問云何來對曰從緣來師曰是何性對曰是佛性師曰子身尚俗安識佛性對曰我身雖俗因俗符真真俗圓融洞然無二利多異之乃與落髮受戒名善戒世稱戒闍黎後住兠率院按戒闍黎與炬菩薩皆古佛下生而為靈隱散聖也南齊時嵩山寶公向林慮白鹿山行忽聞鐘聲見一寺題曰靈隱寶入寺法堂坐閴焉無人仰視屋上開孔如井徐有僧從孔飛下次第至六十眾坐已各問今日何處齋或言豫章成都嶺南冀北五天竺動千萬里最後一僧至眾問何遲答曰相州彼岸寺鑒禪師講法有一僧難問蜂起聽之不覺日已暮寶起曰鑒師是我和尚遂失寺與僧乃獨坐柞木上出山問大統法尚尚曰此廢寺佛圖澄造賢聖居之至今往往聞鐘聲夫林慮之與武林遠矣乃佛圖澄之址而寶公恍惚所見寺題靈隱抑所不解稽留峰下許玖許現墓在焉玖許遠子以遠死節拜婺州司馬現遠他子貞元中復官之皆葬于此許為鹽官人吳說書九里松高宗欲易己書命筆數十幅歎曰無以易說所書未幾吳授信州守陛辭高宗因語之曰九里松是卿書乎朕嘗書此終不如卿吳益遜謝即令復揭之勅賜填金說吳師禮子王安石之外孫也光堯鑿大池於宮內引水注之疊石為山象飛來峰名其堂曰冷泉孝宗嘗賦詩曰山中秀色何佳哉一峰獨立名飛來參差翠麓儼如畫石骨蒼潤神所開忽聞倣像來宮囿指顧已驚成列岫規模絕似靈隱前面勢恍疑天竺後孰云人力非自然千巖萬壑藏雲煙上有崢嶸倚空之翠壁下有潺湲潄玉之飛泉一堂虛敞臨清沼密蔭交加森羽葆山頭草木四時春閱盡歲寒長不老聖心仁智情優閒宮中天地非人間蓬萊方丈渺空濶豈若坐對三神山日長雅趣超塵俗散步逍遙快心目山光水色無盡時長將挹向杯中淥光堯覽之欣然淳熙十一年六月初一日車駕過宮至冷泉堂早膳訖太上宣諭云今歲與常年熱甚上起答云伏中正要如此太上云今日且留在此納涼到晚去或三省有緊切文字不妨就幄次進呈上領聖旨遂同至飛來峰看放水簾時荷花盛開太上指池水云此種五花同幹近伯圭自湖州進來前此未見也堂前假山修竹古松不見日色並無暑氣後苑小厮三十人打息氣唱道情太上云此是張掄所撰鼓子詞後苑進沆瀣漿雪浸白酒上起奏曰此物恐不宜多喫太上曰不妨反覺爽快上曰畢竟傷脾太上首肯因閒說宣和周公公每遇三伏多在碧玉壺及風泉館萬松庄等處納涼此處涼甚每次侍宴雖極暑中亦著衲襖兒也命小內侍宣張婉容至清心堂撫琴并令棋童下棊及令內侍投壺賭賽利物雜劇官家進水晶提壺連索兒可盛白酒二斗白玉雙蓮盃柈碾玉香脫兒一套六個大金盆一面盛七寶水戲并宣押趙喜等教舞水族又進太皇后白玉香珀扇柄四把龍涎香珠佩帶五十副真珠香囊等物直至一月初還內宋吳郡王益憲聖太后之弟一日竹冠練衣芒鞋笻杖攜一童縱行靈竺濯足冷泉盤石之上遊人望之儼若神仙邏者奏聞次日德壽以小詩召之曰趁此一軒風月好橘香酒熟待君來王亟往光堯迎笑曰昨日冷泉之遊樂乎王頓首謝光堯曰朕宮中亦有此景卿欲見之否蓋疊石引泉象飛來香林之勝架堂其上曰冷泉而亭中揭一畫乃圖王野服濯足之狀且御製一贊云富貴不驕戚畹稱賢掃除膏粱放曠林泉滄浪濯足風度瀟然國之元舅人中神仙盡醉而罷因舉圖以賜之瞎堂嘗侍孝宗幸飛來峰上曰既是飛來如何不飛去對曰一動不如一靜至上竺上曰觀音亦持數珠念誰對曰仍念觀音上曰何也對曰求人不如求己嘉定中進士錢唐范師孟遊靈隱忽覩五福祠後石松奇古賦詩曰根盤巨石四時青陌上香泥豈敢侵不但詠誇奇異迹也須珍重歲寒心既歸未久隱几間忽見二吏控馬來師孟隨至冷泉亭下馬登山至絕頂大殿六人環坐皆起迎獨未坐者款師孟至一堂曰聚星謂師孟曰適見佳篇欽公達者故託素懷余婺原人慕錢唐名都靈隱古剎高峰冠絕故擇居焉然昆季素性公直福善禍淫奉天之道而世人妄意謂福可邀是速罪戾耳且奉西竺教久無他嗜幸君白之人間勉為善而已矣賽余何益師孟既受教請曰聞神昆弟五今六何也神曰是能賦疏影橫斜句處士也陰間尤重文學故與為好耳乃命竹輿送歸隱約由六橋舁人失腳而覺猶曲肱几上焉高峰祈夢從此始唐時有李源者京洛人父憕死安祿山之難源悲憤不仕不娶居惠林寺三十年與僧圓澤友善相約遊蜀蛾眉山源欲自荊州沂峽澤欲取長安斜谷路源不可曰吾已絕世事豈可復道京師哉澤默然久之曰行止固不由人遂自荊州路舟次南浦見婦人錦襠負瓮而汲圓澤曰此吾託身之所也源驚問之澤曰婦人姓王氏吾當為之子孕三歲矣吾不來故不得乳今既見無可逃者公當以符咒助我速生三日浴兒時公臨視公以笑為信後十三年中秋月夜當與公相見於杭州天竺源悲悔為具沐浴易服至暮澤亡而婦乳三日往視之兒見源果笑源遂不果入蜀反居惠林後十三年自洛適杭州赴其約聞葛洪亭畔有牧童菱髻騎牛歌竹枝隔水呼源覿之乃圓澤也歌曰三生石上舊精魂賞月吟風不用論慚愧情人遠相訪此身雖異性常存源問澤公健否答曰李公真信士俗緣未盡慎勿相近願勤修之又歌曰身前身後事渺茫欲話因緣恐斷腸吳越山川尋已徧卻回煙棹上瞿塘遂拂袖入煙霞而去三生石在下竺總屬靈鷲此真古逸事也世言風僧葉守益于冷泉亭譏秦檜死後見所親者云寄語夫人東窗事發東窗事蓋王夫人謀殺岳侯非世所知也鬼神之事亦可畏哉守益相傳地藏菩薩化身隱跡靈隱者至今羅漢殿有塑像存焉雷院部神有主壇總化九天雲路急捉大將徐天君嘗從一白犬楊璉真伽發陵肆惡人莫敢問又欲毁雷院夜夢有白犬噬之不可解大懼懺禱其惡少戢則雷院之為威神大也履泰將軍姓孫名顯忠錢唐人仕吳越宋嘉熙中趙與懽尹京禱雨應奏聞勅封護國天澤侯廟在金沙灘萬曆時某年旱太守張振之虔禱未應憂悴成疾忽神降乩具示禱雨所嚮曰吾助若雨若新吾廟且推張長者而自敘隱約數百言張異之適詢邑祠廟既得遂如所指請禱公車未入郭門而甘霖隨澍僧子捷建北高峰浮圖有一花犬隨工徒銜運磚瓦既而工徒于荒莽間斸得石佛而耳相不全惜之犬忽掘土深三尺許得一石耳合之竟是塔成乃斃宋僧遠瞎堂所畜猿頗知人意因衣之號黑猿行者每侍側終日瞎堂化時閉門人莫能見惟猿行者執辭世偈侍於側自理公呼猿有呼猿洞知一畜猿有白猿峰瞎堂又有黑猿行者靈隱之猿何其奇也妙峰和尚住靈隱嘗有四鬼移之而出梁楷畫四鬼夜移圖中峰為之跋曰昔南泉謂王老師修行無力被鬼神覷破殊不知鬼神不著便白日被王老師熱瞞相傳妙峰和尚住靈隱時為四鬼所肩而出當時賴遇妙峰若是王老師未免又作修行無力會也一種是謾神嚇鬼顯異惑眾今又被人描模將來不知面皮厚多少宋孝宗宣召惠遠惠遠有詩記曰缽盂走馬向天庭謾踏天街馬不驚回首飛來峰上望白雲包盡帝都春五代時靈隱行人道忠布施一錢不私但日求麪供寺眾每會必盛麪食人往赴齋皆曰今日赴道忠蒸雪會去也靈隱寺大松樹圍數丈正與月波亭相對史彌遠伐取之僧元肇號淮海有詩云大夫去作棟梁材無復清陰覆綠苔惆悵月波亭上望夜深惟有鶴飛來嘉靖時海寇之亂督府胡公嚴造海舟凡故家邱墓大木皆不能免獨下令曰靈隱九里松唐時古蹟不許擅伐故得保全舊時有僧補種賦詩曰不為栽松待茯苓只圖山色四時青老僧終不將歸去留與錢唐作畫屏明海寇亂督府取寺鐘僧苦不能守僧真祥以詩上獻云百八鯨音吼地鳴篁溪檀越鑄還成曾聞兵器為農器豈忍慈聲作惡聲一統大明何及此千年常住敢云爭山僧最苦多遺譴遊宦從今失送迎此鐘賴以得存山中有寺基久圮勢家欲規為葬地者僧亦有詩云一帶空山已有年不須惆悵起頹磚道旁多少麒麟塚轉眼無人掛紙錢勢家卒不敢取形家謂北高峰為真武展旗形洪武初右武一時勲臣武職多營墓于此則鐵舌菴遠瞎堂之塔以祭臺得存猶為幸也胡尚書世寧嘗卜瑞光址後即遷去可謂君子矣無何沈長史又遷葬焉於乎唐宋以來其宗師遺塔堙沒于勢家宦族者亦豈可勝道哉明天啟時有縉紳欲規取蓮華峰其時豁堂大師猶為祇園僧也以死爭之曰昔癡絕禪師不畏天子吾獨畏貴人哉易菴通于萬曆辛卯重建靈隱與羅公處約為月菴禪師撰碑年同相去六百一載為辛卯者十一而復得辛卯既竣工治地得斷碑原建寺僧亦號易菴斯亦奇也今斷碑亦未之見而前之易菴不知何代何年上虞令朱袞至靈隱寺寺僧乞書飛來峰命筆將書來字問公等欲人來乎米來乎僧曰有人此有米因以三人字書之今存有飛來峰七言律詩絕勝覺場是葛洪書而龔憲使冕以絕字不宜改最勝覺場按楞伽佛地名最勝僧號最勝子梵語瞿曇此云地最勝易絕為最亦無不可但宗鏡錄言絕是妙之異名此絕非是斷絕以無盡為義其義更勝耳許遠遊以下葛洪杜治皆道士也嗣後杜京產陳紫芝之流間一見焉然亦微矣武林秦麒號見峰特建棲真院于飛來峰下延盧真空鍊師修鍊焉見峰孫心卿先生高尚之士有文集行世僧如璧者本名饒德操有文名撫州士人與曾布論不合便落髮為僧廣冷泉記是其筆也又有贈勤上人詩余嘗論賈㠀之改佛由于韓公之奬許德操之為僧本于曾布之不合以出世法論之是韓為美疢而曾為藥石也恭行己與趙子昻同時其思母詩曰霜殞蘆花淚溼衣白頭無復倚柴扉去年五月黃梅雨曾典袈裟糴米歸可謂有陳尊宿之風矣慈雲懺主正色不阿時好有一貴客註楞嚴經求師印可先命熾烈焰謂曰今申三問答如契理當為流通如其不然請付此內乃問曰真精妙元性淨明心如何註釋三四四三宛轉十二流變三疊一十百千為是何義二十五聖所證圓通既云實無優劣文殊何以獨取觀音其人罔措師即火之以此處不知而作者殊為快也高僧茶毘獲舍利者靈隱為多至若契嵩舌眼頂骨童真念珠火真不燼謂之五種不壊惠遠舌不化故名鐵舌斯又不止舍利也洪有竹名瀾字子長弱冠卜築青蓮山居在蓮華峰之陰年四十卒詩才清俊頗有可觀其山居數首其一曰嘒嘒蟬急翻翻過鳥飛晚涼風動竹久坐露沾衣招隱期忘世投禪願息機山童沽酒去未遣掩柴扉夫靈隱固隱者之所棲也而隱者又難其人以李元昭之棄官結廬虎菴譏其立行非真洪瀾又以隱德未竟死甚矣隱者之難其人也魯半閒諱安字端明宋肅簡公裔也弘治間年八旬諭諸子曰吾處世甚達今將絕俗以娛餘年但不知死何如生世人引棺營葬皆身後事目一瞑誰見知者吾欲歷歷預觀之於是擇日具儀同發引狀鼓吹導之令五子縗絰斬然己乘白騾隨其後遂隱靈鷲山身若隔世時有所需緘封附騾耳遣之歸載物聿來都無失候閱十有三祀一夕端坐以逝騾是夕亦化去嗟乎此可謂有楊王孫之達矣其時有胡元洲者善飲作達自署酒泉郡太守祔葬于其父長史墓側墓在上竺路嘗有山中詩曰老鶴一聲天欲墮山人自枕寒流卧起來北斗正當胸山鬼攝伏我獨坐其卒遺命其子喪車出郭門凡山水佳處必三奠亦曠達士耶他處祀伽藍不過五位而靈隱兼靈鷲故有十伽藍焉蓋靈鷲寺廢而伽藍不廢故知靈鷲之統于靈隱也伽藍十數有龍王居其一焉此大小龍泓洞得名之祖也且以知靈隱之有關于江潮也靈隱向有本山土地而無本寺土地以配本山土地伽藍之位既畢特設本寺土地以配本山土地是為十二神雲間有許介甫者許譽卿先生之子博聞絕俗性愛靈隱山水一日寢病于家見有旟旐繽紛則言神迎其為靈隱本寺土地也遂以是卒東坡云契嵩常嗔人未常見其笑辨才常喜人未嘗見其怒予親見二人皆趺化乃知二師以嗔喜作佛事也東坡送人游浙東云靈隱寺高峰一上五里有僧不下三十餘年矣不知今猶在否雜紀嘗觀古聖賢作經著傳必有體裁其法大概有三單提雙開雜紀是也單提所以立體雙開所以顯用中有未暢者乃拉雜以言之謂之雜紀今志靈隱寺上來若開山若重興若山水若梵宇若尊像若楗槌若古塔若古蹟若勝概若傳持若檀越若文藻若詩咏若遺事一一分列又終之以雜紀者或有遺漏且不必另列者皆綴于此庶使華藏海中不失一花帝珠網內不落一珠也為誌雜紀第十四題名韜光石元豐二年己未二月十二日壬戌資政殿大學士太子少師南陽郡公趙抃閱道謁韜光菴主佐光留題又蘇軾楊傑王瑜元祐五年二月二十同遊韜光靈鷲寺後小石塔楊繪元素魯有開元翰陳舜俞令舉蘇軾子瞻同遊熙寧七年九月二十日靈山翠微亭址紹興十二年清涼居士韓世忠因過靈隱登覽形勝得舊基建新亭榜名翠微以為遊息之地待好事者三月日立男彥直書龍泓洞內陳思退來蘇子容頌熙寧年蘇浩然楊景略胡宗師范峋黃頌彭汝礪王祖道林希逸元年七月十二遊靈隱洞錫山安國七遊于此龍泓洞外蘇頌子容蔣之奇穎叔李杞堅甫傳法僧慧日禪師延珊熙寧年二月二日刊又太子太保嚴起青林洞外有詩一片巫山十二峰飛來何年不飛去明進士唐鵬又別小洞詩吟屐一雙千里洞天萬億幾年蒼龍偃蹇鱗豁紅日掩映光寒白玉坐來欲化天風吹出行仙臨海張瑞青林洞口嘉靖壬辰夏初伏癖竹居薛東泓來遊于此竹鄰與子希元至理公巖洞口正德庚辰正月六日按察于鏊張淮劉大謨刑部方豪遊正德十五年人日庶吉士江暉進士陳直載酒來訪方豪于飛來洞因遊天竺嘉靖丙辰五兀山人張庭有詩二首鏡裏湖光畫裏山竹西茅屋有無間泉聲不斷雲霞爛仙子騎羊自往還一生落落好清狂過眼煙雲木掛陽試上北高峰頂上與君攜手看扶桑理公巖洞內不有地仙福不到此洞中飛山子臨安錢德範莆陽僧貽孫同遊皇祐二年六月一日癸卯重午與王伯虎來二弟遫逌偕行沈遼題石景衡叔平杜僎叔陽同遊直翁翼道林夫吉甫同遊乙卯閩山王元晉耕雲陳詩坐憩于此嘉靖二年金臺邵盛紀飛來峰頂朱裳公為方岳裘褐不備故題亦質惟示姓名伏犀泉上連道善鵬舉張文蔚同遊建炎三年閏八月二十五日石衖李公謹唐卿楊泊損之慶歷六年七月十二日來又題漫漶止存七年二月清明日也八字虞用晦元豐二年七月二十二日靈山塔側陳古平甫同德甫遊翻經臺石上淳祐丁未立秋二日天台李艮夏紹基武夷翁孟寅金華何子舉嘉禾葉隆禮宛陵吳琪來喜雨至正六年秋九月朔太史楊瑀翰林張翥謁福初上人因登蓮華峰留名崖石同遊者施維才郯韶泰定五年春二月吳郡王連莫維賢葉森陸友同遊下天竺後石壁吳棫周之翰史范雲程敦厚紹興壬戌同校藝題額絕勝覺場晉葛洪書佛國山門唐鍾權書冷泉亭唐白居易書上二字宋蘇軾補書下一字今為明雲間董其昌書法安堂唐白居易書覺皇殿宋理宗皇帝書妙莊嚴域宋理宗皇帝書直指堂宋張即之書面壁軒明四明陳理書輪藏殿明董其昌書選佛場婁東王時敏書是佛國三韓佟有年書飛來峰明上虞令朱袞書三韓佟彭年又書慧日塔院射州宋曹書慧日高懸在新建塔院光祿大夫周方蘇題永鎮靈山王時敏書正法眼藏王時敏書最勝覺場錫山龔勉書九里松宋吳說書理公巖唐尚書令楊遵篆已下在石龍泓洞元江淮釋教都總統所經歷郭口書玉乳洞金光洞射旭洞俱明方豪書天削芙蓉在理公巖不知何人書古存物上堂槌明教嵩禪師上堂白槌遺物照佛鑑寶達遺蹟後鑑空遇僧囊中取一鑑曰要知貴賤修短佛法興替以此鑑焉亦曰照佛鑑印沙牀亦寶達遺蹟直指堂印宋孝宗賜靈隱銅鑄范公牀在靈隱方丈乃良用貞所造良乃范公孫也希文蒞杭郡時所遺乙酉春戒顯至靈隱猶見此榻相傳人有卧在上者醒即身在地下想神物呵護也龍文拜石有龍鱗隱見石中長八尺濶六尺秦檜齋僧鍋秦檜因風僧激勵心懷恐怖發心齋僧此為遺物現在雲厨靈隱著述金光明懺儀淨土懺法慈雲撰宗鏡錄智覺撰證宗論三教編十地歌俱清覺撰輔教編定祖論正宗記鐔津集俱契嵩撰高僧傳內典集贊寧撰弘宗說弘禮撰正訛說弘禮撰禪門鍛鍊說十三篇現果錄佛法本草俱戒顯撰已上皆內篇天竺別集正觀集靈苑集採道集遵式撰蒲室集笑隱撰夢觀集守仁撰奏對錄慧遠撰奏對錄德光撰蒲菴集澹游集來復撰外學集贊寧撰鷲峰集戒顯撰已下皆外篇前賢撰文遺失者附存篇名陸羽靈隱寺碑記梁簡文石像記冷泉亭碑寶大二年李淑重修靈隱寺記薛志靈隱山資聖院記本寺二十四房今缺一東廡東庫司房瞎堂禪師舊庫房也西廡蒙堂房僧堂房妙應閣向在伽藍殿基上五松房正濟房祗園房清隱房幻東房幻西房石佛菴普覺房普東房上東房上西房西南房西北房西緒房澗西房涵澤房韜光房雙桂房本山物產西栗樹係慧理祖西天攜來種實小而味美惟靈隱有數十本移他處則不生大樹堂一株最大乃慧祖手植西晉時物也至今鬱茂重榮檜在金光明懺堂後隋朝所植高數丈大十圍後為兵火所燎至大中祥符間復茂石面靈桃在翻經臺側生于石面結果甚大而甘宋政和間取植上苑無根藤往往被牆砌無根自茂紅辛夷花似杜鵑躑躅花俗稱紅石蕎樂天有靈隱寺紅辛夷戲光上人詩天親竹出武林山西雙竹院皆雙枝對抽并胤又名扶桑竹言如海上扶桑兩兩相比也石面竹鷲山多有之藥王樹在靈隱山門外大三圍乃香樟也有僧過之曰此藥王樹可治心病由是遠近椎剝其皮未幾死數年復生人復來取寺不禁尋復枯每久雨其空皆出黑色煙方竹出飛來峰今在澗西房曲竹出靈山一名唐公竹又名鶴膝竹節曲突如鶴膝狀枇杷寺大殿下有枇杷樹花實異于他所龍龍泓洞本龍所藏靈隱寺伽藍祀龍龍子北高峰澗中有如蜥蜴長二寸黑色腹有紅點四足五爪花犬即僧子捷含磚砌浮屠者靈隱重興紀異具德大和尚以佛法蔭覆天下若象王獅子超軼前後靈隱一席地千百年來奇異獨萃有非偶然者蓋和尚固絕不言而事在耳目者亦不得而閟也今紀數端于左方知天人之拱護于大法王者夫固有以耳仁和孫治識葉子緯如錢唐人嘗夢靈隱金銀宮闕白玉階塗法幢寶相逈異恒觀已見和尚曰此其是矣今從己丑至甲辰卻計十六年變榛莽萑蕪為莊嚴華藏錢唐第二名山稱第一伽藍其形見于夢兆固然哉金子靖思新安人下帷靈隱夢寺中鼓吹迎大慧禪師至及見和尚陞座說法儼然大慧禪師也夫宋以來佛法之盛未有如大慧者其罏韝犀利與今和尚無異故衲子咸以和尚為大慧後身也宋時明教大師契嵩者耿介絕俗不假聲色東坡稱五公之一以嗔為佛事者也和尚未至靈隱也有數輩僧夢契嵩囑迎和尚其僧不知契嵩為何如人後乃訪耆宿知為明教大師也夫契嵩生則著書明宗死留舍利其欲和尚之住持靈隱預先幽贊固有以也和尚庚寅冬始事土木時吳興沈長者以病寓居其間締造之夕見神人金甲而幘者以百數晃晃在梲柱間時沈卧病牀有帷帳戶有簾幙而沈徹視于外纎悉無遺焉未幾沈病亦愈錢唐邑侯慕公諱天顏其初蒞任勤恤民隱未暇遊觀而先夢至靈隱拜琉璃佛惟中一尊光明洞徹無際餘金身者無數或半或全皆不能徹視也後見和尚即恍狀所拜琉璃佛光明洞徹無際者侯在錢唐七年多惠澤以此敬事和尚佛教益興焉和尚在佛日也靈隱敦請不已一日四禪寂靜至夜半咸聞伽藍殿閧肰細聆之則靈隱伽藍與佛日伽藍相爭不已也人或謂和尚神之遠至者不可以莫之慰也後和尚克住靈隱人言靈隱伽藍為有靈也大殿既災僧至桐君之深處名瑣細龍者得大木數千章然不能以出山也大殿建期有日矣庚子夏水大發千章之木數百年不能出者一旦湧于峰巒之上乘流而下辛卯得以告成非佛力不至此古所謂浮梓柱于洪濤飛梅梁于遠道者於此益將建缺一石柱杭城居士名屠成鳳夜夢峩冠五人來募其祖遺劉家園內石柱問何用答曰助建靈隱大殿問菩薩何神答曰吾等北高峰五聖也居士夢覺到寺訪之果缺一石柱立即捨到今西南殿角一柱是也西山多虎患和尚既至虎猶一至殿墀之下今十餘年絕跡矣宋均為守虎渡河大扇禪師號伏虎於和尚尤足徵也三輔黃圖謂漢造未央如巧匠胡寬不少靈隱建置多出于和尚之規畫其前後布置皆若天成和尚尤有先識如移置大鍋則掘下果見舊基大殿未災則先令僧遍書水星其靈奇天縱有不自知其然而然非更僕所能悉數也己丑僧解制閒步冷泉亭有白猿立於棧上如聽泉者皎月當空毫髮畢見約長五尺辛卯冬眾集青蓮閣下疑閣上有人聲即而求之見有黑猿荷笠而走移時乃去此黑白二猿皆見也夫理公時洞有黑白二猿呼之即出其後有智一飯猿臺遠瞎堂時有猿侍者甚矣猿之於靈隱多奇也夫今日之猿未必即理公時之猿然而黑白皆見不可謂非理公之猿也天將興此蘭若物應運焉其理與數皆如是理公之至靈隱咸和三年歲在戊子吳越王之重興靈隱也在寶正以後其戊子己丑之間耶今和尚之住此實以己丑固知數有相符也羅公處約之建碑也以淳化辛卯而范公楷之跋碑也以紹定庚寅明張公瀚之為僧通立碑也以萬曆戊子古今廢置不一而興建者卒在此數年之間噫亦奇矣具老和尚丙午冬應徑山請未一年往揚州為法嗣巨渤和尚封塔纔到七日無疾坐脫靈隱與徑山爭往迎龕一路風逆自靈隱人登船忽發順風一夜遂至北關眾歎神助戊申年因徑山爭龕閧閙不决正月廿五日集滿漢護法同兩山禪眾公議拈鬮定奪固山大高及之居士預先申誓三番禱祝竟鬮在靈隱由此息爭真身永供慧日塔院爪髮塔在五峰開山嶺之陽昔世尊不舍穿針之福賢于特標插草之功要知善固緣生須識根從信入先師具老人生魔强際值法弱時苟非克己踐形說尺行丈人溺己溺人饑己饑又安能鞭撻域中之象龍奔馳海外之麟鳳哉是以及門皆命世之鴻儒入室多過量之淛子而能成褫兩脈檄號五宗振興十一座祖庭恒侍五千員衲子擁檀波浮山岳流梓柱塞洪濤俾橫目者格非心令慳惜者傾囊橐此雜華所以云信為道元功德母也至于建摩霄干漢之殿閣懸星接斗之堂樓盲啟聾聰頑廉懦立雖機用開百代昏昧而輪奐屬千秋勝緣古云非常之人能建非常之業非常之業必待非常之人非常者豈常人之所能為也吾于先師亦云奕山小師濟萃謹識山地常住供眾僧田宋時最多數不可考迄明宣德年間尚存山田一百九十餘頃至順治初田土悉歸烏有先師入院時止存案山殿基自法席崇敷德風廣被感發檀信助施并方丈香資續置山地詳載永充樵採接納雲流須知尺地寸金匪易得也後之尸席者慎毋忽諸爰先舊存次檀施次續置列後舊存具老和尚于順治六年二月十三日入院眾房公共交出率字號山地數案山一百三十畝坐山十五畝三分大殿天王殿基地二十一畝一分五釐一毫法堂洎東西兩禪堂基地六畝七分六釐五毫直指堂洎兩軒基地三畝六分八釐三毫冷泉亭松路地三畝六分八釐三毫計共一百八十畝五分八釐二毫檀施具老和尚入院後檀施山地數率字號山七十畝羌字號山四十八畝毁字號山八百畝零七分垂字號山一百二十畝養字號山二百零三畝三分率字號地二畝八分五釐毁字號地十畝三分九釐七毫調字號地一畝四分六釐六毫計共一千二百五十六畝七分一釐三毫續置具老和尚入院後續置山地數附蕩率字號山一百六十六畝九分二釐養字號山五百八十九畝六分九釐垂字號山一百三十五畝𦍑字號山二十四畝毁字號山四十六畝率字號地一百二十畝零九分四釐王字號地八畝五分王字號蕩二畝五分六釐九毫外體字號地十畝四分八釐五毫率字號地三分六釐三毫率字號蕩一畝二分六釐一毫計共一千一百零五畝七分二釐八毫本寺禪堂濟上戶每年完正額條銀三十二兩五錢八分七釐三毫每年完實徵糧米一十七石六斗五升五合每年完漕截銀四兩六錢三分九釐四毫
