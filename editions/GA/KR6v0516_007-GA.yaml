body:
  text: 碑文重建靈隱寺碑文王益朋鶴山大理寺卿靈隱名山之勝自來作者之所詳余可得而略之也惟具德大和尚住止茲山自己丑至癸卯歲星一周又加三焉始置藏殿而終直指堂其始也不為其後者計也其後也非為其前者補也而星羅碁置左翼右舒亦若有神靈以扶建之也昔王屮作頭陀之碑徐陵有孝義之紀皆名播千載芳垂不朽余以何人敢不為之綴筆於後哉本北高峰九十五丈十分其高以為殿之高殿數楹三分其高加尋焉以為之修墀有砌焉室有阿焉從唐殿製也殿之上有法堂不及殿之高五分之一而與殿等躡蹬而上加于山也殿之東為東戒堂殿之西為西戒堂法堂之東為東禪堂法堂之西為西禪堂古無戒堂而有戒堂古無禪堂而有禪堂棲禪者眾戒為禪本可不東西列與其上為直指堂其廣十餘笏其修倍尋也直指堂之左有面壁軒直指堂之右有青猊軒焉所取之面壁者取於壁也青猊者取於石也面壁軒之下為東禪堂東禪堂之東為慧日軒下為玉樹林左則浴室與諸寮在焉浴樓之東為雙桂室雙桂者無文塔也不欲沒之也玉樹林下為金光明殿金光明者宋時懺儀也蘸筆池在其下茶與竈列焉取其池之便也其下大悲殿殿之前為聯燈閣聯燈者為二僧人悟而建也聯燈閣之前為華嚴閣閣之右為伽藍殿伽藍殿與西之祖堂相對也華嚴閣之前為梵香閣又其前為青蓮閣青蓮始之華嚴其後建也而梵音聯燈錯峙焉猶天有閣道也云爾其前為響水樓響水者壑雷聲也其後為齋堂為客堂為香積廚所為繼藏殿而建者也青猊軒以下西禪堂下為羅漢殿所為供五百應真者也殿之下為祖堂王者之制左宗廟而右社稷浮屠之制左伽藍而右祖堂也堂之下擇木堂擇木者遊僧所棲也意南而南意北而北無所棲焉不可也其下為公所以靈隱之勝而貴客勝遊可無稅駕歟然不置於東而置於西又絕遠於戒與禪也不使學人見可欲也又其下為萬竹樓隱者之所寓目也東有響水以聽泉西有藂竹以攬勝也觀止也而天王殿以是成焉天王殿者以奉天王及彌勒焉古之絕勝覺場晉以來有此稱也戊戌大殿災而辛丑與天王殿同告成焉此天意也於是建鐘樓於殿東助龍首焉其在古為百尺彌勒閣也建閣不如建樓也視其高加於殿若尋而高於殿齊也乃建直指堂終焉直指堂和尚丈室不欲以己加於殿不欲以己加於眾室何為其不後之也雖然和尚之建置若此其若有意者耶其若無意者耶而若軒焉若輊焉若仰焉若俛焉若兩曜之界天若眾星之環極焉斯真奇也然則錢塘三百六十寺未有先此者也是安可不為之記也靈隱寺重興碑文嚴沆靈隱山水西山佳絕即漢志武林山水也武林以此得名而武林人不之知也絕迹高遁者得以棲託而處故上古有稽留之號不獨今矣東晉咸和理公創興歷代皆有高僧居之其載於僧錄者可考而知也但宋元以來皆有朝旨補授而其後惟以僧房輪直末流之弊殆有不可言者具德和尚紹三峰之絕傳接黃檗之逸響所至之處無不成林自廣孝天寧顯寧佛日數大剎無不改觀而於靈隱建置尤所謂神輸而鬼授也於呼自非和尚道法之盛其能以有此哉念先清卿與賢大夫十數人為勝遊之會憩此聽禪而先君子與兩世父偕長蘅李先生子將聞先生每於春淙壑雷之下流連愛玩有終焉之志此余夙昔所謂寤寐難忘者也今以乞假之暇際光天之運覩金碧於靈宮粲雲霞於鹿苑其又安能已於懷耶和尚命余撰碑傳於後顧陸羽之記不傳羅公之文僅存又焉用余蕪文以貽誚於山靈耶因綴以大略而係之以銘曰巃崇靈宮包絡峰崿扶神靈兮高甍蜚宇昭灼宏敞纚雲庭兮含華疊萼蔥翠紫蔚夭卓詭兮胡蔽而虧出入日月靡終始兮天興華藏綿邈宗傳亡垠堮兮莫高匪山莫峻匪泉長舄奕兮重建靈隱寺碑文孫治宇台粵自周星雨地帝釋肇止於天冠漢夢徵祥洛陽創基於白馬自此銀城映沼猋布諸華金鐸響風聿開來載若乃赤烏之歲僧會始軔吳地過江以來支郎響振義林則東南之弘化而吳越之始基也咸和初祀理公實來早棲息於西山疑蜚形於鷲嶺由是人天共證比迦葉於經臺緇紫雲歸掩鳩摩於祇苑疏館山椒映四園而交翠彪流澗雨並八水而停紅鷲在山而若舞猿就洞而歸來轉金策於閻浮化城不遠息害馬於忍土淨界非遙功自此而彌天法由茲而振地覺場標榜人稱句漏之仙上苑勒銘世重簡文之記漂流六代沿及五朝長廊鳳翼知自貞觀以來蜚塔雲浮實始大中之代而錢氏御土之日值聖僧宣化之年寶幢聳列落仙梵於雲根穹塔淩層響和鈴於天外炎宋聿興景德標號寶軸千裝天章雲鳳之筆良田萬頃濯龍脂粉之錢迨至南宋駐蹕翠華屢幸交蘆迴天子之鑾光明有高僧之迹金印來於天上直指安禪璇題復於人間空王炳日於焉薰風璚露五花相繼於莊嚴碧月珠星雙樹依然於常住不圖至大之歲禍發丹丘莫甚至正之年銷沉銅馬自此而降興衰匪一雖中天開運而寶地淹淪山疑虎窟久虛開士之塵地似龍樓未遇高流之響九里翔風不見蒼虬之舞三山望月空聞落桂之聲雖曇瓚竭蹶於宣德之年僧通庀材於穆皇之代不足以復石室之禪那煥龍宮於耆窟也時序遷移宗風消歇不有大覺孰證迷津茲惟具德大和尚者臨濟之嫡乳黃檗之肖孫權實雙融有無互徹祛守默之癡禪埽尋文之狂慧以故名園香剎爭奉銖衣秀水靈峰競承組鉢歲在赤奮二月和尚頓駕靈山翦蓬蒿藜藿之居成寶筏銀沙之所蒲團夜梵闢第一之玄機麈尾高揮廣不二之法旨有萬沙彌盡遊青石三千蒲塞競共蜚花而戊戌劫火大殿告災天將除舊以更新人用布金而填陌隕三災之火標日月於天宮違四大之風界琉璃於地道於時薝林屬玉自蹇嵼於青鳶梵住浮檀遂巍峩於香象雲楣膠葛峰接陽烏綺井璚熿林生陰兔萬栱千楹迴合斗杓之氣虹梁螭桷平臨滄海之潮然則東安參禪之窟無此名區江右選佛之場遜茲寶界信有徵者不其然乎於戲人以地傳地緣人顯靈隱山川之奇和尚道法之勝同符千載迥絕恒蹊庶幾頓超十地寄無言於有言悟彼三空歸有法於無法者歟是為銘銘曰法從東度山自西遷聖僧至此憩彼林泉三寺並列精廬巋然嶽形雕鷲石秀青蓮金繩界道寶鐸淩煙名賢似續綿矣千年重瞻大覺濟水真傳天開給舍人度寶田影涵瑤圃光照金盤丹霞結宇紫極開軒林間花繞鉢內龍旋天衣荏苒帝馬翩躚霜鐘夜湛海日高懸淨名第一慈照大千流水在澗明河自天棧有伏虎洞有仙猿明明宗旨其永無刊重興景德靈隱禪寺碑文王吉明瑞五嘗聞佛之化身徧滿三千大千世界似非人世之土木金碧所得而莊嚴者雖然諸佛往矣黃金布地之祗園七寶嚴飾之樓閣疇其覯之則舍人世之土木金碧以為莊嚴無從因像見佛然則莊嚴法界莊嚴化身等無有別佛之所以長留於天地古今之內而徧現於智愚心目之間非像教不為功自教外別傳直指人心見性成佛洵無上妙義而後之弔奇者視宗教若徑庭然若夫提宗攝教借教詮宗和合無間足為法門淵海者則具老和尚為不可幾及也和尚受三峰老人付囑爐冶精嚴見於把茆之日蹵踏奮迅顯於方剛之年道風洋溢所至主法席諸方雲集堂戶為滿語稱福慧兼修者非歟順治己丑浙紳士延錫靈隱靈隱自晉創建迄今千有餘年其間廢興不可殫述比以棟宇毀圮法相剝落周環藩壁頹𡙇赤白之飾盡成䵝昧觀者有魯靈光之歎和尚毅然以修建為任或疑其為有為功德者不知真性妙空並無一物者謂之清淨法身其一切莊嚴萬行者謂之圓滿報身隨機設教善利無窮者謂之千百億化身使塵剎佛身有一不現光明則千百億數中便生缺陷此缺陷者誰為補之而又誰為泯之甚非細故也靈隱為浙名剎四方瞻禮如織茍以生敬者生哀則接引善信何藉且夫無所為而為善者曾幾人哉大都因生於感感則動不感未有能動者也今使入剎而見殿堂巍煥法相端嚴供設輝煌布置周帀宛然西方勝境有不作禮讚歎勃露善端者非情矣則直指人心見性成佛之機莫顯著於此詎修建小果云爾哉維時議修建者僉以時絀舉贏為難和尚曰無難越山多材若等其儲以待先是衢郡巨木填委溪水涸商坐屢歲弗得下見寺中遣人至以廉直售未幾水盛長木得越堰順流而至積材山若則時節因緣可知矣於是興作大舉數年間殿堂樓閣及種種院舍次第落成完美盡致迥踰舊觀稽其工費難以數計和尚優遊處之未嘗以工作繁興暫輟兩期少疎提筞而機緣輻輳若有神輸焉者豈非千古奇特事耶昔六祖住曹溪卓錫泉湧贍足大眾東坡銘有云問從何來初無所從若有從處來則有窮和尚修建靈隱拓而大之更而新之其出無窮真不知其所從矣彼測以檀施目以福報烏足窺和尚之大哉和尚固於法界中莊嚴諸佛化身俾學人繇此證悟法身於真空無加損也故以此功德而不住相則無漏以此深心而奉塵剎則大報恩初祖有漏小果之論蓋為天監而言歟若和尚之修建非猶他方之修建也以至繁至鉅之舉而成於無思無為之中所謂莊嚴萬行究竟空無一物者乎則外彌現而內彌寂自非和尚孰能與於斯吉明皈依有素幸躬逢其盛事歡喜踊躍歎為希有謹序其修建緣起而約略紀之戊戌成法堂辛丑成前殿大殿為閣者四曰華嚴曰聯燈曰梵香曰青蓮為堂者十四曰大悲曰金光明曰五百羅漢殿曰伽藍曰祖師曰東西兩禪堂曰擇木曰南鑑曰庫堂樓曰知事樓曰齋堂樓與輪藏相雁行者為鐘樓上為總管堂其它有玉樹樓慧日軒萬竹樓直指堂面壁軒青猊軒復有念佛堂峰頂茅蓬以及柴寮園寮與古今賢聖諸塔下院二曰寶勝菴曰接雲菴其中像設器具一一稱是此皆數年內先後修置不能詳載歲月要為和尚手自擘畫諸高足暨行僧一心力以從凡所位置題顏各有意指後之覽者其致思焉爰鑱石為之記記靈隱放生記陳紹英匏菴自橫衝橋至九里松舊皆靈隱之所屬也迤𨓦並湖口曰金沙灘灘色如金山至此而增黛水至此而加碧者是湖之最勝處也錢塘鶴鳴慕侯規其地若干以大師為放生之所而即規其水若干以育魚於其中寘僧人數輩朝夕梵誦一切物命咸霑法慈嗚呼何其仁也夫佛教之凌夷久矣大師一至靈山重整蓮界變瓦礫之域為栴檀之所澗水淙淙秋林淼淼使百萬釋子咸悟無生而證宗旨而此寸土者又被於無涯鱗介之族夫靈隱冠山而此陂尾湖彌天地而亘古今皆作如是觀矣或曰昔有大豕為魯津伯德其殺之之功大師無乃多事而不知伏蟒化蛇皆依佛力卒何疑於此且牛羊犬豕怖死而求生無以異於人者又安得藉口以殺為生或曰盡西湖為放生有何不可余又以為不然夫天地之無盡也魚欲其生而漁亦不欲其死兩湖之間以漁為業者又可盡廢耶則此之為放生也大矣有量者乃所以為無量也與為室幾楹為地縱橫若干尺悉書之以示後之人靈隱鐘記孫治石門有鐘相傳以為元時所鑄也初在崇福寺寺燬鐘半沒於土者幾百年矣或以為啞鐘也或曰非然也古人有言曰一鳴五穀生再鳴五穀熟石門之鐘鐘且不鳴故畏之也大護法柯將軍諱魁陳都統諱典謨者觀於靈隱而深訝焉曰此其為佛法震旦也與石門之鐘於此焉宜雖然鐘之為大且萬鈞也移之者非若持缶挈瓶然也鐘之大且萬鈞又半淪於地相傳屢欲出之土愈掘則愈下石門人共呼為神鐘非可以力致也乃靈隱之移之也有四僧者掀而出之於地如有物負擁而出有舟焉載之若蛻然而上斯非神助不至此矣先是鐘之未至也有神入夢於人曰明日鐘至矣已而果然眾協力焉不移時人至屹然而止俄而架於上其聲遠聞易曰震驚百里其有焉眾懽然曰信哉其為震旦也鐘果於此焉宜也非大師不足以創靈隱非靈隱不足以致此鐘顏率之論周鼎也以為九九八十一萬人具而後可致今鐘縱不若周鼎度非千萬人不可何以若此之易也壬寅鐘樓成癸卯石門鐘至吾聞之器從主人斯非石門之鐘而靈隱之鐘也故遂以為靈隱鐘記重裝十八尊者記孫籀余垂髫時應童子試眾擠門忽墮被壓後至者復蹂躪其上輒死舁至黃王廟道舍醫莫能救蓋竟日矣爾時神魂飛越至一山中有老僧十餘牟尼披袈朗誦經卷掣余手足曰吾與若有緣若毋行余魂益飄揚老僧牽拉不釋手足伸縮從空中猛推遂甦越數歲至靈隱寺見水聲潺湲峰石奇峭宛如當日魂飛處始知前救我者是阿羅漢遂矢願他日倖獲功名則新其像以報但困於諸生久之未遂而此願時存也我朝鼎革來丙戌登賢書己丑成進士廷對擬元應授館選病不果遂補秋曹視學山右以讀禮歸時具德和尚大建叢林功果無量余乃進山禮佛謁和尚是日羅漢殿適駕樑若相期約者余遂捐金重裝十八尊羅漢次第告成因余遠宦未獲躬親瞻禮今丁未秋奉裁賦歸置扁額齋供始完舊願余雖眇末乃荷尊者保護以有今日豈非佛度有緣耶居官立行有不自愛尊者鑒之余因此益自勵矣爰述其事而勒石焉是為記疏修靈隱冷泉亭疏雪嶠信浙江勝地唯靈隱為最其源發于天目而冷泉一帶鑑照寺前若蒼龍驤于宵漢也煙雨峰巒映人眉目去年大風忽發洚水橫流損我若干奇秀應以此情訴于天帝償我修補如故奈何殃及兒孫耶靈隱寺大殿募緣疏陳應泰巡撫自大乘西漸宗風南衍本無一語空迦葉於經臺如是九年掩鳩摩于祇苑由是參禪法窟競譽東安選佛名揚羣推江右五宗妙諦非關句後前機三昧真源豈是聲前薦得洵足悟大意於西來演別傳于南竺者矣若臨濟具德禪師者幼皈淨業早度玄關權要雙融有無互徹祛守嘿之癡禪埽尋文之狂慧以故名蘭香剎爭奉銖衣秀水靈山競承組缽揮松法座本無羨於飛花拂麈高壇亦何期於點石維茲靈隱寺者實武林之首剎也飛岑合沓翠蔭松杉鳴澗紆迴芬流荇藻若誌公幽麓雅堪卓錫棲真惠遠清溪自愛掛瓢宴坐年來寶地淹淪法筵岑寂苔階流月空聞落桂之聲古洞沉雲久絕呼猿之響禪師策杖來遊愴焉大息誓整檀林重光蓮界蒲團夜梵開第一之玄機麈尾朝禪演不二之法旨遂使癡猿捉月立解苦輪渴鹿馳煙頓明覺路於時人天共證緇素雲歸五百沙彌盡遊青石三千蒲塞競供銀花布黃金於廣陌浮梓柱於洪濤花宮刻玉應蹇嵼于青鴛月殿浮檀自巍峩於白馬不圖禍發神丘毒流卭井龍堂何孽忽搖四大之風雁塔非魔遂隕三災之火徒逢怪鳥焚社流音不過靈禽燒林漬羽日月天宮倏成火宅琉璃地道竟若化城禪師悲願逾深慈誓彌篤竊同須達縱填陌而輸金尚比澄空必開爐而寫像金花滿面依然常住紺園珠澤縈眉自復莊嚴鷲嶺余鎮撫浙土再越春秋屢緝餘氛輒駢戮力追維塵劫益信輪迴維願法雲遐蔭自令障火潛消慧日高懸長使魔風永滅每尋歡喜之園樂對醍醐之治今禪師以法中之龍象獨運金輪以教外之鸞凰重舒玉鏡雖復設四部于無遮消三幡於有漏不足多也復何難哉惟念名山勝宇端屬高流福地蓮藏允資開士故嵩邱靈跡澄公逝而沉音天竺棲真辨師去而絕響至若方袍平叔高躐二清白眼支郎久淩兩軋龍攄鉢裏無與觀心獅伏巖前不干演法而或崎嶇掛錫委頓開林山陰殿缺遽來靈羽于飛輪沙伏塔傾誰發真珠於銘石然則地以人傳人緣地顯靈隱山水之奇禪師道法之勝以古準今洵美談已是用仰籍檀施共成福慧傅大士之雙林捨心是宅迦蘭陀之精舍聞法立成庶幾頓超十地寄無言于有言悟彼三空歸有法於無法矣靈隱禪堂募重新翻蓋大雄寶殿疏晦山靈山殿閣聳出雲霄體勢嵯峩金碧瑰麗不但東南雄鎮誠為海岳崇瞻實先師老人蓋世之奇功不朽之盛業也但以昔年輻輳因緣成功太速亦由匠工蓋法鹵莽不得真傳以致筒瓦削薄雨久而泥水侵椽柳杉太長雪壓而瓦鱗脫節苦四圍之發漏悲聖相以沾淋三十二大士之湧壁立見損傷二十四諸天之寶容漸憂圮坼佛像偕菩薩像以俱危大殿與天王殿而同病若不早圖翻蓋後此愈費經營為此特具因緣敬告十方檀護昔也初經焚蕩平地上湧出寶坊繼殫勤勞一隻手擎來佛國而今也覩前功之漸壞豈不寒心知急救之有方大家著力伏乞尊官長者大力檀那遇茲勝事慨發喜心傾湘水之家珍布祗園之金地因風吹火補漏未遲望大殿以圓成并石臺而鋪就現天宮之妙麗滿佛國之莊嚴登廣大之門庭還修廣大之福瞻奇特之殿閣更收奇特之功種大因於華藏海中定受記於靈山會上有緣到此盡請當機切莫躊躇當面錯過謹疏募化絫石增靈隱山門景致疏戒顯靈山勝境海內奇觀怪石堆青繡出崑岡之骨冷泉漾碧噴來雁蕩之湫秀絕天然豈待人工點綴花鋪錦上何妨幻景莊嚴雲間姚居士眼底煙雲胸中邱壑具南垣之妙手蜚東海之高名過浙地觀光到靈峰叫絕擬於迴龍橋之古逕冷泉亭之四周築成分外峰巒添出遊人坐磴春郊雜遝香會奔騰大啟茶亭廣施甘露俾緇素雲歸盡得停筇而憩賞輪蹄霧擁不妨晏坐以盤桓誠法窟之奇緣屬名山之韻事顧高山流水有待知音白雪陽春還期屬和但得同心解佩便裝成廬阜溪橋眾手移山立現出虎邱石座允關好事諒所樂聞靈隱募刻華嚴大經疏戒顯如來所留慧命幸有大藏琅函法寶盡當流通何況華嚴教海一乘妙典我佛滅六百年後始出龍宮無上經王西天存八十卷文重來震旦翻譯則青龍侍座講演則甘露流祥盥水滴而蟻子生天經題唱而脩羅退陣講誦與修觀古今靈異重重書寫與刊行道俗禎符赫赫得覩一文一句洵稱奇特因緣欲求共見共聞須仗流通廣遠茲者靈山會上獅子窟中既梓各種經書獨缺華嚴大部敬書緣起用告知音聞半偈而投崖端為利生心切剜千燈而求法無非念佛恩深今現有充棟之經何不公之緇素只須一舉手之力便可壽之棗梨或自施或勸人轉轉無窮而馨流帝網隨一函隨幾卷多多益善而福過河沙七處九會之靈文彈指而雲蒸霞蔚六相十玄之妙義轉盻而錦簇花攢破微塵而出大經急需好手竭海墨而書一字莫讚奇功幸慨發乎檀波共圓成夫寶藏序贈靈隱具和尚序嚴沆臨濟三十一世曰三峰藏者提三玄三要以明宗旨於佛法為中興矣而和尚其大弟子也三峰受源流於天童而勤勤然惟以宗旨示人嘗曰禪之有宗猶醫之有脈法也醫者立規矩懸權衡調陰陽別生死不可廢也曹洞之君臣臨濟之賓主亦猶是矣黃龍有言學者欺詐之弊不以如來知見之慧密而煅之何由能盡故生平以闡揚為務而其末後遺囑者惟和尚一人師乎師乎宗旨其不晦矣乎僕嘗觀古之擔荷佛法者多强力絕俗之人自南嶽馬祖以下至五代之杰出者歷歷可指也和尚初為鍛工已棄去習道家言後又讀首楞嚴而善之遂披剃受具乃參三峰於安隱有省也而和尚勿以為足也凡叢林辛苦力作之事無所不為已廼作圊頭運糞出厠負重擔上山力疲極忽於轉肩時見擔頭冉冉數下遂現大機在前自是禪鋒不可禦矣初三峰之椎鍛學者剗削險擯不遺餘力而於和尚為尤甚悟後三峰嘗召於方丈前垂百問矢口應對無所挫而三峰猶不諾也然則和尚之所以得當於三峰而回機就囑者宜何如哉僕觀之天下三春之華不如九秋之幹也雨露之澤不如霜霰之加也美疢不如藥石姑息當遜仇讎也和尚之自治治人多用强力務堅苦其大端矣和尚法席最盛所至稱千人如天寧佛日雲門顯寧諸名剎皆是也年來嘗止靈隱故稱靈隱初和尚之住靈隱也止一破堂傾欹草中十年拾礫買壤尺寸而興之諸寮廡禪堂法院以次就焉乃去夏天又火其正殿是天之所以勞其經營締搆者何無已也客有譏之者曰楊岐破屋雪滿繩床高峰龍鬚縛柴為龕而和尚無乃已甚而僕以為非也夫和尚之習勞也其所以證入者在是則其所以磨礪學者亦在是矣今必守一橛枯禪以鳴高比之抱不哭孩兒於佛法其何有焉僕嘗讀五宗救一書見和尚之偈頌自雪竇以來未之有也諸方皆嚴憚之出其下故知臨濟宗旨昭昭然若揭日月而行者昔在三峰今歸靈隱矣吾以是知和尚之佛法如馬駒踏殺天下其弘法世世萬子孫未可量矣今季夏之望為和尚六旬誕辰四方緇素麏集而吾鄉大夫先生長者之屬咸欲禮足於和尚而命僕為文序之如此贈靈隱大和尚序王嗣槐二諦雙融四禪俱淨爰棲真以照寂維晏坐而觀心溯厥流風於斯尚矣然而神含日月弘覺路以為功道藴津梁闢度城而成果三空非寂五衍斯真逖矣無邊攸歸極樂所以林開衣鉢常次第於王城水洗香花亦周流於竺國金沙銀樹高映慈眉香飯乳麋並承趺坐若其義存斷相妙在離言青松拂子句落前塵白玉麈毫影留後熖天花墜而何干怪石顛而無涉以故無邊文句曾空摩朅之林不二法門即杜毘耶之口此初祖之真傳而曹溪之嫡派也具德大和尚者知通微妙悟徹幻塵生有勝因似吐雙龍之水早能證聖如停四鶴之雲結茅茨於荒園掛盂瓢於棘路木杯渡水敢怖橫流竹杖還山已聞超岸過關棹臂更何問於趙州坐壁忘言直欲通乎南竺遂乃息心舊苑靜住鷲山環峰表剎帶水披林蘆花秋落雪照清溪柏樹春迴雲流石屋而乃籬邊薙草不懈精修山上樵蘇自安苦行夜禪朝梵偏有事於小乘貝葉曇花亦無遺於大品勅法堅修行遊精進彌天離日之辨無羨於五門赤髭白足之名不誇於三輩必依正覺端在安禪證人天而說法掃狂慧於道場離名相以悟空息機鋒於高座才逾慧淨不以破諍得平辨過深公何必逆風聞馥以故白馬逍遙之解尋味名流瓦官籌算之談冥符妙旨許玄度之清標並為都講何平叔之高韻更見方袍雖復偶來演法如遊華氏城中要其常住樂安獨卧雪山林下者也恭逢盛代弘闡宗風蘭臺石室編無字之真文香剎名藍奉雕檀之法像西關紫氣疑迦葉之重來東郡流星卜仙人之再聚然而辨灰轉石馴虎咒龍之法侶雖遍於諮詢生樹開蓮伏獅集烏之上人即勤於延訪直泝五宗之苗裔必尋六祖之根源一振傳燈端惟臨濟和尚菩提法樹已摘摩珠般若香臺早懸明鏡幢垂纓絡表離垢於前輪樹結栴檀散空香於後乘常住靈山維新舊剎龍樓四起重看畫地布金象塔七層還見從空砌玉豎拂升壇憑空掉舌攜笻上坐驀地開拳千門萬戶薦一句於生前九部三車斷多言於真際遂令沙彌五百繞青石而承眉蒲塞三千擁白蓮而禮足嗣槐夙沐休風樂觀芳旨清陰梧苑遙看缽影蜚來瀟灑花宮竊聽麈塵紛落愧謝石之才鋒秀逸敘漁父于王家慚殷源之名理擅場列崤關於相邸思暢玄機共開善𧼈和尚玄亭坐論別室宣音眉間珠火似開七滿之神光掌上車渠如現八平之瑞采既明真而遺器亦得意而忘筌嗟乎法蘭羅什競渡金沙迦葉圖澄來踰葱嶺洎乎荊州演法韶郡傳衣慧鏡常懸智燈四照楊花柏子拈來便見真如暮磬晨雞道罷更無所住昔日浮山九帶自啟遙源今茲臨濟三玄並開大地無非選佛之場真是參玄之窟不圖大乘特著中朝雖惠遠之名被流沙令然香而東拜道林之詞傾祗苑稱標勝於北來以今方之未能過也是以仰瞻法席慧日重光側聽高壇慈航弘度遂使黃山石磴爭來啣果之烏紫澗松枝自下沖霄之鶴晦山和尚詩文全集序徐增昔崔趙公問徑山國一禪師曰弟子出得家否師曰出家乃大丈夫事非將相所能為夫世所謂大丈夫者皆舉將相為言將則統帥百萬之眾為國家戡禍亂號令如山生殺自主相則位居一人之下百寮仰其鼻息天下安危皆在掌握是皆千萬人中之一人盡世間男子未有不羨之畏之欲一為之而不可得者也徑山之答崔趙公則是大丈夫又在將相之外此豈凡情所能窺測者哉吾雖病廢將相之人嘗得見之大善知識亦嘗得見之其所作為截然不類大善知識仗將相護法則有之將相見善知識必口稱弟子稽首方丈大善知識若是乎其尊且貴也據是而言則徑山乃與將相相較量矣烏足稱為國一大師哉自古迄今為將為相者靡不自以為大丈夫即崔趙公豈不以大丈夫自命而獨於出家遲疑不斷只此一問便非大丈夫夫大丈夫者貴乎嶄然一念行止由我崔趙公爵位功勛亦嘗試之其味既已知之欲出家即出家豈不毅然大丈夫哉且唐皇帝以萬乘之尊有志道法延請國一禪師於禁廷崔趙公斯時有志即求剃染其誰曰不然如何不作大丈夫事嗟乎時不再來機不可失乃至千載而下被吾晦山和尚一人作去吾見今之出家者何止萬萬其始也或因患難或由貧困或以怨憤種種不如意事或出父母之命然豈無自己發心童真悟道者而要無如晦山和尚之出家仁義兼至節孝善全光明俊偉超俗㧞倫者也和尚俗姓王諱瀚字元達吳之婁東人與吳祭酒梅村先生生同邑年相若又同學才名不相下屢試高等前輩張受先先生重之稱為公輔器午未之間梅村聯捷廷對擢鼎甲而和尚之名益著和尚幼時遂有志學佛以尊君闇修先生在堂好道力貧且年高和尚恐傷老人意因浮沉於諸生中從遊者最盛四方多饋遺以康養兩尊人歡笑終其天年祿養者愧不及甲申春季賊犯京師思宗崩凶問至江南和尚大慟即捲詩書及平日所為制舉義擔負至文廟拜告先師焚之并以青衿置明倫堂嗟乎和尚之秀才於此日終出家於此日始矣大丈夫之行事果高出於將相百倍也於是諸山聞之爭願為之披薙會三昧老人移舟來即往華山出家至受具畢乃參具德和尚於顯寧不數年盡得其法印具和尚初住靈隱即欲遜獅子位與居和尚即著草鞋走廬山未二年雲居膺祖古道場來請不得已應之歷十年是時禪風漸衰和尚以臨濟七事鉗鎚衲子號為毒辣入室者甚眾皆天下之英俊化行江楚數千里和尚開闢之功何其偉也於是彼處道場若寒溪若薦福若安國若護國若四祖若疏山一一坐遍法語之外有鍛鍊衲子說十三篇為尊宿重江右李太虛先生嘗見和尚亟稱曰和尚多生來不知如何修持法道乃得至此吾儕科第不啻糞壤願以餘生為法弟子少種來生福慧其為縉紳先生敬信又若此丁未具和尚應徑山請乃遣侍者走三千里迎和尚補處靈隱已踰五載於茲矣以靈隱誌未就屬余修葺復出其所撰詩文集五十卷屬為序余讀之而竊有慨也古來詩文宗匠竭一生之力未能至此和尚二十年來住持與千五百人俱法語將等尺而文集又裒然如是其大天下不朽事都被和尚一人占盡獨不為吾輩留餘地耶吾嘗從事於詩矣詩本性情復有一定之法則三百篇而降漢魏古詩樂府無不造極歌行近體盛唐為最中晚漸澆宋元來不可言矣近世詩文狃於習見略不師古小山峛崺不知五岳為何物而況須彌山王細流差池不知百川為何物而況薩婆若海余嚮評選元氣集周櫟園先生謂余曰世安得有如是幾十人詩供君論定近余好遊名山往往於方外遇之雖然亦有才情學力氣魄光燄廣大赫奕如吾和尚者乎嘗評和尚匡廬詩不從眼中看來亦不從筆端寫出和尚胸頭自有一座匡廬山在橫揮直灑蒼氣充溢廬山有盡筆墨無窮和尚其可以止乎其他所作數十倍於廬山人患才少公患才多錦心繡口鬱成卍字之輪毫相珠光悉本浩然之氣和尚所為古文抑又難言之也古文之盡美盡善莫如左國其法變化不測其次莫如史記前漢書史記崢嶸漢書整密唐推昌黎柳州宋稱六一東坡然東坡之一筆直掃而欲如昌黎多方出奇不可得矣六一之清流縈折而欲如長沙一氣渾成其又可得耶元明以來多出摹倣窠臼餖飣紛肰疊見有博學者束於典故前賢所未及者則不敢言寡學者溺於流俗前賢所已道者又不能省貿貿焉無不以壇坫自雄輒為高論亦知墻外籬間有曉事者從而竊聽之以𠷣其後乎生前以勢位流通末後與眼光消殞比比然也和尚為諸生時既多讀百家書又透向上一著故信手成文處處臻至如岱宗出雲層層動蕩滄溟浴日轉物光華然未能盡其形容也和尚平日好誦華嚴大經直在萬花樓上建瓴出水一滴成大法雨一四天下無不周遍銀面阿難亦當韜翰復工臨池得晉唐神骨偶落一字人爭寶之智永懷素又在下風總之在和尚光明中悉為餘事矣嗟乎和尚與梅村同一諸生也一以諸生而為祭酒一以諸生而為法王一在水天玉振金聲一在法窟孤松峭壁梅村或有並馳和尚永無第二和尚較梅村止少廷對一策梅村較和尚失卻法語一大帙矣然二公道義水乳始終無間不啻如道林玄度遠公柴桑永叔明教子瞻佛印而已也余今幸得親見序其集因并及之濟顛本傳序晦山顯維摩云菩薩住於生死不為汙行而布袋濟顛酒仙蜆子竟為汙行者何耶良以既證果人欲度執相凡夫不得不隱聖現劣故也濟顛本天台羅漢示跡塵中出家靈隱繼遷淨慈蹤跡最為奇特予嘗謂因中果地二種行事迥不相同果地中人示為汙行便顯神通貌混凡夫旋彰靈異决不與癡闇愚夫同一顛倒而迷惑也今以因中人冐果地相不過獅蟲狐種敗壞僧儀而已何足為正人所齒錄哉近世有等魔禪口說宗教妄餐酒肉以為吾學濟顛也此雖可學而濟顛來蹤去跡種種奇特能學否耶濟顛示夢太后口吐佛金乃至觸境逢緣現種種神通三昧能學否耶濟顛錦繡蟠胸出口珠玉盡大地儒釋皆讓一頭地能學否耶此不能學而徒學其餐酒肉一種真泥蛇學龍必至全身敗露識法者懼矣濟顛行實杭地向有小說語雖近俚事事皆實余門人毱堂刪其俚俗彚成本傳以流布道俗則又為靈隱淨慈增一段佳話也䟦跋中興靈隱寺碑晦山顯名山祖席方內星列然當門奇石堆青冷泉漾碧景地絕勝未有過靈隱者住持禪祖諸方以代著者皆百數以內獨此山大老如文喜明教瞎堂密菴等至百三十餘代禪祖鼎盛亦未有過靈隱者古人稱天下勝處良不虛也余乙酉春初至靈隱寺適中衰殿堂荒落邂逅五松房萬壑公虔向余禮拜請余後必住靈隱余心異之己丑寺中眾耆宿請先師具老人重興祖席余以板首依輔兩春私慮功業浩大落落難合庚寅上匡廬旋住雲居十載己亥歸祝老人六旬壽則法堂各堂寮大半改觀矣獨大雄殿燬道俗寒心余返雲居又遷四祖復八載奉老人命歸補靈山則殿閣嵯峨金碧瑰麗天王殿方丈同日鼎興各堂寮從室四望鱗砌即鬼輸神運捷不至此嗚呼以老人苦心於上寸椽口瓦罔非血汗眾執事戮力於下手瘏足裂盡瘁一時卒致重興偉勣蓋天蓋地口碑賛頌亘古亘今豈非曠世奇功也哉茲三韓護法瑞五王公為文樹豐碑頌老人功績佐以天璧胡公妙筆鳳彩黃君佳勒並堪不朽余喜老人事竟成萬壑公先見越二紀有餘至今方驗也皆靈山異事敢志顛末以告來者啟杭城眾護法請晦和尚住持靈隱啟寶鐸淩空法海之金城永峙翔雲丕顯珠林之香樹常森在西土之給園望南州之法象鷲嶺仰賴大眾騰歡恭惟願雲大和尚藝苑雄師瑯琊舊姓精心白業實廬壑之遠公砥柱洪流比天台之智者況臨濟之真傳在此兼萬峰之乳水昭然自昔松源之祖孫繫一絲於九鼎嗣後竹泉之兄弟炳三乘於五銖在臨濟宿有傳燈于今日允祈嗣法唯和尚寶筏金輪早照耀於三千大眾則我等青鞋布襪將從事於十八高賢届茲日吉伫候雲軿將見飛雨彌天永明之書不墜慧雲布野契嵩之道攸傳某等無任翹籲之至徑山兩序請啟竊惟無文印子久模糊新侍天山之洗刷有待插竿方建豎共欣月窟之莊嚴業期纘述西江開讓老之傳功在成褫滹沱大運公之後恭惟四祖和尚猊座泗水遺珠靈山聖箭句呈銀椀赴雲門之迅機力坐金輪通楊岐之正脈王老師兒孫定徧天下大醫祖門戶已壓人寰不獨山頭老漢屬意川勤凡在室內雁行羣推文邃茲者靈隱名藍虎林大剎風雨拮据老人二十年之堂搆山川形勝臨濟千百世之箕裘堂頭扶笻苕水已入山深大眾泥首冷泉共祈流遠用是眾等仰承師命俯率同參虛直指之法席伫俟飛錫淩空輔徑塢之祖庭會望全身就父貴𦙍分宮銀鶴高衝霄漢强枝內附瑤闈勢不他崇野猿拱筆好賡駱丞風雅之音巖桂雨華更續理公燕寂之說拂峰頭之雕鷲無虞無貳敢煩卧而治之寄江上之鯉魚既再既三惟冀至則行矣臨楮無任瞻企之至杭城眾護法紳衿請晦和尚回靈隱啟瓣蘆流去相傳波上之杯老石飛來應伴鶴前之錫靈山勝會在靈鷲以重開西土樂邦到西湖而儼在珠霞駐綵華雨懸空必瞻白氣於眉間用展紅香於足下恭惟願雲大師心印千江德先四道詩攢墨繡正未醉之東皋梵響燈寒比乞閒之輞水種根清妙謾勞換骨出空聲果腹文章乃效洗腸昭大法非才子之數獨窮洵禪宗之教將溥杖挑明月將尋歸去之猿磬擊冷泉常問落時之桂幸從雪立悵為雲征攜金縷之傳衣就匡廬之瀑布般若高臺既增惠遠蓮華舊社不共陶潛某等石共三生人思七咏欲挽笠鞋于鷲嶺橋久署夫迴龍遙瞻瓶缽于香爐寺原名為遺愛敬然紫露之燈爰聽青獅之吼伏願弼時祖席締結婆心風吹舟葉飄行千里之瓢位定瑠璃化出五方之座威儀遍於虎象歡喜動乎人天臨啟無任翹企塔銘重建靈隱具德大和尚塔銘吳偉業祭酒梅村自佛法入中國漸被江南宋元以來浙河東西分立五山十剎靈隱實居其最歷代禪祖如無著喜永明壽明教嵩密菴傑諸老百四十代雲興川湧甲冠諸方本朝御籙之初我具德大和尚用臨濟宗旨敷揚正法眼藏而靈隱廼熾然其復興其既也遷席於雙徑順世於天甯而道價攸崇靈骨是妥始終於此山為不朽於是嗣法弟子晦山顯公件繫梵行屬其友吳偉業曰子屬與吾師遊塔有刻文非子不足傳信石已具敢請偉業遜謝弗獲伏而思曰夫像法之有盛衰猶生相之有起滅也興復則重來懸記坐脫則末後證明皆所以開導有情表彰正覺今以和尚之功用莊嚴遷化殊特烏可不標舉大端昭示來乎且偉業稱同學於晦山者四十年矣猶記晦山初經薙染和尚結制甫里之海藏時緇素大集余隨眾禮足開誘殷勤自慚鈍根無能追隨參學今竊有餘幸獲以世諦文字效奉揚于萬一晦山之師猶吾師也其何敢辭按師諱弘禮號具德生於紹興山陰之張氏世稱著姓明狀元陽和先生元忭其族也從祖父徙會城幼好與黃冠遊有紫陽洞蘇道者教以息養方頗本天台小止觀與首楞嚴脗合師因讀是經而發正信遂投普陀寶華菴仲雅師祝髮三峰漢月藏禪師則所從記莂授以臨濟正宗者也濟宗在明初法運中微漢公出從折竹洞悟徹盡法淵後乃得源流於金粟悟和尚而其始終加護者則在乎綱宗綱宗者全提五家宗旨而於臨濟則從一句中分賓主玄要照用料揀堂奧森嚴俾學者不滯鑑覺洞抉佛祖心髓漢公以尊奉源流又不得已而至于辨難以佛祖慧命所繫匪細也師聞亟往參叩時漢公開法安隱師於座下苦參本來面目偶窺鏡見影被同參驀背一推猛然有省又以宗旨未明復晝夜服勞飽參力究凡歷三峰鄧尉者十有七載一日擔糞下坡陁放眼虛空忽悟自家活計而臨濟全機大用當前畢現矣師面貌清稜口機迅利在函丈前豎義嶽嶽不下漢公輒痛加錐劄最後乃許為鐵骨禪授以衣拂而謂吾宗到汝大興其師弟機緣如此三峰歿同參潭吉忍公著五宗救師贊助居多書成而闡揚綱宗三峰道法始曉然於天下雖當時辨難三峰者持論不無異同是書一出淆訛永息矣潭公告寂師歸隱雲門御史念臺劉公請出世住廣孝寺烹鍛衲子名動諸方繼遷安隱顯寧復應江北請說法泰興之慶雲秦郵之地藏維揚之天寧嗣居佛日靈隱會稽華嚴最後徑山先後十坐道場開大法門雷震海內在天寧日湖海浩歸學侶奔湊盛至五千所云五千衲子下揚州者也靈隱鼎建巨功事同開創大殿火重新之王公大人施者坌集購殿材于大山深谷鉅數十圍人力罕致一夕雷雨大作暴水泛漲浮湧畢出缺一石柱五顯神示夢募至遂以辛丑七月大殿與天王殿同日鼎興殿成鉅麗甲天下餘五百羅漢殿及法堂方丈羣寮從舍重樓複閣次第布置繡錯星羅自有靈山以來興建稱絕盛矣又斥其餘力葺浙之廣孝安隱法相靈峰正等諸寺而徑山頻以興復請師乃招晦山于黃梅四祖以靈隱付之自住徑山將大興法席為巨渤公封塔再往天寧臨行機語皆似息機投老報齡將近者既至甫七日預刻晷為齋期寂前一日搭衣禮佛夜過半談笑如平時五鼓易新衣呼侍司隨我上方去從者到遲頓足一下端然坐逝時丁未十月之十九日也最師之生平有奮迅之力有漚和之智有真實了義有無礙辯才故能上以承當佛祖下以興建巨功而鍛鍊學人尤推為莫及蓋佛法自馬祖以後大慧以前正令接物皆顯大機大用三峰始修舉行之而師更極變化於莫測故淺學初機與大乘法器舉不能越其範圍師嘗語晦山曰綱宗者人能講我能用先師當日鉗鎚晚年始獲其益此即我三峰家法也嗟乎今人以分別覺路者曰知解建立行業者曰有為師講求宗旨分條析理不落言詮千差萬別總歸一源故能超情離見迥脫生死不可謂之知解也師願力廣大攝受經營能以無著心應一切物視飛樓湧殿食輪萬指與單丁草舍了無以異功德克就躧屣去之不可謂之有為也若師者豈非天縱以開闢宗乘搘拄末法為當代第一宗匠也哉得法弟子首巨渤恒主天寧次晦山顯今補位靈隱次部玉璞紫蓋衡三目淵若相有最後御宗聖膺付囑者共六十八人當靈龕東歸徑山固請晦山及諸弟子念師二十年拮据大功託於此山且枚筮之亦惟靈隱慧日軒吉爰用戊申八月二十六日奉全身入塔緇素畢會咸歎為允嗚呼法席有盛衰而大道偕此山無終極和尚至德豐功固無假於斯文乃千百世下摩挲其日月考較其行履并余與晦山締出世之交亦得附佛法以垂永久則此碑之作又烏可弗詳乎師世壽六十有八僧臘四十七銘曰靈鷲何年來玲瓏入佛智幸遭威音喝故得不飛去龍湫日噴薄徹骨松風寒清冷常不竭師心如此泉小悟攬鏡光大悟擔夯杖覿面更轉肩有相參無相乃復三玄要乃用五綱宗千聖縱復出此理罔不同建瓴决懸河辯才信無礙不現文句身而得大自在白椎告四眾佛法無容情手持吹毛劍把定迷塗津願以清淨心而作廣大事於一彈指頃攝受緣孔熾公候諸宰執都護大將軍橐駝載法施解放韝中鷹香華結慈雲鐘魚答天籟婦孺布金錢屠沽請法戒壇柘三十圍絕壑封雲煙越氓聞鬼語將以供諸天八龍騁威神夜半雷雨送涌水巉巖齊邪許力不用觚稜截虹霓丹艧蒸雲霞變現兜率宮週滿恒河沙祝釐鞏丕圖皈依發正信白象捧金輪青蓮演佛乘功成己不有道在我且行泊然入滅度便是娑羅林是謂大堅忍是謂正知覺世幻等微塵去住總不著顧惟有情眾俯仰於茲山拳石本灌莽冷泉空潺湲念以何因緣成此功德聚靈骨於焉藏理在不思議日色起滄海潮聲來浙江吉祥殊勝地寂滅光明幢我為作此銘刻諸無縫塔曠劫長不磨烱烱照塵剎塔表重興靈隱具德老和尚全身塔表張立廉惟臨濟第三十二傳有應期挺生現大人相以山海為胸襟視道俗如一子徧塵徧界普利含生成始成終得全善逝者為靈隱具德禮和尚迹其椎拂之下波沸雲蒸杖履所臨天垂地湧不起寂滅安居之座變現釋梵龍天之宮辨鐵石身心為人天師表故十坐道場不以為煩五千參徒不以為眾繁興大用不為疲勞撒手便行不為迅疾應機則玉轉珠回卻物則飈馳電埽風雷動地更呈鱗爪之威杯勺皆霖況鼓滄溟之勢四攝周足三學浩歸法運奮興化儀斯在師諱弘禮字具德族姓張氏世籍會稽裔出紫巖里名移貴幼躭道術篤好參尋初依玄教以發機繼讀楞嚴為了義旋窮梵冊博究圓宗悟念想根為生死本采菽初從外道聞法回心釋尊始學阿藍知非便捨於是陟普陀嶺依仲雅師始預僧流旋歸講肆適先三峰漢老人開法安隱遂詣力參初究本來面目從窺鏡處照破娘生面皮復研向上綱宗於扁擔頭悟得自家活計從上作略一時現前徵詰橫機神鋒迅發運鎚腦後室中呼聱頭之禪掛劍眉間諸方傳鐵嘴之號馬駒蹴踏天下大樹蔭覆域中三峰遂以源流殷勤囑累經藏禪海賞物外之南泉彩鳳鐵蛇讖滅宗之佛果師受最後記莂荷出格成褫盛美多端非人能及撮言大節略有其五得法以後下扳雜務備歷炎霜混跡服勤不辭荼蓼灰頭土面隱在窟之嚬呻槽厰磨坊戢摩空之毛羽如昔者踏碓求師負舂續祖大溈契機於典座雪峰密證於飯頭古有其人乃今親見師之晦跡退藏真實妙行為不可及者一初住寺坪旋居廣孝其傾身就鍛之眾皆忘形死心之徒克究先宗激揚本分學徒近百省發多人即屋撒珍珠儼楊岐樹下之韻而人多瓌瑋有妙喜洋嶼之風已而寺逕交爭鄰僧搆訟乃應請而主安隱復受囑而蒞顯寧行道維揚旺化江北若興化之昭陽天長之毘尼秦郵之地藏學眾翕集禪風盛行次住天寧萃五千衲子之緣拈百億瓊花之偈後受請靈隱佛日二大祖庭分化兩山眾恒萬指住靈隱日於廣大林中插標結界衝繁窟內敷座安居馴致革心彌興悲願法堂甫就大殿告災師奮身營搆庀材鳩工神物護呵遐邇輻輳三載奏績百廢具興梯山通道致材木者千章崩角投懷效技能者億計六種翕應四部奔騰兩殿上梁傾城畢赴殷雷震谷邪許沸天締搆之緣近古鮮覯時當像季塔寺靡堅茲乃能移浮幢于掌上湧寶剎于毫端緬鷲嶺之莊嚴奉優填之相好界內堂閣位置綿連門外坊亭次第鼎建復以餘力分應他方殿宇需材隨宜散布師之苦身戮力感殊勝報緣為不可及者二洪永以來宗風如綫至先天童單拈一棒直捷提持三峰乃剖抉綱宗譏防訛濫自是緇林禪會撥草憧憧浙水吳山趨風浩浩顧以宗旨詰難彼此辯爭雖兩世應機不無少異而濟宗再起話乃大圓皆間出偉人弘豎末法者也師以苦身操履初不留意辭章而天資絕人慧辯無礙據座說法瓶瀉河懸矢口成篇波瀠綺互稱性吐露縱奪望洋深辨來風窽綮洞中至普說大篇如長江萬里巨浪千尋擬諸大慧中峰庶幾生瑜生亮一向吹毛運握灼然七事隨身有時合水和泥不妨千仞壁立師之善說法要洞鑒機宜其不可及者三師既苦參廓然復究先德洪規一生苦心尤工鍛鍊座下常餘千眾室中曲被三根打鎖敲枷多方剝換驅耕奪食不主故常爐鞲一開英靈麕集常以雲門拄杖高峰枕子話激發英衲扶豎法幢箭定天山籌盈石室死偷心於鐵牛機下放全身於汗馬叢邊師之為法來人光前啟後其不可及者四師最後應徑山請即以靈隱院事囑法嗣四祖顯公繼席得人成功不處丁未十月言從雙徑前往天寧普接羣機甫經七日忽爾設供禮佛易衣辭眾臨化隔宿垂誡學眾劇話三更遂以十九日丑時言往上方端坐告寂化後頂門火熱面目如生兩山禪眾爭迎究竟龕鬮靈隱遂定基方丈東之慧日軒以戊申八月入塔全身不散光流雙樹之園爪髮中分花雨諸天之座師之預知報謝脫灑自由初終一如首尾端正又末法所僅見也師生於萬曆庚子終康熙丁未世壽六十有八僧臘若干嗣法得人最盛自己丑嵗囑巨渤恒晦山顯二人厥後相續付授六十餘人多分化一方紹隆不絕而師深慈平等洞無町畦同門法屬視均真子參學萬指利鈍千差誨誘忘疲解推無間遇有疾者輒處方用藥即乍到者亦旦過如歸故得百城傾心萬眾竭力間有颺去仍復來歸師之菩薩行願平等垂慈其不可及者五廉昔從甫里海藏依止一期晨夕提持開我蒙吝因得預聞橫說豎說之奇用鈎用錐之捷蜜果葫蘆之移換萬頃百折之汪洋故得霆震大千風行無兩眾務紛應神觀湛然攝受彌寬威稜莫犯而總銷鎔於大悲願海信乎其不可及也已新靈隱顯公現居冢嗣安奉窣堵因瞻禮山頭深詳化蹟兼以狀示且命撰篇不揣荒愚詮次如上適有持師頂相屬題幀首者復述贊云雨爨霜薪服勞第一嶽倒湫傾說法第一地負海涵安眾第一雲輸川委福報第一鳳翥龍騫得人第一更有一事稱第一妙德空生讚不及無夢無想恣掀騰明如日兮黑如漆於戲示生乘願鴈留寒水之蹤削牘攄詞鳥窵飛空之跡徒勞描邈曷測高深續譜傳燈特標僧寶更以俟之具眼操筆若大年寂音者行狀本師具德老和尚行狀戒顯師諱弘禮字具德生緣會稽張氏張為越州巨族系出西蜀實紫巖先生後也居地名移貴明中葉殿元張元汴號陽和先生為理學名臣餘通籍為名人者指不勝屈幼從父兄家杭之郡城業傾銷性不好章句獨喜與黃冠導引之士遊然宮觀掛籍羽流又所竊鄙後於吳山紫陽洞見一蘇姓者終日瞑目危坐或與語不顧見男女圍繞揮令退咸莫測所為師熟視喜曰此真吾師矣乃數數潛往咨修煉之術不數月遂盡其底藴蘇君大喜以為此真仙骨非凡流也然蘇君息養之方一本天台小止觀昔智者大師著止觀既成遇西天梵僧謂暗合首楞嚴大師由是向西頂禮十有八年冀經東來一為印證師默計云彼未獲楞嚴尚勤求如此今現流通何為不觀覽修習乎即覓楞嚴讀之憬然悟悔曰吾所守者正生死本非出生死之正路也遂力辭蘇師登普陀依寶華菴仲雅師薙削日習楞嚴一日以經中疑義質本師師曰吾僅知句逗焉能會義師又歎曰若不解義習讀何益於是又辭師渡海依仲菴法師於玉山聽講楞嚴復聞雲門湛和尚於安隱起禪期師先渡江求單屆期湛和尚忽圓寂時座元漢老和尚新受囑於金粟四眾即請開法師於堂中晝夜苦參本來面目迥無入處計窮力盡疑悶不已偶案頭有鏡師俯首一窺忽有同參背後一推云照破你老面皮師猛然開悟疑團頓豁入方丈呈解大為稱賞自此機思迅利應對敏捷儕軰皆憚之期畢隨漢老人入三峰凡叢林力作苦務無不身任仍不廢參請一日漢老人上堂師出云一箭射紅心請師高著眼老人回頭問侍者事師云機輪轉處作者猶迷老人云你試轉轉看師云九烏射盡忘俱喪鋒鏑消為日月光老人連打三棒師云一柄千將劍惟師用得親禮拜歸眾又一日老人舉藥山弄獅子話師出作禮老人云我今要弄一出底便打師云著忙作麼老人云諸人要會弄獅子尾巴麼便下座師云大眾要會臨濟賓主句看取雙獅輥繡毬時宗門久衰禪風初唱大略所重單在根本謂之鑑覺而於從上諸祖大機大用五家綱宗臨濟七事尚未提起如漢家禮樂未定初事綿蕞所謂雲雷屯而天造草昧時也三峰老人從折竹聲中大徹根本後痛救五家宗旨與臨濟賓主料簡照用玄要等法廓然通貫首尾洞達始知古人於向上眼目重封密鎖不露毫芒於鍛鍊機用陷虎迷獅不留朕迹轟雷掣電中仍藏鋒斂鍔而宗門極則事在矣師始聞其說時時究心昏悶莫入後充圊頭忽一日運糞至園房以用心太過誤走向太湖肩重擔下高坡力疲不能下驀於轉肩時扁擔頭跳幾跳擡頭見太湖忽然悟得自家活計而於綱宗手眼臨濟機用若十日並照矣自是機鋒迅捷莫能抵觸隨口啐啄洞中肯綮同輩皆稱具鐵觜即於漢老人亦橫機無所讓一日老人喚師入方丈垂數百問師矢口立應一無折挫老人竪鐵面不許可師心亦不服語人曰七佛以來無此問法也老人又命侍者撾鼓當堂詰辯如是者再三時師充維那因牴牾而去師自重重透入後具大機用牙爪毒辣能擒啄龍象在三峰老人會下稱飽參者經師旁敲暗擊一捱一拶豁然脫鞴者不知凡幾間有一二承付囑豎門庭者初扣關擊節皆出師手也師雖去念老人法乳時時反顧後老人入死關復奔回玄墓老人遂以衣拂并源流法偈付之勉師收鐵骨徒破斷法魔為吾宗作大竫子偈曰住山養得機緣熟多覓真真鐵骨禪莫負老僧珍重付痛除魔外作真傳付畢老人旋示寂師守喪畢輔安隱潭吉忍和尚為西堂時潭師負恙師為調治內外錐鍛衲子致道風靄著因太白有七闢之說師與安隱口授筆記著五宗救以扶三峰法道海內衲子始知正法眼藏臨濟一宗綿亘古今自有七事手眼溈仰曹洞雲門法眼開宗垂久自有五家宗旨不止一機一境單提鑑覺可以唐突從上諸老也潭和尚逝後師回會稽住靜雲門山時念臺劉公請住廣孝寺師進住刀耕火種人雖止百皆諸方角立真參衲子師握竹篦下手烹鍛朝椎暮桚省悟多人時天童密老人門庭浩大雷震寰中師孤撑爐鞴門風壁立祖孫甘露門不多讓也後因闢寺路鄰僧搆訟司理卧子陳公直其事師拂衣過東陽住寺基坪旋應請住臨平安隱值同法澹予垣和尚臨寂囑住皋亭顯寧師住後為創建大雄天王兩殿百廢具舉甲申冬顯初參師於此入門禪風凛然道氣徹骨雖頺垣敗屋衲子愛戴傾動諸方仰師法道者遍大江南北已而師渡江說法興化黎家菴次開期天長毘尼菴泰興慶雲寺丙戌於秦郵地藏菴開大禪期龍象鱗集三冬了悟者三十餘人次春應維揚天寧大剎請衲子聞風奔驟聚至五千師偈曰五千衲子下揚州百億瓊花笑點頭七尺烏藤行活計憑何面目得風流此一偈薄海內外無不流布是夏師受江北請轍環一轉所至萬人擠擁揮汗成雨至洗浴水一時呷盡蓋宋明以來為法門罕見事也秋歸顯寧開戒次年受戒顯請赴蘇州甫里海藏菴結冬遠邇排闥擁觀牆壁崩倒次歸武林以現成顯寧舉法姪豁堂嵒公扶令出世自受靈隱佛日兩剎請己丑春進靈隱說法三春夏復過天寧度五十誕付首座巨渤恒兄嗣席天寧冬赴杭州佛日結制臘八日囑付戒顯次春解制復回靈隱嗣後眾恒踰萬指師錐鍛衲子外奮興土木拾礫購壤舉薈蔚宿莽之地尺寸而鼎興之東西殿堂布置鱗次各有成局建大法堂雄冠東南靈隱已大改觀矣戊戌大殿燬師與各執事奮身勠力除煨燼庀木石從徽閩温嚴老山中判數百年巨材積疊如山非人力能致一夕雷雨大水暴漲浮湧畢出少一石柱峨冠者五人自稱五顯示夢杭城屠成鳳募至恰稱師與眾執事經營締搆備嘗荼苦辛丑七月大雄殿與天王殿同時日昇樑遠近緇素捨工者施財者助壺漿者擲簪珥者邪許號踴傾動鄉城百戲攢賀晝夜騰踏飛來峰外市肆盃酒盂飯踊貴百倍亦自古迄今無此盛舉也又以重貲易妙應房建華嚴閣伽藍殿又於北高峰建華光殿又建合澗橋與飛來峰牌樓而旁及于廣孝法相正等安隱靈峰諸寺一一皆助財建殿蓋因師誓願廣大因緣輻輳不過二十年而殿閣巍峨金碧瑰瑋壯麗甲于神州雖曰重興實同開創由是諸方道俗推海內龍象都會廣大門庭必以靈隱稱首即數寺宇崢嶸梵宮壯麗亦必以靈隱稱首而師實銖積寸累聽緣自至成大功勳遂至蓋天蓋地此豈非天授而兼之道力法力也哉丙午冬上乘和尚親到靈隱力請師住徑山師再四遜謝乘翁四番削牘併攜眾檀護書幣堅決敦請師不獲已以季冬望登山振揚祖令累命使至黃梅四祖促顯東歸補住靈隱顯苦辭不允以丁未清和月進院師親為交代乃回雙徑八月下浣靈隱以普同塔告成復迎師回寺說法送眾靈骨入塔住七日復返徑山至九月下浣以先許維揚天寧請送巨渤兄入塔遂於廿五日出山至十月十二日入天寧上堂有公案上重添公案語次日上方碩揆弟請齋求師自命日師沉吟曰十九日去十七日堪輿殷自行居士至囑以卜塔後事十八日碩弟復具儀請師陞座師笑曰儀物我收你代我說法我不說法了午後忽命侍司發白金三兩送庫司令備各殿供傍晚師自搭衣至各殿禮拜示辭謝意夜分猶與各執事談至丙夜迨五更聞鐘即起命以新衣服㡌履從頂至踵一一更換呼侍者云隨我上方去坐半餉復呼云說道往上方去還不來頓足一下端然坐脫時丁未十月十九日丑時分也師生平勝心悲願在建功利生凡衰颯退步話素不喜聞獨南嶽老和尚到山師引座有隱身不現語又圓話付法畢忽令眾參船子覆舟公案天機觸發俱異平昔大眾頗驚疑遂以無疾陡然脫化亦異矣哉又六七年前接一長老訃音師嫌其去不脫灑一侍者問某和尚捉鼻而去如何師云也涉做作進云鄧隱峰倒化如何師云太煞顯奇進云和尚百年後作麼生師頓足云便與麼去又臨出山上堂說偈末二句云莫道武陵無覓處一條歸路各家分果符所言又異中之異也師幼失學不攻習章句而慧辯天縱每登座說法河懸瓶瀉千言不竭起結承接皆有關鍵似精通文字三昧者又悟處超特自性宗通凡接機言句隨扣即應尖新奇巧出自天然又敲擊衲子下刃緊凑皆出人頭地不可方物者禪道佛法馬祖至臨濟東山演以及大慧皆顯大機用盛行燬煉元明以降其說久息至三峰老人恢復五家綱宗復握竹篦重興煅煉至我先師爐鞴愈廣啐啄愈靈擒拿愈辣如五花八門變化錯出故出師門者皆經毒罵險擯深遭移換而卒成大器有時愛護一人任眾人深排痛詆而恬若不知有時無端譏訶一人橫加詬詈致令反唇授謗而猶然不卹故淺根學者每望崖退去師卻冷眼竊笑决其必返已而果然師嘗語顯曰諸方是講底綱宗我是用底綱宗故鍛鍊鉗鎚稱方內獨步慈明楊岐五祖妙喜而後一人而已師敦友愛好扶植法屬以橫山一默和尚為三峰冢的乃力鍛豁堂兄扶令出世以續其後受顯寧澹和尚託既為興建叢席又鍛就仁菴義梵音詠兩兄以接之餘瑞光靈峰高麗諸法姪皆與的嗣平等一視極力成褫也師又知醫能切脈每日常苦心看病即乍到掛單有病者亦垂慈診視雖方丈中重價藥味亦不惜也師儉約樸素不好享用自從苦行力作深錐毒鍛得大徹悟故不自處閒寂亦不喜人燕佚不自嬉戲山水習詩歌文字亦不以此教人日以搬土運甓與學者相擊撞每日波波走各堂寮警策放逸安慰執事不以為勞晚至徑山愈矍鑠能徒步高山四五十里推本色宗匠亦區內無兩也師化後供天寧三日頂門火熱挺身端坐面目如生邗人千萬擠擁稽首號慟諸弟子輩以陶龕封函顯忝居長又嗣席靈隱念先師二十年血汗大功在靈山同闔院弟子恭迎靈龕回法堂供奉遵師遺囑請殷自行居士卜塔基於方丈東之慧日軒以戊申年八月二十六日入塔師自廣孝顯寧安隱天寧并江北之慶雲高郵之地藏紹興之華嚴杭州之佛日靈隱徑山凡十坐道場而天長之毘尼蘇州之海藏又在外也付囑法嗣己丑付巨渤恒兄與戒顯次庚寅冬付剖玉璞紫蓋衡三目淵若相有四兄嗣後漸次付囑煦杲照靈沼濎笑魯賢十力潤五岳玹巢山至堅忍鎧聖可凡白谷裔乾菴賢碩揆志牖明本懷宗隆在明德卓靈長晏巖清天彌廣穆文德衲華貫載一晉佛眉惺慧聞圓豁一慶乾敏證開之韶大賢靜微旨朗諦輝輅雪澗顯轉凡禧汝水維栗菴乘獨任雲達方界誠一清句玹日履先緒石語音青震指洪遂泰介華潔慈月時鶴風悟笑拈岳素菴仁岸廣殊谷菴萃鵬雲宏子樵如天越潛靈陌敏曇璽印霓菴奇圓石寧天南臨弗為祚古喬通憨愚慧御宗聖無歇恒慧燈紹珂雪禎法孫開法者上蔭元鵬興源圓極等參上乳如元海瀛鐙普上思溥受元孝超宗智鎔元器元輿元海并未開法者若干人師世壽六十有八生於明萬曆庚子六月十六日戌時示寂於清康熙六年十月十九日丑時僧臘四十七十會語錄共三十餘卷盛行於世伏覬當代鴻儒鉅公法門碩匠得賜塔銘刊垂慧日永耀靈山顯等鏤心剔骨頂戴高深於無極矣謹狀
