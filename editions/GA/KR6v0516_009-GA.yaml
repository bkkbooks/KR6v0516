body:
  text: 藝文吾觀從來宗師家有佛法者未必有文章學士家有文章者未必有佛法故宗師必須學士以表揚而學士亦樂為之揮灑重法道也昔大慧禪師為泐潭準和尚求張無盡作銘張公欣然曰老夫為他點出光明合教照天照地去也故寺碑塔銘多出于當代宗工之手寺碑所以記功塔銘所以彰道此二種為重至若序贊記述書劄等有關于靈隱者總不敢遺蓋文章光燄乃高賢心血所成年雖久遠仍炳耀名山與山門同不朽矣為誌藝文第十一碑記靈隱寺碑記羅處約天地體也乾坤用也體不可以恒寂故以禪而為名用不可以終動故以靜而為本是以境得之而為勝地心得之而為妙道斗牛之下有郡曰錢塘浙水之右有山曰武林居山之寺曰靈隱其得境之勝地乎居寺之徒曰禪侶其得心之妙道乎觀其羣山環倚一峰中斷平湖鑑物洪濤驚人雲生若趨石怪欲語陸羽記云東晉咸和初有梵僧慧理由天竺而至歎曰茲山靈鷲之一峰耳何代飛來乎所攜白猿復識其處睨彼古地同乎新豐由是金布其田寶裝其剎憩蓮花之石翻貝葉之文洞深有天巖垂為室晉宋已降賢能迭居碑殘簡文之辭牓蠹稚川之字唐大曆六載復大壯焉謝亭巋然袁松多壽五季之末國霸為錢雲構之規則又過矣繡角畫栱霞翬於九霄藻井丹楹華垂於四照修廊重複潛奔濺玉之泉飛閤岧嶤下映垂珠之樹風鐸觸鈞天之樂花鬘搜陸海之珍有若碧樹花枝春榮冬茂翠嵐清籟朝融夕凝呼猿峰閒臥龍石老會漢南王籍彼土宇歸我昌朝雍熙二載郡之四眾請月禪師為上首師印可禪那深得其髓越明年春僕自蘇臺抵杭郡弭蓋靈鷲濯纓冷泉山光洗心松聲娛耳貞珉雖揭好辭未刊余不斐者也月禪師俾文其事噫節彼靈山奠茲吳土秀極而為萬狀翠鍾而成一色乍聳而還趨欲飛而卻屹豈造物者奇詭其勢與心而符契哉不然胡為不違世咫尺而若在溟滓俾仁者樂之其得靜之理也我如來密印由飲光而傳達磨而付南能厥後代有宗師競分支派太虛無狀而楞嚴謂三界忽生湛寂本如而易經稱萬物自動故眾生昧如如之性住我我之所執指為月瞪目成花不有導師孰為法眼若言真於妄則二妄為同破有歸無則一邊為見故融其妄法是名真空真空不空斯為妙有雖揚眉舉目則當體涅槃三界四生則澄心境界棲禪於此者其殆庶幾乎偉哉是境也其將以心為君乎是心也其合是山之靜乎所謂天地之體乾坤之用體用無礙端在是矣或曰以茲山得靜之理斯固不誣矣靈鷲言飛來之事何其怪哉余則曰怪神之端子真不語者也第以力垂大教翼戴衰周俾季世之人信道彌篤是以取爾嘻太極剖而為天地遊魂變而知鬼神豈非語怪者也因不自揆而書之猶季路之率爾也因為之銘曰靈鷲一峰飛來竺乾非夸娥負神妙難筌非巨靈擘化工自然誰識其異慧理明焉翠微之前曹溪之禪隱不為俗靜本乎天四時羣籟萬古寒泉因書貞石用記千年冷泉亭記白居易東南山水餘杭為最就郡言靈隱寺為最就寺觀冷泉亭為最亭在山下水中央寺西南隅高不倍尋廣不累丈而撮奇得要地搜勝概物無遯形春之日吾愛其草薰薰木欣欣可以導和納粹暢人血氣夏之日愛其泉渟渟風泠泠可以蠲煩析酲起人幽情山樹為幄巖石為屏雲從棟生水與堦平坐而玩之者可濯足于牀下臥而狎之者可垂鈞于枕上矧又潺湲潔澈甘粹柔滑眼目之囂心舌之垢不待盥滌見輙除去潛利陰益可勝言哉此所以最餘杭而甲靈隱也先是領郡者有相里君造虛白亭有韓僕射皋作候仙亭有裴庶子棠棣作觀風亭有盧給事元輔作見山亭及右司郎中河南元藇最後作此亭於是五亭相望如指之列可謂佳境殫矣能事畢矣後來者雖有敏心巧目無所加焉故吾繼之述而不作北高峰記節略田藝蘅由法華山之南龍岡蜿蜒猿扳蛇折三陟三降可四百丈許凌拔虛峭孤聳碧落者曰北高峰蓋言峰至西湖之北而最高也其下為靈隱山茲山名稱不一以其為神仙之別圃也故曰靈苑以其為許由所稽留也故曰仙居又以其草樹鬱葱而多虎豹也則曰虎林南唐避諱易虎為武遂以名郡亦猶姑蘇虎丘之嘗易武丘而此則訛而不復者也山自仙霞嶺而來纒徽厤嚴結局於杭如龍遊千里而獨角昻霄如虬飲長江而怒髯注雨真錢塘之天柱也其附石級而登者三十六灣勢插太虛影侵明聖禪宮星列都會天開其東則渺渺茫茫蓬瀛之勝可數其西則隆隆隱隱飛鳳之氣猶存其南則屏以重山而羅剎斜遶其背其北則闢以大野而皋亭逆峙其喉廓然四顧逌然長笑襟攬天風心空海宇何如其樂也憶昔癸卯秋八月十八日與臨安高子世道輩同來望潮踏月而歸今已戊午矣以志在山水若余者十六年間僅僅再至又況朝歌暮鼓彩輿畫舫於六橋桃柳中者誰肯更於物外著脚耶遊西山記節略王洪字希範永樂間翰林檢討吾鄉多佳山水最勝者曰西山距郡城不半途遠經行春橋途集慶蘭若始至飛來峰下地誌稱虎林山而浮屠相傳從西域靈鷲小朵峰飛來者蓋西山第一佳處也其高不逾五六十丈巖石嵬怪特異若犢駭若隼立若鳥啄若豹躍若𧉮逝若棋置劍植衡從偃仰益玩益奇上多異木木幹筆直枝葉碧色不假土壤根出石外冬夏常鬱鬱然丹葩翠蕤𫎇羃聯絡種種殊異不可名狀其下巖洞若曲室玲瓏相通中外鑿僧佛像泉自石脉出滴石上作鏗然鳴隱隱出洞久而始散有寺在山趾曰靈隱有亭曰冷泉澗經其下始出沸激久乃徐流白礫布底坦然平瑩跋石漱波毛骨爽徹薄暮脫帽憩石壁之下林壑陰翳萬籟岑寂蒼然暮色自遠而至山風飄飄徐動林木響應溪谷間以幽鳥其韻愈遠令人蕭然有忘世之志明旦由涉故徑東還顧瞻白雲橫亘四山北峰浮圖止出其半日影照映茸茸如白綿可揭而取也噫余遊四海久矣嶽之秀者泰岱衡華水之巨者洞庭彭蠡而名剎高士勝僧未有若吾鄉俱美者宜吾徒樂而忘返也故書之是永樂七年閏四月一日也湖山勝概記摘略夏時正入湖路轉而北過胭脂嶺至大普寺北出九里松東過行春橋接小新堤天澤土穀廟路通麯院又由普福西過集慶寺月桂峰下有閻妃墳迤西入佛國山張即之書匾筆妙入神三竺之間雲影天光泉聲松籟岑寂鳥空山凝鐘靜耳目心神之會覺其迷極其樂者豈不超三界外乎歸路左合澗橋過龍泓洞有飛來峰又名靈鷲山與三天竺一脈聯屬至此而盡故上有巉巖下多空谷謂之飛來者也相對有靈隱寺規模宏壯為五山第二兩山之間有冷泉亭泉可濯亭可憩樹林陰翳九夏而暑無侵樂天云有虛白見山觀風望仙四亭今皆無所考西有呼猿洞猨去西洞湮靈隱之後則北高峰秀出諸山支分上竺盤折七十二彎麓衍二十餘里磅礴起伏至武林山而歇其靈鍾於五顯山之腰有半山廟西有韜光菴菴極幽靜唐有僧居之山之麓有上永福寺遊西湖記摘略楊守正㳂山澗入陸行道三竺佛門見松篁夾路水聲㶁㶁然移時至集慶寺訪理宗遺像無存尋跋涉久乃坐飛來峰側見諸洞窟玲瓏余穿巖隙入恍佛乳垂垂墮佛大士諸像星列其上石青紫有光每窟穴處雲滃滃然起石畔溪流激人余因問寺僧橫溪上人究駱賔王吟詩之所在北高峰下亦跛蹀不能至飲罷至冷泉亭題詩壁上因與諸子話往日奸檜地藏和尚之事雖涉野史荒唐莫可據然亦可見神鬼報施有不可逃者冷泉亭上有一泓悠然余遂沿石泓下復至前飛來峰所因詢所謂呼猿洞者在荊莾中道狹不可步迺同諸子坐石筍屏畔於是訪靈運翻經之臺見臺葑蘚剝蝕繼至三生石上盤行山徑乃下汲葛仙公泉冽甚復取道後湖小徑去新廣冷泉亭記僧如璧靈隱冷泉其源出於寺西南百步之近直寺之前瀦而為池唐刺史河南元藇作亭池上後刺史白公居易記之刻石亭中其敘勝概甚備然士大夫有識者猶以池量狹陋為未足以盡冷泉之美蓋三百年於此矣政和初兵部尚書張公以龍圖閣學士出守是郡暇日醼客池上徜徉不忍去意將廓而大之長老雲公樂然用其說撤屋斸地伐石為堤東西三倍其初南北半之長松巨檜不改其列而池已浩乎大矣池傍故有巖竇嶔𡼭空洞如刻如斵至是揚波石中倒影水面湛淨明碧可以育魚鼈而豢蛟龍使人登此亭者超然有絕人遺物之意餘波渺瀰浮閘而下者雷奔電激飛雪噀霧使人臨是池者恍然如在天台廬阜窺石橋而睨三峽莫知其在湖山俯仰之間也嗟夫天下之物用之有不極其材駭鷄之犀夜光之璧世有不盡見其美者古今之通患是舉也能使累世未盡之奇一旦呈露蓋張公之意而雲老之力此豈偶然哉亦嘗徘徊周覽壁間之題如唐丞相李嶠裴度裴休與夫元稹張籍之徒讀其詩未嘗不想其人是數公者功名文彩照耀後世今其流風遺澤固已雲散夢掃漠若與凡輩共盡而斯泉固自如也於是慨然而嘆今此地已三廣冷泉之名當益張士大夫之遊者當益眾援筆而賦者當益多然逝者如流日遷月謝容一過之或昔少而今壯或昔壯而今老盛衰得失相尋於無窮後之視今將猶今之視昔則猶視池者亦可矍然以驚翻然而懼矣惠力寺記摘語贊寧錢塘屬邑鹽官為最在浙之朝陽為吳之右臂白鋪江練青點海門蜃樓起而螮蝀橫星漢低而枯槎活潮生信大雷霆藏龍戰之聲閏下功深蜀井喪虎形之味古澗窪泉記貝瓊余在錢塘時嘗遊西山之靈鷲有泉流幽澗中或隱或見者如綫如蛇曲折而下赴其激石有聲鏘鏘如琴筑之交奏珩璜之相觸及憩春淙亭其東西合流注大壑琅然如驟雨之至雷震之瀑如决銀河自天而落也雖未及觀香爐瀑布天台石門之崩騰雄悍是亦西山之一奇矣岣嶁山房記張元忭靈隱寺之西循澗而上得柴關踰赤欄橋有屋數楹有竹萬竿中有樓曰紫蓋樓之上下析為小室者五凡燕居欵客却暑避寒之所無不畢具刳竹為瓦樹蕉為屏引泉為溜淨綠莊嚴清流瀟淅盛夏凛然如秋樓之北躋石磴緣曲水而上結桂成亭充坪因石憑虛曰孤嘯臺復古曰白砂丹井架空曰禮斗閣依梅曰香雪巢其外曰樹蹊茶坂梅塢橘坡山不盈數十畝而備極幽致遊者如入蓬壺方丈而莫能窮詰也玉兔塜記黃汝亨先癸丑四年客有見白兔于天台山者守三年而得之珍重寶愛歷遊諸王侯公卿間未遇也迨癸丑秋八月擕之白門見余于官舍門下士汪生捧以歸余予籠以金縷題以玉衡偃仰一室曠若林麓與之周旋者三年其體瑩皓月眼流赤霞冰姿絕倫雪態橫逸若蹲若卧名狀千變客或見其一斑予曰摩挲愛玩之未有窮也今年春二月先一夕夢有黑衣童子雙眸下涕界以赤文若繞膝置辭者予驚而寤起眎之欠伸靡恒躑躅者三遂往矣予愴然若喪者久之豈紀所謂五百年白五百年而黑者其變徵乎夫遷無超有理之大常含盃表異物有至貴昔徑山標靈雞之塜南康記鸚鵡之禽斯皆資始道妙任體山阿予之斯兔豈不同然遂裹以文車封之靈隱山巔之韜光菴下識曰靈兔塜即委蛻一時流耀千載詎忍堙沒不稱草木俱腐哉永明智覺禪師行業記惠洪師諱延壽餘杭王氏子兒時知敬佛乘及冠日一食誦法華經五行俱下有羣羊跪聽年二十八為華亭鎮將嘗舟歸錢塘見漁船萬尾戢戢惻然皆易之放于江裂縫掖投翠嵓岑公學出世法吳越文穆王聞而慕悅聽其棄家為剃髮自受具衣不繒纊食無重味持頭陀行常習定天台天柱峰下有尺鷃巢衣襵中時韶國師眼目世間北面而師事之韶曰汝與元帥有緣他日大作佛事惜吾不及見爾初說法雪竇建隆元年忠懿王移之于靈隱新寺為第一世明年又移之于永明寺為第二世眾至二千人時號慈氏下生指法以佛祖之語為銓準曰迦葉波初聞偈曰諸法從緣生諸法從緣滅我師大沙門常作如是說此佛祖骨髓也龍勝曰無物從緣生無物從緣滅起惟諸緣起滅惟諸緣滅乃知色生時但是空生色滅時但是空滅譬如風性本不動以緣起故動倘風本性動則寧有靜時哉密室中若有風風何不動若無風遇緣即起非物風為然一切法皆然維摩謂文殊曰不來相而來不見相而見文殊乃曰如是居士若來已更不來若去已更不去所以者何來者無所從來去者無所從去所可見者更不可見此緣起無生之旨也僧問長沙偈曰學道之人未識真只為從前認識神無始來時生死本癡人喚作本來人豈離識性別有真心耶智覺曰如來于首楞嚴會上為阿難揀別詳矣而汝猶故不信阿難以推窮尋逐者為心遭佛呵之推窮尋逐者識也若以識法隨相行則煩惱名識不名心也意者憶也憶想前境起于妄並是妄識不干心事心非有無有無不染心非垢淨垢淨不汙乃至迷悟凡聖行住坐卧並是妄識非心也心本不生今亦不滅若知自心如此於諸佛亦然故維摩曰真心是道場無虛假故智覺以一代時教流傳此土不見大全而天台賢首慈恩性相三宗又互相矛盾乃為重閣館三宗知法比邱互相設難至波險處以心宗旨要折中之因集方等秘經六十部西天此土聖賢之語三百家以佐三宗之義為一百卷號宗鏡錄天下傳誦焉僧問如和尚所論宗鏡唯立一心之旨能攝無量法門此心含一切法耶生一切法耶若生者是自生歟從他而生歟共生無因而生歟荅曰此心不縱不橫非他非自何以知之若言含一切法即是橫若言生一切法即是縱若言自生則心豈復生心乎若言他生即不得自矧曰有他乎若言共生則自他尚無有以何為共哉若言無因而生者當思有因尚不許言生況曰無因哉僧曰審非四性所生則世尊云何說意根生意識心如世畫師無不從心造然則豈非自生乎又說心不孤起必藉緣而起有緣思生無緣思不生則豈非他生乎又說所言六觸因緣生六受得一切法然則豈非共生乎又說十二因緣非佛天人修羅作性自爾故然則豈非無因而生乎智覺笑曰諸佛隨緣差別俯應羣機生善破惡令入第一義諦是四種悉檀方便之語如以空拳示小兒耳豈有實法哉僧曰然則一切法是心否曰若是即成二僧曰審爾則一切不立俱非耶曰非亦成二汝豈不聞首楞嚴曰我真文殊無是文殊若有是者則二文殊然我今日非無文殊于中實無是非二相僧曰既無二相宗一可乎曰是非既乖大旨一二還背圓宗僧曰如何用心方稱此旨曰境智俱亡云何說契僧曰如是則言思道斷心智路絕矣曰此亦强言隨他意轉雖欲隱形而未忘迹僧曰如何得形迹俱忘曰本無朕迹云何說忘僧曰我知之矣要當如人飲水冷暖自知當大悟時節神而明之曰我此門中亦無迷悟明與不明之理撒手似君無一物徒勞辛苦說千般此事非上根大器莫能荷擔先德曰盡十方世界覓一人為伴無有也又曰此是一人承紹祖位終無第二人若未親到謾疲神思借曰玄之又玄妙之又妙但是方便門中旁贊助之語于自己分上親照之時反視之皆為魔說虛妄浮心多諸巧見不能成就圓覺但以形言迹文彩生時皆是執方便門迷真實道要須如百尺竿頭放身乃可耳僧曰願丐最後一言曰化人問幻士谷響答泉聲欲達吾宗旨泥牛水上行又常謂門人曰夫佛祖正宗則真惟識纔有信處皆有為人若論修證之門則諸方皆云功未齊于諸聖且教中所許初心菩薩皆可比知亦許約教而會先以聞解信入後以無思契同若入信門便登祖位且約現今世間之事眾世界中第一比知第二現知第三約教而知第一比知者且如即今有漏之身夜皆有夢夢中所見好惡境界憂喜宛然覺來牀上安眠何曾是實並是夢中意識思想所為則可比知覺時之事皆如夢中無實夫過去未來現在三世境界元是第八阿賴耶識親相分惟是本識所變若現在之境是明了意識分別若過去未來之境是獨散意識思惟夢覺之境雖殊俱不出于意識則惟心之旨比況昭然第二現知者即是對事分明不待立況且如現見青白等物時物本是虛不言我青我白皆是眼識分與同時意識計度分別為青為白以意辨為色以言說為青皆是意言自妄安置以六塵鈍故體不自立名不自呼一色既然萬法咸爾皆無自性悉是意言故曰萬法本閑而人自鬧是以若有心起時萬境皆有若空心起處萬境皆空則空不自空因心故空有不自有因心故有既非空非有則惟識惟心若無于心萬法安寄又如過去之境何曾是有隨念起處忽然現前若想不生境亦不現此皆是眾生日用可以現知不待功成豈假修得凡有心者並可證知故先德曰知大根人知惟識者恒觀自心意言為境此初觀時雖未成聖分知意言則是菩薩第三約教而知者大經云三界惟心萬法唯識此是所現本理能證正宗也智覺乘大願力為震旦法施主聲被異國高麗遣僧航海問道國王敘弟子之禮以開寶八年十二月焚香告眾跏趺而化閱世七十二坐四十二夏贊曰予初讀自行錄錄其行事日百八件計其貌必枯瘁尩劣及見其畫像凛然豐頤眉目秀拔氣宇如玉味其平生如江干之月研其說法如禹之治水孔子聞韶羿之射王良之御孫子之用兵邱明太史之文章嗚呼真乘悲願而至者耶錢塘邑侯譙明張公免靈隱役功德碑記公諱文光河南祥符人中戊辰進士汪繼昌陶令作桃花源記寫山水之岑僻人物之凉古唐人擬作歌詩都謂是仙域矣及攷輿圖誌今廼更隸縣官而當日陶公作詩亦秪云春蠶取長絲秋熟靡王稅而已後讀十洲記見其說瀛洲仙家風俗似吳人又私自喜吳儂身墮菰薭中竟不知是閬風玄圃也然近年來追呼調發生人號咷如沸湯鑊錢塘古稱佳麗每奉院司文移徵發惴惴不敢緩雖復王裒步擔乾飯磬折牛旁不足蔭安邱之門人矣矧其遊方之外者耶今上治天下之九載歲在壬辰大治役書而天下邑侯躬為審定譙明張公蒞錢塘取斯人而袵席之以廬以粥于今七年杭人竊喜張使君如白如蘇西湖帶水淨如拭鏡兩山綠如埽黛其間暄晨肅月春萋秋馥向使吏鷹政虎博噬狺狺亦有何佳而我張君布政優優吏治閒閒衙鼓簿書之暇輙邀家嚴牽艇策蹇信信宿宿于煙蘆雲杉之際觴詠流連消民苛慝往時余得雁行隅坐時時捧讀篇什憂民之色見于楮面是役也靈隱僧性槤等來乞家嚴屬予灑墨以誌侯德予嘆曰張使君此舉不但為法城塹也靈隱舊額十之五今少減之耳乃令冷泉片地翛翛釋子眇眇禪棲錫鉢間設于松間梵唄颺韻於天岫騷人遊子來憩蕭森恍有雲從棟生水與堦平之致昔支道林寄桓公書頻被州符求沙門名籍煎切甚迫今具德大師得率眾禪寂此中得斷薪續牀三篾繞腹麋鹿之性自樂林泉然得徜徉自適者誰為賜也往者不可知且以近事相況清波門內為雲居楓嶺盛時嶺幾千章深秋葉赤遊人自斷橋回眺城隅赫如天半絳雲十年前余讀書菴中疲衲困于誅求遂將此百餘年物斬艾無遺蘖維時同人江晚柯家蒼舒作詩悼之今靈隱沐張使君寬政要念所以保護之者上自蓮華峰後迄韜光一草一木一泉一石以召公勿拜之思作李家平泉之訓他日使君過山中更邀家嚴聯句冷泉亭畔石蹲似獸煙樹如人野衲與鷗鷺相狎宛然如初入桃源時後之詩人過九里松者杳不識少陵野老垂老無家諸什為作何等語者則張侯之德為不可諠哉靈隱係浙省第一祖庭參學高流皆十方聚會所以寺無恒產者以應酬里役不便故也今本寺止有山地蕩舊屬錢塘上扇三啚運戶辦糧至順治十八年恩蒙前任邑侯今陞江南藩司大護法慕天顏編入上虞二啚二甲本名濟上立戶完糧准免雜徭俾林下人得以朝參夕請究明己躬下事者悉慕護法盛德之所賜也奕山萃謹識
