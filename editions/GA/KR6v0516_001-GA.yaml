body:
  text: 武林西山樵者孫治宇台初輯吳門而菴居士徐增子能重修住靈隱第二代戒顯晦山校訂開山始迹原夫西方聖人之教被于震旦也漢明帝兆金身之夢白馬馱經康僧會恊舍利之求赤烏建塔由是而降聖教大行彼方聖賢乘運顯迹或遙空振錫或隨處託生所在之處建立道場以保佑君國利濟民生其心甚遠其功甚大近代天下大剎在吳越間者推靈隱寺為首然開山實自理公踵其後者豈得忘其所始耶誌開山第一靈隱寺在今杭州武林山去城十餘里其山控湖扼江有龍盤鳳翥之狀為仙靈區宅東晉咸和三年竺僧慧理遊至武林見飛來峰而歎曰此為天竺靈鷲峰小嶺不知何代飛來人咸不信理公曰此峰向有黑白二猿在洞修行必相隨至此理公即于洞口呼之二猿立出有此因緣連建五剎靈鷲靈山靈峰等或廢或更而靈隱獨存厯代以來永為禪窟五燈互照臨濟子孫居多今重興者為具德和尚是法運使然也重興緣起吾于興廢之際而重有感乎其人也古來大剎不一其始也有善知識以創之迨其後至瓜分房屋各利其生殿閣荒涼鞠為茂草往往然也今觀靈隱金碧莊嚴冠于諸方而亦知二十年前衰落之不堪也嗟乎不有住持其何以寺不有廢者其何以興然則靈隱之廢天之所以開大善知識也誌重興第二昔理公之開山也固非偶然今靈隱之重興也亦多奇兆明季以來寺已廢敗本山二十四房于順治六年己丑敦請臨濟正宗三十二代具德大和尚住持和尚乃三峰老人之嫡嗣天童老人之法孫也天童一棒當下直捷三峰玄要宏暢綱宗具和尚兼而行之道風廣被十坐道場位下法從動以千計是時和尚在佛日先有烏程金姓者寓靈隱夢寺中鼓吹迎大慧禪師至又僧數輩夢明教禪師囑迎和尚更有異者佛日忽一日至夜半四無人聲聞伽藍殿閧然細聆之則靈隱伽藍與佛日伽藍相爭也于是本山僧眾闔郡護法敦請不已而和尚于己丑進院至則慨然曰夫所謂道場者上以莊嚴尊像敬禮三寶使人得以瞻仰下以鍵鎚衲子傳佛祖慧命外以接待宰官居士內以安置諸執事一應僧眾寮屋缺一不可今無歇足處則鷲嶺飛來之瑞理公開建之功乃至于此即率大眾躬親秉耒斬棘除壤凡事先之不辭勞苦乃于庚寅冬集料興工若法堂方丈客舍僧寮鐘樓浴室等次第而成煥然一新矣大殿歲久方思修葺而大殿灾此豈神天佛祖以為非和尚不能鼎建而故以是委和尚歟舊殿高十三丈度非百萬金錢不可就功程浩大揆之世情人咸難之和尚立排眾議乃發誓願曰大丈夫出家學佛身非我有擔荷重遠為末劫津梁顧造一佛殿而便束手卸肩耶于是堅金剛心奮勇猛力眾心既齊人天協助所最難辦者無如巨材乃命工師求諸徽嚴常玉等山山深水遠卒不能下不日水大發從空瀉出咸驚靈異宰官護法檀越施財貧者用力役夫助工其聚如雲其心如火不三年而殿成上梁之日人來觀者十有餘萬擁塞如山咸頌和尚法力其聲如雷諸山谷應說者謂自建造以來未見若斯之盛者也其餘寮舍寛敞足以容眾四方來參者歲以萬指計雲水往來日以二三千指計賓客輻輳無一𡩬晷使人虛往實歸譬如甘露水咸得滿願因緣福報至矣極矣非真天下大善知識何以有此未幾應徑山之請乃請法嗣雲居補處即今之晦山和尚也和尚具大才少與吳梅村祭酒同筆研名籍甚甲申春聞李賊破京慟哭焚書即以金剛王寶劒斬斷葛藤于千華老人處受具于具德老人處傳法印日夜究心綱宗與從前祖師如鏡照花如水和乳化行江楚連踞雲居四祖疏山薦福諸大祖席曾著鍛鍊禪人說十三篇諸方畏仰每結制一七之期必有數人省發正法眼藏之利益學人有如此滹沱絕學重開生面以大展具老人未竟之緒靈隱重興固不在殿宇鼎新已也武林山水誌靈隱為寺也而何以及武林蓋先有武林山水而後有寺也從古聖賢負佛祖慧命為人天眼目者往往遠城市而居山林非耽名勝重道場也道場為莊嚴法寶陶鑄衲子之地豈擾擾名利之藪可得而混雜者哉故古剎必在名山不惟使皈心法道者得山水清迥之氣以資其禪定且使遨遊山水者瞻仰紺宇以發其道心然則助道因緣莫名山若也乃誌武林山水為第三武林山水其載于邑乘見于遊人記詠亦既詳且備矣而茲何以誌之武林山峰嶺不一名剎甚多而世之稱靈隱者必曰武林靈隱說者又以北高峰西麓寺之所坐之山為武林則安得有六十里之廣要之武林是合六十里之山而言之也孫宇台誌云武林在錢唐縣發源于天目森列錢唐東至赤山埠進龍浦西至古蕩西溪北環西湖南控浙江週迴六十餘里為當吾于是知靈隱之得以武林稱者當理公未創寺之前祗有武林及理公建寺武林山亦止一靈隱故稱武林靈隱今之三竺諸剎分踞武林者皆在靈隱既建之後是以不聞稱武林三竺明乎不得與靈隱抗行也夫廣六十里之武林山既為三竺諸寺所分踞則誌靈隱寺者不可得而盡舉若就所坐之山而誌之則又非稱武林靈隱之義矣吾今就其西山迤邐一帶以誌之其峰則有飛來峰即靈鷲峰也為靈隱寺案山以竺僧理公得名高五十餘丈此峰中空外奇玲瓏磊塊說者謂其如矯龍奔象伏虎驚猿墮者將壓翹者欲飛是也然未能盡其形容也其石有竅有罅有筋有稜有如手指攢撮者有如鐵線疏剔者有如老松皮者有如蟲蝕者有如蟻穴湧起者有如蜂房相比者有如波浪衝激者有如凍雲合遝者下本淺土勢若懸浮橫豎反側非人思想之所得及石色非青非紫帶白帶綠石隙生樹木甚老甚瘦輒有無根藤附之秋有紅葉豔若布錦坐冷泉亭望去迥出世外多生藥草鮮知其名其從西天飛來無疑洵武林山之第一峰也其洞另詳蓮華峰在飛來峰西高起而聯屬者是也水經謂孤石壁立大三十圍高百丈今從下遙望下闊上銳從頂視下其石四面敷開如蓮華瓣狀故名宰相峰在蓮華峰北下向西如宰相執笏待漏狀月桂峰在飛來峰西南唐天寶中嘗雨桂子有一子成樹慈雲懺主居此十二年宋天聖中丁卯秋七八月兩望夜殿堂左右天降若雨其大若豆其圓若珠有黃白黑三種色帶殻味辛此月中桂子也因取播種林下浹旬而甲坼彌月盈寸綠葉可玩明年春移植白猿峰下迴軒亭凡二十有五株其它桂樹甚多而今無存者以花時多得煩惱不去培植漸至彫盡康熙五年靈隱大殿落成後八月十三日早起載堂禪師聞屋上歷落有聲出而視之其狀圓而長大踰萆麻子殼有文亦相類大殿法堂方丈前後都有拈取呈具德和尚曰此月中桂子吾已見過二次載公秦川人今為晦山和尚法嗣曾住持石門虎嘯寺曩在具和尚位下因收貯二合許將移至秦中種之時有好事者聞之咸索觀輒取四五枚去纔至揚州而桂子已盡駱賓王有句云桂子月中落天香雲外飄其語不虛則唐初已落過然落必有瑞應具和尚重興靈隱寺十有七年間凡三見矣白猿峰理公嘗畜白猿于此稽留峰在蓮華峰峰形正不偏無別峰迤邐傾昃突兀之狀俗譌為雞籠山是也北高峰武林山左支之最高者自下至頂九十二丈樵蹊陡峻以曲折為灣共三十六灣登絕頂瞻眺羣山孫列湖水鏡涵江流折為帶環海色宿為莽沆真大觀也上有五顯廟塔一座烏石峰在北高峰西上有烏石故名昔趙清獻判奪法安院歸靈隱作形勝又名形勝山龍門峰在烏石西上有石對峙如門西原峰在龍門西南武林水北澗發源處也雙檜峰在龍門南上竺右山也上有雙檜望之如蓋白雲峰上竺坐山常有白雲覆其上中印峰在上竺左昔寶掌開中竺山掌乃西域五印度之中印人故名中印乳竇峰山下有乳泉白色獅子峰與中印峰左右相夾為上竺路也頂有奇石狀如獅踞香罏峰善住峰善住峰與中印相連因寶掌住世故名悲華經摩尼太子成道號善住珍寶山王其嶺則有駝巘嶺北峰東盡處宛如駝肩今作桃源石人嶺北峰西高六十二丈路屈曲如羊腸通西溪東墓嶺通黃山楓木嶺中印峰路白沙嶺以沙白得名通梵村郎當嶺又名捫壁嶺左迫削嶂右臨深溪緣木扳蘿方可舉趾故稱郎當又上為天門東通龍井南通五雲幽淙嶺深壑泠泠巉石齒齒陟此者須前後牽挽草樹周密仰天一線俗名水出嶺與郎當嶺接東嶺下竺東大路西嶺道標和尚結廬于此仙芝嶺月桂峰下南北二山通衢俗名胭脂嶺黃泥嶺胭脂嶺餘氣其塢則有於家塢雷院西玄本塔基水岡塢在北高峰水從東下巢居塢泝澗而西達韜光許由夏則巢居又云巢父所居故名大桐塢烏石峰西石人塢石人嶺下白沙塢白沙嶺下桐木塢楓木嶺下舊有吳寺通中竺騰雲塢上竺後通白雲峰楊梅塢廢興福寺路對上竺興福舊名彌陀教院得月輝老宿重興永清塢對中竺內有菴名永清神道塢與下竺對慈雲塢以慈雲建塔得名葛塢葛井處也活沙塢上至天門諸山下伏水竹塢珍珠塢瑞岡塢鷂子塢其洞則有龍泓洞前當迴龍橋後通冷泉澗㟏岈懸霤挂碧湧金似真非真內有通天處漏天如井後人題通天洞三字其側有小洞底地無垠傳聞昔有採石乳者入之不已聞篙櫓風浪之聲謂度浙江通蕭山者即此洞也內有蔣之奇篆書未見賈似道題名見後卷八唐丁飛宅於中玉乳洞一名巖石室一名羅漢洞吳赤烏二年葛孝先于此得道後人就道畔鑿住世羅漢十六尊其迴旋曲折小有蠻蝸涓滴沁凝大旱不竭豈上仙蛻白石之繭而龍鼻為大陰之戶耶射旭洞一名青林巖即理公巖有唐楊遵篆書三大字見石隙乃理公燕寂之處又名燕寂巖其下四極三門鰲撐而立其上豐額險足龜殼猶存外視則洞可容百數人內視則巖可樹百椽屋藤蘿聯絡峰石縱橫無愧署書八面玲瓏四字者也內小石有金光洞字側有周伯琦篆書理公巖記一碑見文內山多櫧桂木葉常青淩冬不彫故曰青林又曰香林呼猿洞在蓮華峰麓即慧公驗飛來峰處六朝宋時有僧智一訪舊蹟畜猿于此其洞門甚狹側身乃容內廣堂皇㝠如長夜又一洞炬火傴行數百武或高平如砥或齰䶦如牙又一洞非螣蚺不入故人憚而未詳金佛洞飛來峰南下竺薝蔔堂後香林洞亦名香桂林黃初菴有詩圓公洞三生石側為圓澤會處也其巖則有龍泓巖在龍泓洞洞有室曰巖青林巖在青林洞理公巖理公燕寂處也玉女巖飛來峰頂一名新婦石巖下石罅有水如玉女潭也日月巖在下竺山一圓如日一半灣如月虎頭巖在蓮華峰下虎頭禪師以此為號千歲巖以寶掌為名天香巖在中印峰山半又名百歲巖白雲巖永清塢新菴百丈巖雙檜峰後烏石巖白雲峰後其石則有石蓮即蓮華峰也石梁在飛來峰頂長一丈亘石上如梁三生石下竺右水波石下竺後石上有水波紋舊時江水至此鬬鷄石無考卧龍石慈雲種梅其上其詩有梅有和羹實龍無為雨時之句一指石龍泓洞旁石筍烏石峰山半高數仞周可七八抱圓峭特立亦名卓筆峰石室在韜光山後真觀坐其中得道者名頭陀石室理公巖下者名巖石室其一未詳獅子石韜光山後高數仞石人在嶺上近視如將軍戴鐵笠之狀遠望又如幼女雙髻也棋盤石在永清塢中高數丈色赤如丹廣丈許平如砥嘗有老僧謂邵山子埽葉林中得石棋子醉石方廣一尋在洪有竹園浴蓮池側主人以其平踞可觴咏也名曰水臺盤白珩靈隱記曰至是搜名勝而此石以小見遺夜夢人指曰何忘醉石也其棧則有伏虎棧陸羽二寺記言靈隱澗中奇石後為朱勔取去連巖棧飛來峰頂石級猶存白子佩原誌謂連雲棧與伏虎棧皆峰麓奇石楊真伽鑿為佛像其水則有南澗一會支澗七南發源于五雲山水出嶺西合上竺兩山支澗徑靈隱房小橋合流過五雲山路小廟橋又合觀音井水經時橋匯水陰溝出金佛橋在普門內過天巖房橋東合楊梅塢支澗出琮老橋僧琮建東合中竺永清塢支澗北出中竺寺橋東合下竺神道塢支澗北過下竺寺橋東合月桂峰支澗三水橫出如川名葛洪水過慈雲北澗出飛來峰至龍迹橋會北澗北澗一會支澗十發源于西源峰南合白沙塢支澗西合永安支澗西北合大桐塢支澗流過吳寺橋西北合烏石峰水南會呼猿澗暗水南合冷泉水源北合石筍支澗又北會金沙銀沙支澗又北合韜光支澗東流過曹家橋渟匯于靈隱石門澗經瀑雷橋今廢迴龍橋會南澗水于合澗橋下舊橋三洞今修曰靈隱浦南宋通舟至此北合水架塢支澗西流過白樂橋北合瑞雲塢水經雷院名後澗溪出唐家橋東南趨西行春橋逕東行春橋逕金沙灘裏五橋匯為西湖其泉則有冷泉相傳在蓮華峰麓今在寺前堆藍漾碧冬夏常盈池旁有嶔𡼭空洞形家以招提擁北高而面飛來宜匯此澗置閘以蓄水建亭其上者唐刺史元藇廣池者宋僧如璧也溫泉在冷泉之上首今涸渦渚泉臨安誌云在東嶼卧龍泉在渦渚側醴泉在渦渚右大曆六年出酌之療疾蕭公泉在寺右伏犀泉在飛來峰頂瓔珞泉下竺後巖元時竭僧允若祝曰吾緣在是泉當再來已而泉出蓮華泉跳珠泉此二泉疑在慈雲塔院處東坡有和周次元跳珠泉詩上永福劉宋慧琳禪師開山明弘治間洪水堙廢順治間靜照法師重興金沙泉銀沙泉俱在上永福二方石池現存觀音泉上竺為大悲泉在講堂下流繞殿前經如意池池以青石闌之方丈許石面鏤如意文夢泉宋崇寧元年浙西大旱寺中廚水不給主僧玉法師夢泉發于西坡鑿之果得薈泉在雙檜峰華光泉在白雲西院凝翠泉在獅子峰下水月泉在中印峰前孫公泉上竺誌謂孫思邈玉液泉永清塢小龍泓泉閻妃墓側白公茶井泉在形勝山麓舊鐵秀菴處龍王泉康熙辛亥夏大旱韜光道上澗泉盡涸忽於龍王祠前迸出一泉充潤常住真龍神賜也其池則有蘸筆池在本寺東廊下丁行者學書處茯苓池在本寺西僧堂劚苓成池金蓮池在韜光福泉池下永福寺福王建亭其上雲液池在白雲峰七星池中竺殿前金波池集慶寺後其井則有葛翁大井普福寺後洪丹井天下凡十三而在杭者三此與下竺井為二其一則在龍井翁家山有壇在雷院慶化山所植松在履泰將軍廟天澤井天澤井履泰將軍為天澤侯此其井也
