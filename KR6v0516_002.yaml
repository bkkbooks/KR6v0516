body:
  text: 梵宇昔佛以正法教天下而復立像法者以正法深微幽奧初心難測有像法在使轉輪與聽法者皆于是乎準焉故必建寺寺者聚也言三寶之所聚也入門列四天王者表護世功在前也中坐慈氏者表當念即可入一生補處位也向內建韋天者尊其道肅三洲向佛而擁護也三世佛者表三際代禪而覺體不動也殿中左右列應真諸天者表真俗二諦互顯中諦也觀世音擁于殿後壁者普門示現也後有樓閣者普賢萬行為諸佛之長子而因緣果滿也像法之大義如此又聞一千年像法後五百年滅壞今靈隱在像法滅壞之秋具和尚獨力鼎新功勛莫大焉為志梵宇第四寺自晉咸和間理公開山山門榜曰絶勝覺場葛洪所書正殿曰覺皇寶殿為宋理宗御書五季隋興廢莫考至唐初自宋之問咏靈隱詩承聯未就繞廊行吟駱賓王時避禍隱于僧乃續曰樓觀滄海日門聽浙江潮之問欣然用之靈隱之名大著大曆六年修會昌廢教寺毀僧散後稍興復規制未宏至吳越錢忠懿王國富民殷命永明延壽禪師重為開拓殿宇一新建石幢二殿仍覺皇之舊殿後為千佛閣最後為法堂以東空建百尺彌勒閣宋真宗景德四年賜稱景德靈隱禪寺南渡後高孝二宗翠華屢幸理廟親灑宸翰增輝山水當時號稱禪窟為五名山之第二山焉改法堂為直指堂賜直指堂印元至大元年殿歲久蠹朽住持正傳撤故為新皇慶元年落成至正己亥燬于兵癸卯住持輔良始建方丈伽藍堂明洪武十七年住持慧明重建覺皇殿永樂元年僧善才募施裝塑大佛諸天及諸供具宣德五年閏十二月八日覺皇殿災九年住持曇瓚建左右翼門住持良玠重建正殿復還舊觀隆慶三年三月燬于雷火萬曆壬午住持如通開講説法士庶雲集五年鳩工飭材百廢具舉以癸未冬十二月始事越五年落成殿倣唐式用柱平頭四十八石柱十六易名大雄寶殿越今六十餘年寺穨廢存者十無一二大殿直指堂轉輪殿亦僅存而已大清御世順治己丑春二月各房僧衆暨外護合力敦請具德和尚住院和尚相隨數百僧戮力締造庚寅營造方始堂室次第鼎新戊戌三月草六大殿災天將以除舊布新屬和尚也辛丑七月十七日大殿與天王殿同日鼎建十八年間營造無不高大寬敞丹碧一新凡為殿者七天王殿大雄寶殿藏殿伽藍殿羅漢殿金光明殿大悲殿為堂者十二祖堂法堂直指堂大樹堂東禪堂西禪堂東戒堂西戒堂齋堂客堂擇木堂南鑑堂為閣者四華嚴閣聯燈閣焚香閣青蓮閣為軒者三面壁軒青猊軒慧日軒為林者一玉樹林為樓者三響水樓看月樓萬竹樓為房為室為公所者十雙桂室香積廚圃室浴室各寮房公所而鐘樓增建為古百尺彌勒閣計自斬荊誅棘以迄落成辛勤瘏瘁二十餘年致殿閣巍峩堂寮鱗砌佛像嚴麗金碧輝煌從內至外無一殿一堂一樓一閣一房一舍不脫體斬新者雖曰重興實同開創蓋代功迹古今未有也大殿天王殿鐘樓皆募檀信其餘都積香信為之錢糧巨萬一時湊集真千年香火萬年常住臨濟光明三峰法道永久不替晦山和尚補五載之內完飛來峰牌坊建具和尚慧日塔院置普同塔三座其他未竟容次補入開列新建殿堂樓閣寮舍莊院名目大雄寶殿高十三丈五尺規制宏敞丹雘精麗不減化樂天宮為九州名山之冠順治辛丑年七月十七日建天王殿高七丈辛丑年七月十七日與大殿同日建輪藏殿順治庚寅春移建于東首鐘樓南伽藍殿康熙壬寅秋建于華嚴閣右即妙應閣舊址羅漢殿五十四間順治戊戌冬建于西禪堂之下金光明殿九間順治乙未秋建于蘸筆池上大悲殿六間順治戊戌春建在聯燈閣後蘸筆池前祖師殿八間順治乙未冬建于羅漢殿之下法堂高七丈二尺五間順治戊戌十二月十日建宋時指心堂明正統間僧玹理建毀萬曆乙酉僧如通建大殿災後具和尚先建法堂于殿後是指心堂故址也下戒壇一座方丈直指堂高六丈七尺癸卯年十一月十日建面壁軒樓七間高三丈七尺順治十三年冬建在方丈之左青猊軒樓六間高三丈六尺順治十四年冬建在方丈之右小方丈樓上下一間一路癸卯年建在青猊軒之左靜室四間高一丈二尺在小方丈樓之右東耳樓一間一路獅子窟高一丈八尺六間在方丈之前大樹堂因西栗樹為西晉慧理祖手植巨數十圍枝幹參天置堂其下高二丈一尺五間兩廂乙巳九月二十八日建在方丈後即見山亭故址初為茅篷今為瓦屋東禪堂五間順治十五年秋建在法堂之東西禪堂五間廂房二間順治己亥春建在法堂之西慧日塔重興靈隱具老和尚肉身在此五間康熙戊申秋晦山和尚鼎建即慧日軒故址南鑑堂六間康熙壬寅秋建在聯燈閣之右齋堂今攺樓名香積七間順治壬辰冬建在山門之左聯燈閣五間在華嚴閣後以二學人同日得悟故建華嚴閣五間在梵香閣之後康熙壬寅冬建華嚴閣廂樓九間壬寅冬建同日與華嚴閣上梁華嚴閣小方丈上下一間壬寅冬建與華嚴閣同日上梁青蓮閣即集翠樓順治辛卯秋建在華嚴閣之前梵香閣在齋堂之後五間順治丁酉秋建嫩桂堂十間順治乙未秋建在東禪堂東側玉樹林九間康熙戊申秋晦和尚建為慧日塔院之左輔法壽堂即經書寮七間康熙戊申秋晦和尚建為塔院之右輔官客樓五間康熙壬寅冬建在伽藍殿下官客公所五間廂樓五間順治乙未秋建響水樓在香積樓之前萬竹樓在公所西因竹取名今為妙應閣鐘樓順治壬寅夏建在藏殿之上古百尺彌勒閣處也看月樓五間順治辛卯秋建今為米庫樓直歲樓兩間順治辛卯冬建廚房樓四間順治辛卯冬建廚房七間順治丁酉秋建庫房樓五間順治庚寅夏建知浴樓五間順治丁酉秋建浴寮五間康熙壬寅秋建雜務寮九間順治丁酉秋建柴房三間順治丁酉秋建菜園七間中奉無著禪師塔有二廂房梅園房五間新增建擇木堂在祖師殿之下五間茶房在南鑑堂之上普同塔院三間二脅樓三間廂房四間康熙丁未夏建在天聖院之側具和尚同晦和尚建總管殿三間遷于東岡之上柴寮在澑砂嶺樓五間佛堂五間廚房浴室三間兩廂房四間順治辛卯春建寶勝菴即放生所在金沙灘佛堂五間廚房四間生所五間柴房二間順治乙未秋建松木場下院大悲菴樓房五間康熙二年置廂房一帶晦和尚增建江干下院接雲菴樓房五間平屋五間廂房四間茶房三間順治十六年建明萬曆癸未易菴建置附載山門為最勝覺場左曰東林會勝右曰西竺分奇進為天王殿金剛四列峙中彌勒又進為正殿所謂唐殿式者也中奉三世尊佛後為五百羅漢湧壁後列十二圓覺菩薩梵王帝釋十八尊天又進即舊鐵塔建藏輪殿三又進舊法堂五僧玹理建而易菴重修之也又進上坡為方丈直指堂元輔良所重建者易菴以為法堂也其餘伽藍殿之在左祖師堂之在右改安遇堂為蓮峰堂改千佛閣為三藏殿亦約略可得而數焉明宣德七年舊志本山寺基號址附載維字一號至十號十一號舊有山九十八畝三分民山一十五頃七十八畝八分東至集慶寺牆西至上永福寺路南至飛來峰頂北至北高峰各分水為界本縣本寺官民田山共一百九十八頃九十八畝八分九釐一毫今昔雖殊附載于此以存舊也元賜還九里松行路碑附載長生添氣力裏大福蔭護助裏皇帝聖旨浙江行中書省行御史臺官人每根底廉訪轉運司官人每根底迹賦總管府官人每根底軍官每根底軍人每根底城子裏達魯花赤官人每根底各枝兒目每根底衆和尚百姓每根底宣諭的聖旨語雖不可句然亦以見一代典制且知九里松之屬靈隱唐宋以來未之有改也宋天聖三年皇太后賜錢買田數附載收買杭州錢唐縣山林田土五頃鹽官縣思亭鄉水田一千頃秀州崇德縣積善鄉水田一千頃并免秋糧夏稅宋天聖三年中書門下牒附載杭州靈隱山景德靈隱寺住持僧禪定大師延珊奏先奉皇太后聖旨宣賜莊田祝延今上皇帝聖壽今已五年纍設過齋僧粥食四十餘萬祝兩宮聖壽其田土見今供納秋夏二稅紬絹三十四匹赤線二十一兩二錢米共計七十三石七斗係屬杭州秀州兩處鄉縣乞與放免上件稅物取聖旨牒奉勑宜令逐州子細勘會如委實是宣賜莊田據合納夏秋二稅並與放免即不得將不係宣賜田土稅一例放免牒至準勑故牒天聖八年十二月六日牒工部侍郎參知政事王曾給事中參知政事薛奎給事中參知政事陳堯佐吏部侍郎平章政事吕夷簡其後洪武中僧淳朋以時代移易獻還朝復賜三千畝先勑見存後徐華亭相公當國僧大茂以田被占奏聞至今本寺管業也附志于此以見纍朝恩遇本寺基産不同于他山者如此舊志靈隱別業附載種德菴坐落松江府青浦縣師字墟寶壽寺坐落本府餘杭縣大遮山菴坐落本縣崇化鄉永壽院坐落本府富陽縣桃源寺坐落本府臨安縣唐宋以來靈隱殿室舊名附載絶勝覺場覺皇殿回廊延賓水閣百尺彌勒閣一笑軒交蘆室妙應閣安遇堂千佛殿蓮峰堂直指堂妙莊嚴域見山亭面壁軒其名列此詳見古迹舊志諸僧續創菴房附載歸雲菴雙桂菴淨居菴天香菴庫司房已上寺東無垢院蒙堂選佛齋祇園幻隱菴普覺菴涵澤菴澗西菴一默菴慎菴即岣嶁山房已上寺西韜光菴白雲菴華光廟元帥殿永安塔院已上方丈後山半至頂古塔西域尚火葬佛滅度舍利盈斛在在處處皆建塔以供養長干塔乃赤烏二年康僧會西向頂禮三七日求而得之者為震旦佛塔之祖中有小塔藏佛舍利時放光四明阿育王塔舍利隨人根器色光不一松江龍華塔每歲八月望夜萬塔來朝于水中見光芒萬道交映如蛇如虹不可形容此又塔之王也後世僧歿茶毗凡有舍利者皆得建塔又有肉身建塔院者自四祖五祖六祖來舊矣靈隱自理公以來建塔至多為志古塔第五唐塔理公塔在龍泓洞口砌高三丈萬曆丁亥六月為霖雨所圮中獲石刻云開寶八年募衆重建釋迦磚一座在清繞橋靈山里則回龍橋舊名清繞矣又有鐵小塔一鐵盒一內沈香四片帛一方觸手如蝶翅閲庚寅二月僧如通重建開其基見一孔甚堅以手探得陶龕之底遂復封瘞而藏之郡人虞考功淳熙為之銘隋塔神尼舍利塔在飛來峰頂隋仁壽二年遣僧賫舍利至此相基啓土劚得石坎以舍利函納之不差尺寸按神尼乃同州般若寺尼名智仙隋文帝始生尼知其貴太祖委尼保育一日皇妣來抱見兒成龍形驚墜地尼訝曰誰驚吾兒致令晚得天下及帝長即位後令天下造佛塔而以尼舍利函遣僧至靈山建塔焉真觀塔在東岡嶺觀法師手所標葬地也久圮宋慈雲募王欽若重修甓甃甚工慈雲有詩以識其序曰上門自開一無遺物不知全身隨多寶以證經乎象佛壠以化往乎今塔有石鑿一僧坐其中像亦甚古唐塔鳥窠禪師塔古云在靈隱山見孤山知圓白蓮社主碑然鳥窠塔今實在鳳林想移去也仍舊志姑存之北高峰塔唐天寶中建高七層藏古佛舍利會昌時毀大中年復建吳越武肅忠懿復重修之宋至道二年燬於雷火元豐間圓明大師重建咸淳七年燬繼又建萬曆間存燼餘三層今於順治壬辰年復圮修證了義法師塔在廢天台吳越塔無著禪師塔舊在石人嶺天復二年宣城賊田頵等縱兵發師塔肉身不壞爪髮俱長武肅王遣禆將邵志重加封瘞宋楊沂王毀塔遷葬靈隱無垢院韓托胄取為生墳遂啓陶龕容色如生髮垂至肩指甲纏繞三日不壞順治庚寅八月具德和尚治圃室于寺東舉钁而陶龕𡎺破一穴見有禪師端坐髮爪圍繞四大如生寺中耆宿咸謂是無著禪師具和尚急命封掩為鑿石建塔覆以塔院五間置香燈奉事焉宋塔瑞光卧塔月桂峰下慈雲示寂有大星墮地因葬其地延珊禪師塔在廢天聖寺普慈大師塔即幻旻也契嵩為之銘在呼猿澗北永安禪師塔舊為契嵩之退居即其地建塔因茶毗五種不壞號五相堅固之塔具德和尚重修玄本禪師塔在瑞雲別院白蓮社主塔為圓淨大師名省常遠嗣廬山唱教西湖鳥窠禪師塔側南宋塔瞎堂禪師塔在廢天聖寺明初被某指揮乞葬其地及發塔不克至以火煉其石石亦不裂計力已窮遂於塔後數尺許下葬焉乃令以塔為祭石也懶菴安禪師塔在永安院松源禪師塔在北高峰麓石鼓禪師塔永安院側具和尚重修鐵牛禪師塔在處妙峰禪師塔在寺西岡元塔普覺朋禪師塔即淳朋禪師普覺房山後良用貞禪師塔在靈隱歸雲菴明塔幻隱禪師塔在幻隱房見心禪師塔在天香菴欣悟禪師塔在東岡無文禪師塔在雙桂菴可淳禪師塔在涵澤房幻菴修禪師塔在永安院側幻菴本寺八十五代住持慎菴祥禪師塔在祇園房有廣原行業記曇瓚師塔宣德年住持興建大殿者北峰讚塔在澗西月用禪師塔師俗姓江與弟之浙俱以文章道義自命故錢唐有二江也師厭棄塵俗即時受具出家參無上義行腳幾載而示寂靈隱具和尚即命塔於妙應梅塢而屬淨寺豁公為之舉火同時會葬者數十百人所著有蝶菴集行世古迹從來名山勝地必多古迹此皆前人眼光所射神情所注之處即歲久湮沒其名尚存人至此無不為之徘徊思得一見焉而况名山如武林大剎如靈隱者乎或為仙真棲託或為帝王遊幸或為仕宦蒞止或為大家別業或為名人名士登眺品題其處至今有可得見有不可得見者一一備列為志古迹第六山門二石幢高十許丈凡十三層用鐵鎔灌堅不可動吳越王大元帥建周圍列尊勝咒丹墀二石塔高可五七丈九層上有石扁書吳興廣濟普恩真身寶塔十字二塔所題皆同而無年代日月山中舊物所存唯此其塔八方下刻佛頂首陀羅尼二塔皆同按契經陀羅尼者此云總持其曰廣曰普者顯密圓通經謂陀羅利益有十如護國壽民時和歲豐疾疫刀兵惡獸鬼魅五無間十惡逆皆滅故云廣普也曰真身者陀羅尼乃三藏之祕密佛之真身所在又凡寶塔中皆有多寶佛真身也又按佛塔有生身碎身全身真身者成論云乘如實道來成正覺此真身如來也合三説而真身之義得矣塔上所鐫佛皆梁像此或惠理之後六朝僧所為耳其無歲年者豈以朝梁暮陳故耶西部都尉治在武林山錢唐縣舊治水經靈隱巖有錢唐故縣西漢有錢唐東漢無錢唐於晉復有縣也左軍教場宋設在行春橋北即部司前軍寨飛來峰坊笑翁堪闢寺前屠沽之地為立關建坊也二寺門即天竺靈隱牌坊袁居中書今飛來峰坊稍下跨大街白樂天詩云兩寺原從一寺分是也今址尚存袁公松門跨路如一字然吳説為書九里松三字今作一字門者非冷泉亭唐刺史元藇建白樂天書冷泉二字東坡續書亭字今董宗伯其昌重書陳徵君繼儒書對用王維泉聲咽危石日色冷青松之句最合客兒亭客兒靈運小字盧元輔詩長松晉家樹絶頂客兒亭是也一稱夢謝亭杜明甫為靈運建袁君亭後人思慕袁君建見山亭唐給事盧元輔建在靈隱寺後山半羣山奔赴皆供目睫故名一曰巢雲虛白亭元和間刺史相里君建沂溪傍口林泉豁爽故名虛白也觀風亭裴庶子棠棣建在虛白亭又西同上虛白亭俱在包園候仙亭韓僕射皋建在觀風亭又西自見山以下四亭并冷泉亭為五亭也紫微亭紫微舍人唐詢建在靈隱寺前壑雷亭在石門澗上宋安撫趙與𥲅建紫微亭韓世忠忤秦檜解樞柄逍遙湖上最愛此山故建此亭邵古菴曰紹興十一年冬嶽飛死十二年三月韓公即建此亭謝兵柄時獨遊焉按嶽飛有登池州翠微亭詩曰經年塵土滿征衣特地尋芳上翠微好水好山看未足馬蹄催趂月明歸韓當時憶嶽此詩故以名亭而亦隱痛之也亭在飛來峰半春淙亭合澗橋見貝瓊記清繞橋吳越時名今稱回龍橋東西行春橋東在麯院西在九里松也合澗橋南北澗水會于橋下故為合澗也瀑雷橋在冷泉亭上石橋亦謂石梁飛來峰頂近翻經臺杜明甫宅在飛來峰丁翰之宅在龍泓洞顛仙廬顛仙姓鄭在呼猿洞口紫芝道院宋咸淳間道士陳崇真卜居于此北高峰東俗名慶化山朱墅梁隱士朱世卿別業在九里松鄴公菴宋守祖無擇建在石筍峰稱鄴公者是其封號未可知也有蘇子瞻秦少遊黃魯直留題文與可畫竹在焉香林園蘇仲虎尚書園在九里松班衣園韓世忠別墅書藏蘇和藏書之所岣嶁山房靈隱澗西李元昭結廬于此丹竈堂葛洪煉丹之所思真堂許邁宅九師堂一曰隱居堂陸偉建偉讀易於此為淮南九師也西嶺草堂道標所居東嶺草堂慈雲懺主之所建也懺主名遵式僧伽不載而獨載此者何也僧伽止載靈隱僧慈雲行雖高例不得列若其遺迹則所謂兩寺原從一寺分安可以不列也是故七葉堂九品觀堂咸得類見焉七葉堂白樂天詩有宜人七葉堂之句金光明懺堂建炎三年帝狩台州至金鼇山寂然空靜惟聞廣殿香清有白髮老僧禱諸天於佛前憂時保國語意誠篤帝悅而問之對曰此護國金光明三昧懺也是後駐蹕杭州靈隱諸巨剎咸賜金帛修金光明懺今其基在梅園是高宗所建也九品觀堂在天聖寺疑亦慈雲所建翻經臺謝客兒于杜明甫翻經處飯猿臺在呼猿洞口廣丈許高二尺僧智一居此畜猿好事者每來施猿食故有臺也無量壽閣靈鷲山側輪藏閣本千佛閣明萬曆時重建中置轉輪以奉法寶計六百三十八函董公宗伯其昌匾曰輪藏閣故從今名也百尺彌勒閣在舊東廊之外延賓水閣在石門之東背山而臨水望海閣北高峰頂蘇東坡有詩滴翠軒在靈鷲寺一笑軒見孝宗御語巖石室即理公巖室交蘆室即遠瞎堂所居明真宮在九里松旁宋嘉定中建寧宗書匾疑為道院也並駝巘嶺下至靈隱左右各建置不一其所流傳者如興福院資德廟萬壽院靈曜觀崇壽院升仙宮多福院大明寺永清寺履泰將軍廟或為蘭若或為道院或為香火院或為土地祠略為疏記不能盡詳也天醫波利多院在飛來峰宋淳熙間天醫菩薩顯化之迹也鐵舌菴靈隱寺內惠遠茶毗舌不化為鐵舌韜光菴以韜光禪師得名菴有金蓮池獅子石烏峰吳越王改建名廣嚴菴大中祥符間復改今名有丞相陳堯佐題白雲菴在方丈後僧清覺孔子後號本然居此天聖寺靈隱寺內靈峰院水缸塢內宋時建今廢無垢院寺後方丈處海峰菴亦在本寺華光廟在北高峰頂以奉五顯神者宋嘉定中范師孟事頗著奇異詳見碎録元帥殿在北高峰山半以祀潮神總管堂靈隱寺內舊時敕封王念二總管不在十八伽藍之列陳明大王祠在北高峰麓王姓陳名澤本餘杭令東坡祠在靈鷲寺邦人初祀公蘇隄呂惠卿奏毀之此又寺僧所建也土地過海大王祠在月桂峰麓傳言錢王子有墳在塢內輦路路砌為墄者南宋時為翠華幸臨也今制存舊麯院路趙安撫與𥲅新堤從麯院以通靈竺也椒園靈隱種椒處椒香勝他處呼猿洞舊路內可通中竺此出十三州志今中竺後既填山塍一條洞後門並不可得或土石崩泐未可知也靈隱舊小路在寺左乃靈隱上菜園也宋時屠沽在此地住持笑翁始闢為園吳寺團吳太后香火寺前聚也靈隱寺對吳寺橋菜園在靈山下今不存上菜園下菜園理宗為閻妃香火建集慶寺以古蕩田千畝易之法安院弄今名法安弄也舊靈鷲寺在飛來峰麓理祖來武林先建此寺宋嘉熙初改興聖寺元末毀今為張公墓
