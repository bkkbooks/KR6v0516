front:
  text: 靈隱寺位於浙江杭州西湖靈隱山靈隱山與天竺山合稱武林距城十餘里其山控湖扼江有龍盤鳳翥之狀為仙靈區宅其呼猿洞與冷泉亭乃錢塘八景之一寺始建於東晉咸和三年三二八為竺僧慧理所創葛洪書山門榜曰絶勝覺場此寺於隋前之興廢莫考至唐代駱賓王避禍隱于此靈隱之名大著大曆六年七七一重修會昌八四一八四六廢教寺毀僧散後稍興復規制未宏至吳越錢忠懿王時命永明延壽禪師重為開拓殿宇一新宋真宗景德四年一七賜稱景德靈隱禪寺宋室南渡後高宗孝宗翠華屢幸當時號稱禪窟為五名山之第二元至正十九年一三五九寺毀於兵二十三年一三六三重建明洪武永樂宣德數度興建復還舊觀隆慶三年一五六九燬於雷火萬曆間重建其後經戰亂寺殿多毀清順治年間宏禮重建康熙二十八年一六八九賜名雲林寺此後均稱雲林寺寺志舊有明萬曆間白珩所修稿清康熙二年一六六三孫治重修為十二卷十年一六七一徐增就孫志重編為八卷分為十四門開山重興山水梵宇古塔古蹟禪祖法語檀越人物藝文詩遺事雜記後附山地蕩總目開山重興山水三門記建置梵宇古塔古蹟記形勝禪祖記歷代住持之傳略法語載高僧上堂語録檀越人物記與本寺有關之人物藝文詩遺事雜記則録歷代詩文碑記與遺聞逸事也山地蕩總目則載本寺之田産也康熙以前靈隱寺文獻略備於此因志成之時在康熙賜名之前故仍以靈隱寺名此志初刻於康熙十一年一六七二茲據光緒十四年一八八八錢塘丁氏重刋本景印欽定四庫全書提要靈隱寺志八卷兩淮馬裕家藏本國朝孫治撰徐增重編治字宇台仁和人增字子能吳縣人其書因明萬曆中昌黎白珩之志稍增損之體例與他志略同惟以宦遊寄寓之人概收之人物一門則事涉創造於義未安序方內名山祖席琳宮莫不有志一以顯山川名勝二以表興創功勛次則人物雄奇宮殿瑰麗畋漁舊聞搜羅怪異建置沿革之由再造中興之績莫不綺綰繡錯纖毫備載顧以天下靈山區中名勝獨可以無志乎又況靈隱以一百餘代禪祖之後其中或開創或重興或建功業幾條或置殿堂幾帶功業難泯莫不表揚獨先師具德老人荼瘁二十餘年舉全座靈山尺寸而鼎興之從外至內殿閣巍峩堂寮鱗砌佛像嚴麗金碧輝煌隨一殿一堂一房一舍一樓一閣皆一手擎出脫體斬新雖曰重興實同開創又可以無志乎有志也唐宋以來舊志有無不可得考所見者白珩子佩氏之志而已白志太略又用筆近俚搜討未備不成佳書先師重建靈隱之後又有志矣則吾友孫宇台祉翁之筆也宇台於先師重建功業極力發揮已十有六七獨於靈隱名勝開章發軔辨論太多紆回曲折樂成辨駮山水之書似乖傳信先師臨上雙徑手是編親授顯囑以校讐付刻戒顯一覽覺多所未安適吾吳門故友徐子能氏惠顧冷泉余乃篤留館之丈室初屬塗抹拙集次舉白孫二志力求典竄子能乃焚膏繼晷盡力校讎研磨秃盡管城坐穿皋比閲一載而後成舉白志之俚俗者而雅馴之孫志之迂曲者而直捷之肰後開門見山如飛來冷泉舉目洞達先師重興大業蓋天蓋地和盤託出矣有此書也不惟先師血汗永耀靈山并一百餘代禪祖其崩崖裂石之法語餐冰嚼雪之高風及古今巨公偉人奇文異藻囊括殆盡雖不比二酉厔𥂕之藏以此懸之國門名山豈不共昭垂不朽哉爰付剞劂質之大方靈山一會從此永遠未散矣康熙歲次壬子閏七月既望靈隱嗣法繼席門人戒顯百和南撰序昔大聖人之立教垂世也皆有時節因緣蓋不於前不於後適當其際因時制宜之謂也釋迦老子說法四十九年三百餘會始以因緣次以境智終以般若解脫末後拈花此正法之時節因緣也既而阿難結集鳩摩羅什翻譯乃至康僧會之建塔梁武帝之懺法此象法之時節因緣也是時講席彌天法師爭立妙論狃于文字達摩從西天來直提正令掃盡見聞此祖師之時節因緣也今已在末法中矣興末法之聖人豈尚有待歟蒼生困苦已深末法之聖人其心不知若何汲汲而無如時節因緣之未至也震旦自孔子述經後五六百年聖教漸遠司馬遷本太史公以成史記于是班固從而效之輯前漢一代事蹟而為書自此而降代各一書故有二十一史之稱史記中列八書前漢書乃變而為十志後世人又效之于是郡縣有志寺亦有志此武林靈隱寺志所由來也靈隱寺志最初者已不可得見所得見者白志與孫志耳白子佩氏為易菴大師修志在明萬曆壬辰孫宇台氏為具德和尚修志在康熙癸卯九年冬余過靈隱時晦山和尚住持屬余重修之鄭夾漈嘗有言志者憲章之所賴非深于典故者不能江文通亦云修史之難莫過于志吾輩不諳法門事則修寺志不尤難乎史遷謂之整齊故事一似易之此在子長則然後漢而下正以整齊為難耳余幼嘗侍教于大君子矣習其緒論今余已六十衰遲自棄從不敢身預其事茲既已有人整齊之而余何必復修之修之而余不辭者蓋有故焉聖歎嘗言之適幸作得一篇文字可惜早間欲作而為他事所奪失卻一篇文字假今不作明日作當更另有一篇文字此深知時節因緣之道者也是故在易菴時有易菴時之靈隱志書在具和尚時有具和尚時之靈隱志書在晦和尚時又有晦和尚時之靈隱志書時節因緣先後固不得相假也雖然人各有心各如其面用我之手握我之筆發抒我之意以為我所修之志各求其當遑計修志之前有其人焉不敢與之或有異同又遑計吾志修之後有其人焉與我絶不異同也即我既修之後屬我重修我亦不能必其無異同焉我總聽之于時節因緣而已矣康熙十年歲在辛亥夏六月望日吳門徐增子能氏書于靈隱寺面壁軒序樵者於樵之外無所事焉然武林為佳山水而樵者又生長其間則安得默然而已耶具德禮和尚臨濟之大宗匠也其以衆人之請而來至此也蓋翦其蓬蒿而居之越十有三載而琳宮梵宇煥然而鼎新焉樵者樂山林之寵榮又不可以無志雖然靈隱有志前此矣萬曆三年昌黎白氏之所修者吾見之矣白氏為志凡三易稿而帝虎雜出年祀淆亂況以陋劣如樵者哉雖然以大師之靈竭樵之志慮則於今昔記載或冀其有當於萬一焉耳若以比方於楊衒之之洛陽伽藍則樵豈敢康熙二年癸卯秋七月西山樵者孫治撰武林靈隱寺志序名山多有志而作者殊難其人非作者之難其人而名山之難志也蓋紀事務奇則怪迂以濫耳標理猥并則龐雜以淆目而徑露寡聞者畏上古如雷門好奇弔詭者視世俗如蒙茸甚矣名山之難志而益以見作者之難其人也豫讀樵者志靈隱十二卷雅而不誣贍而有體其舉賾也雖幽隱不廢其述類也雖猥近不遺斌斌乎置于古作者之間又奚疑焉余生長武林喜述舊聞即如葛立之鶴林玉露僧懷顯錢唐勝蹟傅牧西湖古事周益公平園日記牟應隆隆山雜記四水潛夫武林舊事楊瑀山居新録嶽珂桯史劉孟熙霏屑録葉子奇草木子之類名不能盡述而存者或寡樵者網羅無所缺失按部就班入其中者如𤣥圃西山侯鯖獺髓無以異也又其逸氣雋句又如讀先秦以上檀考公穀之書豫驚怖其言而無極也然則具德和尚重興靈隱功冠八紘道光千載而斯志直空前後其不朽矣乎樵者為誰豫友孫子宇台孫子之稱西山樵者蓋其志也康熙二年歲次癸卯秋八月嚴沆皓亭氏撰靈隱寺志總目序山圖卷之一開山重興山水卷之二梵宇古塔古蹟卷之三上禪祖卷之三下禪祖卷之四法語卷之五上檀越卷之五下人物卷之六上藝文碑記卷之六下藝文記序志表書疏贊言論銘卷之七藝文跋啓塔銘塔表行狀卷之八附山地數詩遺事雜記山地蕩總目舊存檀施續置
