body:
  text: 住持禪祖明教契嵩禪師雲門宗字仲靈鐔津李氏子得法於洞山曉聰夜則頂戴觀世音像誦其號必滿十萬自是世間經書不學而能作原教論十餘萬言明儒釋之道一貫以抗排佛之說讀者畏服後居靈隱山永安蘭若著禪門定祖圖傳法正宗記輔教編上進宋仁宗覽之嘉歎付傳法院編次入藏下詔褒寵賜號明教大師執政韓琦參政歐陽修皆見而尊禮之還山熙寧五年六月四日晨興示偈曰後夜月初明吾今喜獨行不學大梅老貪聞鼯鼠聲至中夜而逝茶毘五種不壞其頂骨出舍利紅白晶潔如大菽者三師有文集二十卷目曰鐔津盛行於世玄本禪師法眼宗支提隆公嗣僧問蚌含未剖時如何師曰光從何來問臨濟入門便喝德山入門便棒此意如何師曰天晴不肯走師見僧看經笑曰看經不識經徒勞損眼睛欲得不損眼分明識取經雪竇重顯禪師雲門宗字隱之遂寧人姓李參北塔祚公盡其道法將造錢塘值曾學士於淮南以書薦於珊禪師顯至靈隱寺浮沈眾中曾奉使歸訪師靈隱無識之者於淨頭寮舍物色得之曾問向附書顯出袖中納之曰公意勤勤然行腳人非書郵也珊大奇之有為道日損偈曰三分光陰二蚤過靈臺一點不揩磨區區逐日貪生去喚不回頭爭奈何師嘗應翠峰請於靈隱陞座僧問寶座先登於此日請師一句震雷音師曰徒勞側耳進云恁麼則一音普遍於沙界大眾無不盡皆聞師云忽有一人問爾作麼生舉僧云三十年後敢為流通師云賺了也師乃云天下絕勝之覺場靈隱導師之廣座暫借卑僧陞陟實愧非材豈敢於五百員衲子前提唱佛祖抑揚古今衒耀知見恥他先作假饒得天雨四花地分六震於曹溪路上一點使用不著何以行腳高士有把定世界函蓋乾坤底眼誰敢錯悞絲毫其知有者必共相悉皇祐四年七月七日示寂塔雪竇本然清覺宗師白雲菴主為孔子五十二世孫少穎悟閱法華經有省求出家元祐八年至靈隱後建白雲菴以居開闡玄化自立一宗曰白雲宗大觀毀教師著證宗論為忌者發之編管廣南思州後放歸作偈投太守游公指日為別至期而化寂室慧光禪師雲門宗錢塘夏侯氏慧林深公法嗣住靈隱僧問飛來峰山色示清淨法身合澗溪聲演廣長舌相正當恁麼時如何是雲門一曲師曰芭蕉葉上三更雨上堂不用求真何須息見倒騎牛兮入佛殿羌笛一聲天地空不知誰識瞿曇面佛智端裕禪師臨濟宗吳越王裔嗣圓悟勤累住名山紹興十八年被旨補靈隱慈寧皇太后幸韋王第召師演法賜金襴袈裟上堂曰德山入門便棒多向皮袋裏埋蹤臨濟入門便喝總在聲塵中出沒若是英靈衲子直須足下生風超越古今途轍拈拄杖子卓一下喝一喝云祇這個何似生若喚作棒喝磕睡未醒不喚作棒喝未識德山臨濟畢竟如何復卓一下曰總不得動著紹興庚午十月初示微疾至十八日首座法全請遺訓師曰盡此心意以道相資語絕而逝火後目睛齒舌不壞其地發光終夕得舍利者無計踰月不絕黃冠羅肇常平日問道於師適外歸獨無所獲道念勤切方與客食咀噍間若有物吐哺則舍利也大如椒色若琥珀好事持去遂再拜於闍維所聞香匣有聲亟開所獲如前而差紅潤門人奉遺骨分塔於鄮峰西峰謚大悟禪師慧淳圓智禪師雲門宗嗣長蘆和公住靈隱上堂云吾心似秋月碧潭清皎潔乃喝云寒山子話墮了也諸禪德皎潔無塵豈中秋之月可比虛明絕代非照世之珠可倫獨露乾坤光吞萬象普天帀地耀古騰今且道是個甚麼良久曰此夜一輪滿清光何處無紹興九年住張相公本寺大慧宗杲禪師臨濟宗字妙喜宣州寧國人姓奚氏其母初夢神人衞一僧黑頰而隆鼻造於卧室問其所居對曰嶽北覺而有姙及誕之日白光透一室時元祐四年己巳也紹興二十八年戊寅師年七十被旨遷住徑山於二月二十八日就靈隱寺開堂拈疏云這是釋迦老子四十九年三百六十餘會說不盡底其中妙義若敷演得皇恩佛恩一時報足其或未然卻請表白拈出宣疏了指法座云毘盧頂𩕳人人有志上頭行問著路頭十個有五雙不知去處諸人要識路頭麼良久云看遂陞座拈香祝聖罷又拈香云此一瓣香在兜率則曰仙陀婆在善變化天則曰奪意在阿那婆達多池邊則曰蓮華藏且道在徑山手中喚作甚麼良久云非但圜悟老人看即有分便是三世諸佛出來也不敢正眼覰著便燒乃就座靈隱和尚白槌云法筵龍象眾當觀第一義師云若論第一義五目莫覩二聽難聞要得諦當分明當須直截自觀作是觀者名為正觀若他觀者名為邪觀邪正未分有疑請問僧問調御出世三轉法輪於大千達摩西來九年面壁於少室和尚今日為國開堂未審超佛越祖一句作麼生道師云空裏忙忙書卍字進云直得四眾瞻仰萬姓歌謠去也師云卻被上座道著進云直饒道著也只得一半未審向上和尚還更道得也無師云八角磨盤空裏走進云記得肅宗帝問忠國師如何是十身調御國師云檀越踏毘盧頂上行未審意旨如何師云今古歷然進云頂門具眼爭謾得耀古騰今作者知師云收問靈山一會與今日是同是別師云如是我聞進云恁麼則靈山親見舉今日又重聞師云聞底事作麼生進云兩頭俱坐斷八面起清風師曰咭嘹舌頭三千里僧禮拜復有僧出師云問話且止縱饒問處如百川競注答處似巨海吞流直得維摩結舌鶖子無言於本分事上了無交涉且道本分事上合作麼生提持乃舉拂子云還見麼又擊禪牀云還聞麼聞見分明是個甚麼當今聖主於此得之以妙明心印印十方華藏世界海只在一塵中於一塵中垂衣治化演出無量無邊廣大如虛空不可思議殊勝功德利益法界一切有情所謂聖量廣大如虛空不可思議聖壽廣大如虛空不可思議聖學廣大如虛空不可思議乃至聖智聖慧聖慈聖聰皆悉廣大如虛空不可思議只者不可思議底亦不可思議都盧在一塵中皆聖心之常分非有假於他術滿朝文武諸貴官得之以妙明心印向各各當人腳跟下一印印定更無秋毫以為透漏所謂王事民事一一明了一一無差然後卷舒自在縱奪臨時皆吾心之常分非有假於他術一日一會若僧若俗若男若女若貴若賤得之各以妙明心印印之則隨其根性悉得受用一一明了一一無差皆吾心之常分非有假於他術且道徑山得之又作麼生還相委悉麼唯憑一滴曹溪水遍界為霖報我皇即將上來舉揚般若所有一毫之善祝延今上皇帝聖壽無疆恭願堯仁廣被齊日月之盛明湯德彌新並乾坤之久固皇太后中宮皇后大內天眷伏願同明般若正因悉獲金剛種智復舉波斯匿王問佛勝義諦中還有世俗諦否若言其有智不應一若言其無智不應二一二之義其義云何佛言大王汝於過去龍光佛所曾聞此義我今無說汝亦無聞無說無聞是名一義二義師召大眾云明明向汝道尚自不會豈況蓋覆將來今日或有人問徑山勝義諦中還有世俗諦否若言其有智不應一若言其無智不應二一二之義其義云何只向他道元首明哉股肱良哉是名一義亦名二義正當恁麼時還有向上事也無良久云任大也須從地起更高爭奈有天何久立眾慈伏惟珍重靈隱和尚再白槌云諦觀法王法法王法如是下座無菴法全禪師臨濟宗姑蘇陳氏子久依佛智每入室智以狗子無佛性話問之師罔對一日聞僧舉五祖頌云趙州露刃劍忽大悟有偈曰鼓吹轟轟袒半肩龍樓香噴益州船有時赤腳弄明月踏破五湖波底天佛智住靈隱師為第一座乾道己丑七月二十五日示寂火後舍利五色瞎堂慧遠禪師臨濟宗賜號佛海姓彭眉山金流鎮人師二手如日月參圜悟悟舉龎居士問馬祖不與萬法為侶因緣師忽頓悟仆於眾中良久曰吾夢覺矣至夜悟小參師出問曰淨躶裸空無一物赤骨律貧無一錢戶破家亡乞師賑濟悟曰七珍八寶一齊拏師曰禍不入謹家之門悟曰機不離位墮在毒海師隨聲便喝悟以拄杖擊禪牀云喫得棒也未師又喝悟連喝師便禮拜自此機鋒峻利目為鐵舌遠乾道六年勅住靈隱賜號佛海上堂新歲有來由烹茶上酒樓一雙為兩腳半個有三頭突出神難辨相逢鬼見愁倒吹無孔笛促拍舞涼州僧問文殊是七佛師如何出女子定不得師曰擔頭不掛針問菴內人為甚麼不知菴外事師曰拄杖挑蒺藜問不與萬法為侶者是甚麼人師曰腳踏轆轤問僧一大藏教是惡口如何是本身盧舍那僧曰天台普請南嶽遊山師別曰阿耨達池深四十丈闊四十丈乾道七年正月有旨令靈隱長老引見暇日召至選德殿三月七日復有旨令靈隱徑山長老同入選德殿乾道八年正月二十八日車駕幸靈隱至一笑軒交蘆室見師畫像曰此是畫的誰是真的師對曰春風和暖恭惟萬福淳熙乙未示眾曰淳熙二年閏季秋九月旦鬧處莫出頭冷地著眼看明暗不相干彼此分一半一種作貴人教誰買柴炭相喚相呼歸去來上元定是正月半都下喧傳而疑之明年果以上元示寂辭世偈抝折秤鎚掀翻露布突出機先鵶飛不度留七日顏色不變塔全身於寺右烏石峰壽七十四著御書集入藏覺阿侍者日本國人滕氏通天台教善書與法弟金慶奮然航海而來參瞎堂遠於靈隱後至長蘆江岸聞鼓聲大悟返靈隱述投機五偈其一曰航海來探教外傳要離知見脫蹄筌諸方參遍草鞵破水在澄潭月在天遠稱善後歸國濟顛祖師名道濟台州李氏子初參瞎堂知非凡器然飲酒食肉有若風狂監寺至不能容呈之瞎堂批云法門廣大豈不容一顛僧耶人遂不敢言及遠公既寂出居淨寺濟累顯神通奇異多端具見本傳不能悉載懶菴道樞禪師臨濟宗四安人姓徐嗣道場慧禪師隆興初詔住靈隱孝宗皇帝召至內殿問禪道之要師答以此事在陛下堂堂日用應機處本無知見起滅之分凡聖迷悟之別第護正念則與道相應應情卻物則業不能繫上為首肯數四後退居永安蘭若逍遙自適有偈題壁曰雪裏梅花香信息池中月色夜精神來年可是無佳趣莫把家風舉似人淳熙八年丙申八月坐逝塔於永安最菴道印禪師臨濟宗漢州人嗣大慧杲住持靈隱上堂云大雄山下虎南山鼈鼻蛇等閒撞著抱賞歸家若也不惜好手便與拔出重牙有麼有麼上堂云五五二十五擊碎虛空鼓大地不容針十方無寸土春生夏長復云何甜者甜兮苦者苦中秋上堂舉馬大師與西堂百丈南泉翫月公案師云垂絲千尺意在深潭西堂振鬣百丈擺尾雖則衝波激浪未免上他鉤線南泉自謂躍過禹門誰知依前落在巨網即今莫有絕羅籠出窠臼底麼也好出來露個消息貴知華藏門下不致寂寥其或未然此夜一輪滿清光何處無伊菴有權禪師臨濟宗姓祁昌化人佛智開法靈隱師參其會時無菴為第一座室中以從無住本建一切法為問權答曰暗裏穿針耳中出氣無菴可之遂密付心印佛智嘗問心包太虛量廓沙界時如何師曰大海不宿死屍智撫其座曰此子他日當據此座呵佛罵祖去後住常州華藏嗣道場全公淳熙庚子秋示微疾留偈趺坐而逝茶毘齒牙不壞舍利無算佛照德光禪師臨濟宗姓彭別號拙菴臨江軍人參大慧杲得悟師頭顱方正廣顙豐頤七處平滿相者稱當為帝王師淳熙四年詔住光孝寺師渡江而來上問古有浮笠而渡者可謂神通乎光曰宗門不貴神通也上問朕心與佛心是同是別光曰直下無第二人成一切性即心離一切相即佛又問釋迦六年雪山所成何事光曰將謂陛下忘卻帝大悅賜號佛照勅住靈隱嘉泰三年入寂有奏對錄行世誰菴了演禪師臨濟宗福州人嗣大慧杲住靈隱上堂云面門拶破天地懸殊打透牢關白雲萬里饒伊坐斷兩頭別有轉身三生六十劫也未夢見在喝一喝下座密菴咸杰禪師臨濟宗應菴華法嗣福州鄭氏子母夢廬山僧而生謁應菴於衢之明果菴問如何是正法眼師曰破沙盆菴頷之出世衢之烏巨嗣天童華禪師奉詔住靈隱上堂世尊不說說抝曲作直迦葉不聞聞望空啟告馬祖即心即佛懸羊頭賣狗肉趙州勘菴主貴買賤賣分文不直祇如文殊是七佛之師因甚出女子定不得河天月暈魚生子槲葉風微鹿養茸後住天童示寂塔太白中峰為本寺第一十八代祖鐵牛宗印禪師臨濟宗姓陳鹽官人嗣育王佛照光寧宗時住持靈隱上堂舉南泉示眾云王老師自小養一頭水牯牛擬向溪東牧不免食他國王水草向溪西牧亦不免食他國王水草如今不如隨分納些些總不見得頌曰不如隨分納些些喚作平常事已差綠草溪邊頭角露一簑煙雨屬誰家藴衷禪師雲門宗嗣中竺妙公松源崇岳禪師臨濟宗龍泉人姓吳參靈隱密菴杰指參不是心不是佛不是物得悟旋出世吳郡澄照徙江陰光孝無為冶父鄱陽薦福四明香山蘇之虎丘慶元三年被旨補靈隱示眾曰明眼衲僧如何打失鼻孔有賊無贜上堂大凡扶豎宗乘須具頂門正眼懸肘後靈符只如保壽開堂三聖推出一僧保壽便打三聖道與麼為人瞎卻鎮州一城人眼去在保壽擲下拄杖便歸方丈二尊宿等閒一挨一拶便乃發明臨濟心髓只是不知性命總在這僧手裏還有檢點得出者麼昔年覓火和煙得今日擔泉帶月歸嘉泰三年八月四日偈曰來無所來去無所去瞥轉玄關佛祖罔措跏趺而寂壽七十一坐夏四十舊誌為本寺二十三代祖全身塔北高峰之原待制陸游放翁銘其塔有曰讀師之語峻峭嶒崪下臨雲雨如五千仞之華山蹴天駕空駭心眩目如錢塘海門之濤虎豹股栗屋瓦震墮如漢軍昆陽之戰可謂臨濟正宗應菴密菴之真子孫也放翁其知言者哉破菴祖先禪師嗣密菴杰族出蜀廣安氏參密菴於風幡語大徹出世卧龍辭去遍遊吳中於靈隱笑菴悟處分第一座命說法無用淨全禪師臨濟宗姓翁越人嗣大慧杲師一至靈隱眾請上堂師曰靈山正派達者猶迷明來暗來誰當辨的雙收雙放孰辨端倪直讓千聖出來也祇結舌有分何以故人歸大國方為貴水到瀟湘始是清復曰適來松源和尚舉竹篦話令天童納敗闕諸人要知聽取一頌黑漆竹篦握起疾雷不及掩耳德山臨濟茫然懵底如何插嘴敬叟居簡禪師臨濟宗潼川龍氏世業儒依邑之廣福院圓澄得度參別峰塗毒於徑山往育王見佛照機契出世台之般若遷報恩真西山為江東部使者虛東林命之以疾辭乃於飛來峰北澗埽一室居之十年人不敢以字稱以北澗稱之趙節齋奉請補靈隱師笑曰吾日迫矣乃舉天童癡絕沖淳祐丙午春示疾三月二十八日索紙書偈於紙尾復書五月一日珍重六字至期昧爽索浴浴罷若假寐然視之已示寂矣壽八十三臘六十二有北澗集十九卷張誠子序其集曰讀其文宗密未知其伯仲誦其詩合參寥覺範為一人涵澤禪師住靈隱廣嚴道場問如何是廣嚴家風師曰一塢白雲三間茅屋如何是佛法大意曰出澗泉清高峰月白笑翁妙堪禪師臨濟宗毛氏子四明人參天童無用全公室中嘗示以狗子無佛性話一日全以竹篦劈口便打師應聲呈偈云大塗毒鼓轟天震地轉腦回頭橫屍萬里全頷之時朝廷奏令僧得買紫衣堪曰如是則財可主法矣抗疏廟堂其議遂寢以寺在屠沽之地闢為林藪立飛來峰門重樹羅公處約碑皆師事也春秋七十二石鼓希夷禪師臨濟宗嗣無用全公為本寺二十八代塔永安別苑今存和梁山遠禪師牧牛十頌句法與梁山相埒理趣超卓反有過焉一尋牛只管區區向別尋不知腳底已泥深幾回芳草斜陽裏一曲新豐空自吟二見跡枯木嵒前差路多草窠裏輥覺非麼腳跟若也隨他去未免當頭蹉過他三見牛識得形容認得聲戴嵩從此妙丹青徹頭徹尾渾相似仔細看來未十成四得牛牢把繩頭莫放渠幾多毛病未曾除徐徐驀鼻牽將去且要回頭識舊居五放牛甘分山林寄此身有時亦踏馬蹏塵不曾犯著人苗稼來往空勞背上人六騎牛還家指點前坡即是家旋吹銅角出煙霞忽然變作還家曲未必知音肻伯牙七忘牛存人闌內無牛趁出山煙簑雨笠亦空閒行歌行樂無拘繫嬴得一身天地間八人牛俱忘慚愧眾生界已空個中消息若為通後無來者前無去未審憑誰繼此宗九返本過源靈機不墮有無功見色聞聲不用聾昨夜金烏蜚入海曉來依舊一輪紅十入鄽垂手者漢親從異類來分明馬頷與驢顋一揮鐵棒如風疾萬戶千門盡豁開原肇禪師通州靜海潘氏子受具參浙翁於徑山命掌記由四明育王遷杭之淨慈靈隱嘗讚達摩偈曰踏翻地軸與天關合國人追不再還去去一身輕似葉長江千古浪如山無準師範禪師蜀之梓潼雍氏始見破菴於西華後破菴居靈隱第一座復往從之因侍破菴遊石筍菴菴之道者請益曰胡孫子捉不住乞師方便庵曰用捉他作麼如風吹水自然成文師在傍平生礙膺之物盡釋出世居徑山為臨濟正傳石田法薰禪師臨濟宗眉山彭氏子參破菴祖先室中舉世尊拈花迦葉微笑師云焦磚打着連底凍赤眼撞著火柴頭破菴陰奇之端平二年詔靈隱住持示眾云但得本莫愁末喚甚麼作本喚甚麼作末松柏千年青不入時人眼牡丹一日紅滿城公子醉退院保壽促辦終焉師累遷望剎閱三十有二年撙節足用而人咸樂施見世之為募者鷺伺狐探咨且囁嚅鄙且賤之而土木金碧在處成就焉嘗建接待寺於西溪曰寶壽癡絕道冲禪師臨濟宗武信人姓荀氏少長習進士業棄之受釋氏於梓州妙音院聞松源唱道於饒之薦福徑造其門以歲饑不受曹源以雲居首座出世妙果師聽其入門語有省嘉定己卯由徑山第一座出世嘉禾光孝淳祐甲辰有旨移靈隱謂是大父密菴伯父松源宏道之地也後理宗取下菜園地建閻妃功德寺即日退院躬荷包笠往遊廬山遣使留之不回乃賜靈隱古蕩千畝圩田若干畝與易後住徑山師才學浩瀚每日以一篋付侍者有求其語者投之篋中鐘定後侍者進篋秉燭隨紙多寡俱盡日以為常上堂有一人一念頓證墮在佛數有一人屢劫闡提不願成佛且道那個合受人天供養良久云蝶穿芳徑雙眉溼蜂掠殘花兩股肥臨示寂手書龕記并遺書十數且曰無準忌在三月十八日吾以十五日即行不能瓣香修供侍僧亟以遺偈請師謂曰末後一句無可商量只要個人直下承當即命筆書辭眾上堂語至夜分起坐移頃而逝壽八十二臘六十一茶毘舍利五色者無數妙峰之善禪師臨濟宗吳興劉氏子參佛照光於鄮山照舉風幡語師直箭機鋒蒙印可贈偈曰今日與君通一線斬釘截鐵起吾宗乃遊匡廬面壁妙高峰下十載出世慧因洪福萬年諸剎會天童虛席時鄭清之秉鈞軸謂非師莫宜居因勉師行師答曰老僧踰耄矣尚夜行不休乎鄭公高之僧問如何是不入眾流句師云烏龜鑽破壁僧曰如何是妙體無私句師云百匹馬中一頭驢僧云如何是瞬目揚眉句師云花雨岩前石點頭僧云如何是奇特事師曰紫薇花下紫薇郎僧云學人不會師云三十年後晚住靈隱上堂云久參高士眼空四海鼻孔撩天見也見得親說也說得親行也行得親用也用得親只是未識老僧拄杖子在何以故將成九仞之山不進一簣之土師平生善誘一經指授輒神融意悟端平二年九月示寂壽八十四臘七十一茶毘舍利不可數計塔靈隱西岡鄭清之為銘法嗣有徑山珍東叟穎友雲䥐霜林果無方安雪翁立高原祖泉禪師臨濟宗金山道奇法嗣上堂舉九祖伏䭾蜜多尊者問八祖佛䭾難提尊者父母非我親話頌曰父母分明非我親祖師肝膽向人傾直下若然親薦得優曇花發火中春贈黃漢嶺開接待偈曰路繞懸崖萬仞頭行人到此一場愁驀然得個休歇處重曡關山信腳遊笑菴了悟禪師臨濟宗姑蘇人天童杰法嗣上堂舉睦州因僧問以一重去一重即不問不以一重去一重時如何睦州曰昨朝栽茄子今日種冬瓜師頌曰昨朝栽茄子今日種冬瓜一聲河滿子明月落誰家虛舟普度禪師臨濟宗揚州人姓史氏稍長絕無處俗意母識其志俾依郡之天寧出家會與畢將軍遇大奇之曰此兒短小精悍音吐如鐘他日法中向上爪牙也攜歸武林禮東堂院祖信奮志參方初見鐵牛印於靈隱已而江東西湖南北悉遍歷焉時無得唱道饒州薦福師決志叩請其遷福嚴華藏亦與俱偶入室次得問不與萬法為侶者是甚麼人師曰金香爐下鐵崑崙得曰將為這矮子有長處見解只如此師曲躬作禮曰謝和尚證明景定間太傅賈魏公奏補中天竺請旨陞靈隱上堂舉臨濟和尚道有一人論劫在途中不離家舍有一人離家舍不在途中那個合受人天供養師曰兔馬無角羊牛有角寸毫尺釐天地寥廓潘閬倒騎驢攧殺黃幡綽師住徑山值火志圖復興將有緒俄示微恙索筆大書曰一十二年駕無底船踏翻歸去明月一天全身塔寺東十里罘塢之陽東谷光禪師臨濟宗嗣明極祚天童密孫也泰禪師曹洞宗雪庭裕法嗣芙蓉楷後也退耕寧禪師臨濟宗初住嘉興崇聖次之蘇居報恩慧日承天萬壽至靈隱上堂目前無法意在目前雨餘山色翠風暖鳥聲喧拍禪牀一下云堪笑老胡無轉智少室峰前坐九年上堂舉香林因僧問年窮歲暮話師頌曰王老燒錢言端語端錦包特石鐵裹泥團上堂極目千峰鎖翠滿空栁絮蜚緜可憐無位真人一向草宿露眠啞三春看又過何日是歸年大川普濟禪師臨濟宗奉化人元初住持靈隱纂修五燈會元嗣徑山如𤥎上堂舉睦州因僧問如何是祖師西來意州云一隊衲僧來一隊衲僧去頌曰一隊衲僧來一隊納僧去打破睦州關大地無寸土題世尊出山相偈曰龍章鳳質出王宮肘露衣穿下雪峰志願必空諸有界不知諸有幾時空虎巖淨伏禪師臨濟宗出世潭州石霜嗣虛舟度禪師至元二十六年住持築室虎頭巖蓮華峰麓而終焉如因禪師臨濟宗石田法嗣悅堂祖誾禪師臨濟宗南康人周氏子至杭見斷橋於淨慈橋問臨濟三遭黃檗痛棒是否師云是橋云因甚大愚肋下築三拳師云得人一牛還人一馬橋頷之橋逝柏山介石來補處室中舉柏子話師擬議石抗聲曰何不道黃鶴樓前鸚鵡洲師於言下頓悟元貞初奉詔赴闕稱旨賜璽書號通慧大德九年陞住靈隱嘗勘一僧云微塵諸佛在你舌上三歲聖教在你腳下何不瞥地僧罔措師便喝訣眾偈曰緣會而來緣散而去撞倒須彌虛空獨露春秋七十有五僧臘五十有二玉山德珍禪師臨濟宗南康人嗣虛舟度元初住靈隱奉旨入覲賜號佛光海印大師以歸偈頌脫口宛如宿成時有物出目中瑩潔如珠皆舍利也歐陽玄為塔銘正傳禪師臨濟宗至大元年住持靈隱覺皇殿蠹朽傾頹師捐資與平章張締建皇慶間落成元叟行端禪師臨濟宗臨海何氏子文字不由師授自然能通少愛靈隱山水清勝止焉自稱寒拾里人嗣徑山藏叟珍叟示寂至淨慈依石林鞏公虎岩伏時住徑山請師居第一座大德中住中天竺皇慶壬子遷靈隱尋賜號佛日普照凡三被金襴袈裟之寵辭歸養高於良渚之西菴以呵叱怒罵為門弟子慈切之誨以不近人情行天下大公之教師之利物皆陰為之而沒齒不言至正辛巳訣眾云本無生滅焉有去來冰河發燄鐵樹花開世壽八十八僧臘七十六全身窆於寂照院弟子住靈隱者竹泉淨林性原慧明天鏡原瀞其他古鼎銘夢堂噩楚石琦皆諸方之崢嶸者獨孤淳朋禪師賜號普覺常以定武蘭亭贈趙子昂欲與重結翰墨緣住持靈隱元延祐五年奉旨斷還九里松集慶占路上表謝其文云佛慧普覺大禪師杭州路景德靈隱禪寺住持臣僧淳朋言云云上堂云寺前一片閒田地曠大劫來無四至今朝恢復又歸來坐斷腳頭並腳尾東也是西也是南也北也無不是畢竟酬恩作麼生直指堂前香一炷圓通竹田禪師臨濟宗常住金陵諸處說法元至順三年迎歸住持本寺金陵諸山送師疏見後東嶼禪師臨濟宗松源之四傳也見宣政院疏為本寺五十二代禪師照菴慧炬律師照菴慧炬律師明天台教諸暨人住理公巖周伯琦為篆記與黃溍友善溍文章名天下求之者或遭怒罵惟於師了無所靳洪武初海潮衝岸壞民廬舍師為潮神說三皈戒楊枝灑處即止不崩時稱炬菩薩慧眼可光禪師靈隱僧述達摩西來留二十字如織錦迴文翻覆讀之成四十韻以接中下之機竹泉法林禪師臨濟宗別號了幻俗姓黃台之寧海人參元叟於中天竺東嶼在淨慈招分半座居淨慈蒙堂不出戶者九年至元四年遷靈隱宗風大振順帝錫以金襴法衣時寂照在徑山父子同時唱道五山人以為盛事上堂古杭管內靈隱名山肇建於東晉咸和年間慧理法師為第一祖今日上元令節諸處放燈知事值歲各各照管風燭便下座大龍翔席虛星吉大夫遣幣聘辭不赴使者三往返師遊於會稽山中行院知不可强具疏請師仍住靈隱又三年退處了幻菴至正十五年春感末疾二月二日集眾敘平生本末且誡之曰佛法下衰無甚於今宜各努力吾世緣止於斯矣索筆書偈曰七十二年虛空釘橛末後一句不說不說遂奄然而化龕留十日顏色不變全身窆於松源塔西塔前古桂當春吐花清香滿路見者歎异侍講學士黃公晉卿目見其事故自書塔銘序之見心來復禪師臨濟宗以南至生故也豐城人參南楚悅於徑山得其心要至元七年住靈隱洪武三年以十大高僧徵虞文靖黃文獻與結方外交為左覺義與太祖子蜀王甚善王就國命作正心觀道崇本敬賢四箴未幾以詩含諷被刑弟子曇鍠編其集宋學士濂序之稱其穠麗演迤整暇森嚴劍出匣而珠走盤也天鏡原瀞禪師臨濟宗會稽倪氏子登華頂參無見覩又如玉几見石室瑛室與語大奇之曰吾法叔徑山元叟和尚具大眼目今代妙喜也子欲了己躬事往見勿後師遂參叟於不動軒入門叟震威一喝師不覺汗流浹背尋游金陵見笑隱於龍翔上江西禮諸祖塔像至臨川訪虞文靖公道話契合延師度夏為作斷江塔銘樸隱軒銘至正丙申出世邑之長慶遷天衣洪武五年設廣薦法會於鍾山詔天下高名尊宿輪座說法師預焉九年冬杭諸山請居靈隱曰而祖佛照妙峰而父寂照而兄了幻皆說法靈隱於今振墮緒提宏綱舍和尚其誰哉師幡然而起上堂即心即佛嘉州牛喫禾非心非佛益州馬腹脹不是心不是佛天下覓醫人炙猪左膊上良久云嗁得血淋無用處不如緘口過殘春終時年六十七臘五十五古鼎祖銘禪師姓應氏元叟端在靈隱往從焉叩黃龍南在慈明因緣叟詰之曰只如趙州云臺山婆子被我勘破慈明笑曰是罵耶你且道二老漢用處是同是別師云一對無孔鐵鎚叟曰黃龍直下悟去又且如何師云也是病眼見空華叟曰不是不是師擬進語叟便喝師當下廓然即命居記室自是聲譽頓發後住徑山法席甚盛賜號慧性宏覺普濟禪師慧明性原禪師臨濟宗號幻隱俗台之黃巖項氏子洪武五年選舉高僧師與焉十一年戊午師至靈隱振揚宗風建本寺大殿修北峰之塔皆師事也室中垂語曰蓮華峰被蚍蜉食卻半邊因甚麼不知又曰冷泉亭吞卻壑雷亭即不問南高峰與北高峰鬥額是第幾機罕有契之者以僧誣語被逮至所司憩座下端坐說偈而化為洪武十九年六月二十三日壽六十九酉菴曇噩禪師慈溪王氏子元叟端補靈隱門風高非宿學莫敢窺其門師直往咨叩了無畏懼機契命掌內記出世天台之國清洪武三年詔徵江南有道僧師居其首空叟忻悟禪師臨濟宗俗姓鈕吳人徑山愚菴嗣洪武戊辰住靈隱居四年叢林改觀以前住持逮至京病卒於行洪武二十四年夏四月三日也門人窆骨於靈隱之東岡為本寺六十五代有三會語錄宋濂銘塔今存用貞輔良禪師臨濟宗范文正公十世孫參笑隱一見契之號貞悟禪師靈隱直指堂乃其建也舉揚大法不務緣飾復以淨土觀門為苦海舟航時兼修之既示寂舍利玉潔珠圓宋濂為之銘無文本褧禪師臨濟宗別號無見謝氏子嗣孤峰德禪師洪武二十八年住靈隱又四年示寂偈曰吾年七十有五涅槃生死不墮虛空背上翻身靠倒飛來小朵茶毘頂骨不壞舍利無算有和同安察禪師十玄談最可傳誦餘詳心泰塔銘為本寺六十六代行中守仁禪師號一初富春人靈隱僧從楊廉夫張伯雨遊能詩善書法洪武中徵授僧錄司右善世一初有志事業不偶為僧嘗言我輩從事文墨非以廢道蓋有不得已也在京賦翡翠詩見說炎州進翠衣網羅一日遍東西羽毛亦足為身累那得秋林靜處棲為太祖所見怒而罪之所著有夢觀集守仁詩與見心俱超絕羣輩而皆不免於患亦猶翡翠之為災也可純禪師臨濟宗象山胥氏子參古鼎銘入室洪武三十八年授杭郡都掌教住靈隱永樂四年寂於京茶毘靈骨塔涵澤菴為本寺六十七代無杰善才禪師臨濟宗嗣無文永樂元年住靈隱增塑三世金身創雙桂菴以奉師塔修寺誌遺文數篇不忘至今賴之為本寺六十八代思擴性空禪師臨濟宗慈谿人徐氏子參無文褧公永樂十九年遷住靈隱奉旨修經授僧錄司左覺義洪熙元年寂於京塔寺在天香菴為本寺六十九代伐石良玠禪師宣德九年住持靈隱先是寺災師建蘇州虎邱寺大殿遂禮師主寺寺之建豎師之功也為本寺七十四代慎菴祥禪師海昌李氏子少穎悟經書過目成誦受具戒於前住持全菴理公嗣法壁菴璘公景泰間出主顯寧天順間主本寺大開鑪鞴學者景從方丈間兩廡是師傾橐所葺也前溪德明禪師黃巖人姓林嘉靖間海寇焚湖墅山後西溪男婦踰嶺避亂寺僧皆以寇必至議棄寺各竄惟師立主合眾結臺於大路聲勢相援寇遂不敢至師又為粥以濟貧乏於是人有固志年八十一為本寺一百五代按德明以前有幻菴修慎菴祥敬堂慇大慈頤南京識天鏡淨遠菴恭東山曉獨芳蓮大川淮北峰讚可泉璽博菴廣愛山遷恕堂忠竹泉權西隱方無言諷冷泉聲聽泉禧德明以後橫溪亮見峰輔靈峰永冬嶺秀小山良近山良仰峰奎南谷寧皆前後住持也易菴如通禪師臨濟宗姓杭母潘氏夢梵僧借宿而覺即日娩十五出家禮大海和尚為師未幾往雙徑萬松和尚抉擇心要松問如何是白雲不倚青山住答明月常懸古澗心松為首肯乃繼臨濟正宗二十七世嘉靖癸亥司寇五臺陸公延禮住持南山慧因前後改觀萬曆壬午冢宰元洲張公禮致住持北山靈隱重建大覺殿數十年瓦礫一旦更新師之功為不可泯也具德弘禮禪師臨濟宗為臨濟三十二世紹興張氏子初為鍛工已習道家言後又讀首楞嚴而善之披剃受具參三峰漢老人於安隱徹悟宗旨服勤十七載遂承囑付師出世雲門廣孝維揚天靈及佛日顯寧諸處俱稱千人善知識而於靈隱破院久住法席一新建置甚盛復應請住徑山大弘祖道後至維揚天寧甫七日無疾坐化以靈隱言理公為祖延壽為宗而師以中興兼創置靈隱自來禪德未之有也壽六十八塔全身於靈隱慧日軒餘俱詳總錄晦山戒顯禪師臨濟宗字願雲太倉王氏子弱齡遊泮稱名儒甲申國難作詩文告廟入金陵華山禮三昧老人祝髮受具遍參天童雪嶠諸大老復參靈隱具和尚於皋亭大悟雲門拄杖話遂嗣法焉初隱廬山次開法雲居一住十載嗣住東湖薦福黃梅四祖臨皋安國武昌寒溪荊州護國撫州疎山化行江楚道望大著康熙丁未具老人遷雙徑命師繼席靈隱語錄詩文有若干卷盛行於世五嶽濟玹禪師古越吳氏子也母周氏夢日輪昇天而姙及師生聞空中音樂三歲誦心經如宿記成童出家石屋十七歲即遊方登講肆甫聽即講猶如瓶瀉受具天童密祖問祖西來大意祖棒云向者裏會取師便有入處歸越沙溪作務將盥沐觸翻水盆得大脫灑即遍扣謁具和尚於顯寧遂契以嗣凡具和尚倡化諸剎皆師佐揚師出世安隱遇火重興之他如鹿城安禪海昌安國罔不過化存神於是聲名洋溢彼都人士相率敦請先福善次夕照次隆安津梁正遠乃靈隱祖席非師不可遂延師歸補處焉整頹緒振弘綱和碩康親王駐浙慕師義禮敬請法師固道高而王之衞法弘願亦不少概見云
