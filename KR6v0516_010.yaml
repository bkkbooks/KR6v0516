body:
  text: 記明教大師行業記陳舜俞宋熙寧五年六月初四日有大沙門明教大師示化於杭州之靈隱寺世壽六十有二僧臘五十有三是月八日以其法茶毗斂其骨得六根之不壞者三頂骨出舍利紅白晶潔狀若大椒者三及常所持木數珠亦不壞於是邦人僧士更相傳告駭嘆頂禮越月四日合諸不壞者葬于故居永安院之左其存也嘗與其交居士陳舜俞極談死生之際已而屬其後事茲用不能無述也師諱契嵩字仲靈自號潛子藤州鐔津人姓李母鍾氏七歲而出家十三得度落髮明年受具戒十九而遊方下江湘陟衡廬首常戴觀音之像而誦其號日十萬聲于是世間經書章句不學而能得法於筠州洞山之聰公慶曆間入吳中至錢唐樂其湖山始稅駕焉當是時天下之士學為古文慕韓退之排佛而尊孔子東南有章表民黃聱隅李泰伯尤為雄傑學者宗之仲靈獨居乃作原教論十餘篇明儒釋之道一貫以抗其説諸君讀之既愛其文又畏其理之勝而莫之能奪也因與之遊遇士大夫之惡佛者仲靈無不懇懇為言之由是排者浸止而後有好之甚者仲靈唱之也所居一室蕭然無長物與人清談靡靡至於終日客非修潔行誼之士不可造也時二卿郎公引年謝歸最為物外之友嘗欲同遊徑山有行色矣公亦風邑豪預焉冀其見仲靈而有以尊養之仲靈知之不肯行使人謝公曰從吾所好何必求富而執鞭哉凡其潔清類如此皇祐間去居越之南衡山未幾罷歸復著禪宗定祖圖傳法正宗記仲靈之作是書也慨然憫禪門之陵遲因大考經典以佛後摩訶迦葉獨得大法眼藏為初祖推而下之至于達磨為二十八祖皆密相付囑不立文字謂之教外別傳者居無何觀察李公謹得其書且飲其高名奏賜紫方袍仲靈復念幸生天子大臣護道達法之年乃抱其書以遊京師府尹龍圖王仲儀果奏上之仁宗覽之詔付傳法院編次以示褒寵仍賜明教之號仲靈再表辭不許朝中自韓丞相而下莫不延見而尊重之留居憫賢寺不受請還東南已而浮圖之講解者惡其有別傳之語而耻其所宗不在所謂二十八人者乃相與造説以非之仲靈聞之攘袂切齒又益著書博引聖賢經論古人集録為證幾至數萬言士有賢而好佛者往往詣而訴其寃久之雖平生厚于仲靈者猶恨其不能與衆人相忘于是非之間及其亡也三寸之舌所以論議是是非非者卒與數物不壞以明之嗚呼使其與奪之不公辨説之不契乎道則何以臻此哉雖然仲靈之所以自得而樂諸己者蓋不預于此豈可為淺見寡聞者道耶仲靈在東南最後密學蔡君謨之帥杭也延置佛日山禮甚厚居數年然言高而行卓不少假學者人莫之能從也有弟子曰慈俞洞清洞光所著書自定祖圖而下謂之嘉祐集又有治平集凡百餘卷總六十有餘萬言其甥沙門法燈克奉藏之以信後世云本寺住山慎菴詳禪師行業記廣原師諱詳字慎菴海昌李氏髫齔時懷出世志禮本寺玉衡璣公天生頴悟經書過目成誦時錢塘陸公憐其敏欲敓其志俾充邑庠弟子員師固卻之剃髮尋受具戒於前住持全菴理公會中典其藏染指法味居無何掌記室於璧菴璘公會中微辭奧旨研精覃思弗明弗措學日充名日著景泰間出主仁和顯寧寺緇素向慕天順間本山虛席請師補之既領祠部檄主寺廢墜畢舉禪規嚴飭大開罏鞴鉗鎚後學學者宗之猶雲委而景從也方丈兩廡頓弊傾槖葺之復與孫旺常春修蓋大殿煥然一新中興之功豈不偉哉預建退隱之室于中宮兌位林麓塏之地既退寨門掃軌危坐如朽株定心如止淵復先相宅兆于隱居之背作歸藏計非夫視此身如逆旅者耶孫長淨天鏡通內外學住持本山次滔出主光明寺曾孫宗欽宗鏞玄孫洪椿洪樟皆克肖可謂繼述者得人矣師春秋七十有三僧臘五十有五於戲道之宏者得其人人之顯者有其位也有其位無其人雖千萬間之廣猶空舍也有其人無其道雖千萬之衆猶聚蚊也二者兼得之慎菴其人也據五山之席而展其所藴不為不顯也有其道而衆倚之為指南不為尸位也若是不惟慎菴出世之幸乃祖道光輝之大幸也與古之宗匠夷不相下擬之竊形服而立名非真者不既遠矣乎無新老人行業記陳繼儒靈隱無新老人每歲首必過余山中共煨榾柮梅花屋底二三十年如一日也老病畏人尤畏遊客之談兵談道談時局者遊僧之談禪談師談緣法者往往引避不暇獨望見老人瓢笠於籬落外即欣然手為啓扉山中童稚亦皆稱為歡喜菩薩云乙亥秋初怪師不至則先期已於端午日坐逝矣明年法孫竑公徵余作傳諾之按師諱性證字無新錢江鄧氏子早歲從易菴和尚剃髮和尚為臨濟兒孫門庭高峻獨重師朴誠以法器待之密傳衣鉢師埋光剷采遍參諸老宿絶不露圭角值靈隱中興之日締構煩重工徒千指仰師瓶鉢以食丹雘既畢首復宋直指堂於是飛來峰坊回龍橋密因閣冷泉石門諸勝一切皆從師十指煥爛矣是時雲棲介如憨山古心諸善知識率樂就師弘法講席之盛甲於東南為長期飯僧御衆簡要魔外息心山中大小事就師營度無不立辦者晚年靈鷲隙起師潛叩諸檀護盡力保持之幸免摧剝改易輪殿鼎新韓蘄王翠微亭歲補九里松晚猶不倦復護飛來竹樹於斫伐之後存古禪堂於崩敗之餘改回龍橋於洪水未發之日五易大殿柱所費不資致峩眉老僧萬里寄語凡師所樹有為法皆幹蠱濟險不特才識過人乃其赤心白行實有以孚於衆也師嘗對人言我來時赤條條地去時豈容以一絲自挂故破衲遮身之外卑腳牀折腳鐺猶長物也生平於持名反念默自體會不復以機鋒自顯化去之日徐疊雙趺有六十四年打攪常住之偈可謂踐履之驗矣法孫寂竑字妙香善述祖德禪林所稱宗象者也塔在北峰之麓祀在靈隱之祖堂樵史氏曰余少年時嘗遍禮諸尊宿意絶不肯之誠見其我相重慢幢高所為忍辱精進者未幾見也獨入五雲山與蓮池大士對面輒相視而笑莫逆於心能解會此中意者惟無新老人爾終其身披忍鎧護戒珠雪白冰清究竟與靈山同不朽亦足矣若猶向寂光土中標龍識象是豈老人翛然去來意哉余故特傳之以告夫平實學道本色住山者月用大師行業記張芬師俗姓江氏諱浩字道暗仁和人生而頴悟善讀書落筆數千言立就湯公顯祖生平不輕許人見師文大奇之王公宇方公應祥蕭公士瑋皆嘆為蓋世才先是里中黃公汝亨虞公淳熙葛公寅亮咸深知師敬為小友至是得湯公輩嘖嘖傳海內海內嗜古負奇之士以諸大儒驚服遂無不知仁和江生願交納者以故師交知半天下心甚厭苦之乃遁入西溪之橫山層巒疊秀刈茅栽杏挈妻子而家焉顏之曰蝶菴其初經子史集無所不讀而文則神明乎史遷詩則胚胎于李白所尤嗜者漆園之書也故其人沖談樂道意泊如也師筋骨弱多病于功名事不汲汲且尤不喜習舉子業偕其弟之浙與同志十餘人訂讀書社後先砥誡誓追古人遇不可即面赤雖至戚愛必出肝膽力爭之歲甲申有自京師來者談闖賊破城事甚悉師憤怒髮絲絲上指乃厲聲曰遂至此乎且嚼齒疾罵曰速死以哭訴上帝不顧客顛馳菴右絶壁狂叫躍墜首觸亂石血流滿澗家中人奔救血珠尚噴濺頭頃刻如斗口中尤喃喃罵賊張岐然輩輿致遊仙里調護之幸不死自是遊心禪悅功名益置度外而放形於丘壑之間亡何亂兵逼處橫山遂依博山汝航禪師剃髮為僧更名弘覺號夢破知蝶夢蓋不作栩栩也次慕具德和尚道望遂傾心依止更字月用掌書記方期荷負祖道旋以病脫化噫師以道不得行而忠無所效棲遁空門卒憤憤而死是則師雖託迹方外而有功於名教不淺鮮也張岐然字秀初志行與師同後亦祝髮於具和尚會下諱濟義字仁菴參禪得悟法嗣皋亭顯寧淡豫垣和尚初住顯寧次雲居終于江北泰州之慶雲道行表表稱濟宗龍象與月師行履雖有出世不出世之分其志皆秋霜烈日而為萬古之奇人也故因表月師而併及焉序護法論序僧來復西方聖人之設教也先之五戒十善次之六度萬行終之以三德四智其所權輿斯道固有顯密頓漸之不同極乎一真之妙則功超修證理絶名言振天地而獨存亘古今而不異者矣世之論者或指浮圖氏徒善為罪福報應之徵地獄輪回之變以恐動愚俗遂以其誕而詆之嗚呼何自欺之甚歟易曰積善之家必有餘慶積不善之家必有餘殃書曰作善降之百祥作不善降之百殃斯不為罪福報應之説乎傳曰為不善於幽暗之中鬼神得而誅之又曰死於此者則生於彼萬物皆出於機皆入於機斯不亦為地獄輪回之説乎特經傳之言徵發其端蓋欲使人自解顧不若佛書之詳且備也謂其不言可乎謂其無此理可乎竊嘗考之吾佛聖人弘範三界其救弊於世教者功亦大矣因果明而使人格非遷善齋戒修而使民謹行潔身至於行施而不貪忍辱而不怨衣弊垢而不奢履榮名而不矜雖強戾鄙嗇之夫聞是説者莫不説而遵之況明智之士乎夫民能格非遷善則姦偷之俗淳矣能謹行潔身則清靜之化成矣不貪不怨則鬥爭息不奢不矜則廉讓興乃若空寂無餘之理亦由是而臻其極焉越自大法東被二千餘載讓斥之者從古無有唯韓氏歐陽氏最後出而力拒我然皆不能博極吾佛之言與道其所爭者止於教所攻者止於迹耳故卒無以厭服天下識者之心獨隋之王通唐之裴休李翱梁肅柳宗元諸賢起而大暢玄旨於是議者少戢至宋周敦頤司馬光趙抃楊億黃庭堅呂祖謙以及三蘇二程諸子皆以深究而服膺者也其見於成書則李純甫之鳴道集張天覺之護法論尤極精微卓然有功於聖學者明矣近代如趙孟俯袁桷虞集韓信黃溍諸公亦皆潛心此道而操觚立論辭益勝理益明隱然吾法之長城也今我皇明混一海內崇尚真乘度越前古説佛則有作樂之章尊僧則有統教之號其曰善世利國其曰延慈照信赫然為一代盛典是知聖心之所以仁育黎庶而垂裕無疆者其為呵護之隆有非言辭所能述也博學多聞之士安可不鑑而擇焉雖然吾佛以慈忍力行方便智愚毁譽等觀同為梵行是讚亦護也謗亦護也庸何傷於大法乎今吳開元住山端文禪師有學行能感人謂天覺此論篤於護法而有補治化世不可無也其來金陵善士蔣智達契其一言之誨即施金重勒是論印行四方其存心亦可謂仁矣文師來徵豫言因略陳吾佛之法與儒典並用而不悖者如此且俾後之君子忘言而契道則於是論亦必有所取焉故不辭而為之敘傳法正宗記序宋濂表大法之真傳起羣生之正信宜莫如書然而真丹身毒相去絶遠梵語華言重譯或殊況屢遭滅斥之禍生乎其後者必搜羅墜逸遍現會通然後能定是非之真謏聞之士苟獲窺其一偏遂執為確然之論斯亦過矣嗚呼闢邪説之膠固伸正議于千載之下不有先覺學者將何所從哉昔者濂讀涅槃經及智度論頗知釋迦文佛以正法授迦葉世世相傳具有明證故自前魏支疆梁樓至洛邑譯續法傳自七佛至二十五祖婆舍斯多而止東留佛馱跋陀羅至廬山所譯禪經自迦葉至二十八祖達磨多羅而止逮夫後魏之時崇道屏釋而沙門曇曜蒼黃逃逸筆録諸祖之名匿巖穴間僅及二十四祖師子尊者而止佛運重啓曇曜進為僧統吉迦夜等遂因之為付法藏傳其去前魏已一百九十餘年東晉亦六十二年矣東魏那連耶舍至鄴復備譯西域諸所傳授事迹其次第與禪經不差毫髮則全闕之分有不待辨而自明矣唐興曹溪大弘達磨之道傳布益衆義學者忌之而神清為甚乃據法藏傳所列謂師子遭難絶嗣不傳猶以為未足誣迦葉為小智不足承佛心印指禪經實後來傅會難以取徵而好論議之徒紛紛起矣宋明教大師契嵩讀而病之博採三藏洎諸家紀載釋迦為表三十三祖為傳持法一千三百四人為分家略傳而旁出宗證繼焉名曰傳法正宗記復畫佛祖相承之像明其世系名曰定祖圖申述禪師及西域諸師為證以闢義學者之妄名曰正宗論共十二卷其衛道之嚴凛乎不可犯也濂竊聞之太平真君之七年魏太武用崔浩言宣告征鎮佛像胡書皆擊破焚燒當是時諸種經論多煨燼之末屋壁之藏蓋至于久而後出以此觀之曇曜之流固未必能見禪經至于諸師之論義學者亦未必得盡聞之顧執一時單録不全之文而相為詬病猶將十指而掩日月之光一口而吸滄溟之水多見其不知量也大師之辨析夫豈得已者哉復公文集序宋濂濂學文五十餘年羣書無不觀方理無不窮碩師巨儒無不親自意可以造作者之域譬諸登山攀躋峻絶不為不力而崇顛咫尺不能到也此無他受才之有限也世固有巵匜者焉有甕盎者焉有沼池者焉有溪澗者焉有湖江者焉有溟渤者焉水充其量則止小固不能為大大亦不能為小也濂昔官禁林四方以文來見者甚衆晚閲見心復公之作穠麗而演迤整暇而森嚴劍出匣而珠走盤也發為聲歌其清朗橫逸絶無流俗塵土之思置諸古人篇章中幾不可辨遐邇求者日接踵于門公卿大夫交譽其賢名聞九天皇上詔侍臣取而覽之特褒美弗置濂因謂當今方袍逢掖之流鮮有過之者焉其可傳遠無疑復公三會語録序宋濂無相居士坐清淨室想清淨觀忽有沙門號曰曇鍠合掌頂禮而作言曰我師靈隱三坐道場法音之震有如轟雷蟄蟲皆興飛行自在各適恆性又如晨鐘人正昏酣一聞音聲颯然驚覺同袍宗演及諸上首假觚翰力成文句身唯願居士開光明藏洞然篇端使信心者同入如來大華嚴海居士微笑告沙門言爾師所演大乘正法當時聞者注耳熏心一切纏結悉皆解脫既解脫已萬法皆空何況於言爾等結集翰墨假合畢竟大法果何所寄若謂出于翰墨之間湘竹兔毫魚膠松煤不能説法譬如石工手持鎚鑿鑿彼崖石為菩薩相首戴華冠面如滿月塗以黃金間以五彩珍珠瓔珞種種具足爾意云何是真佛不沙門白言如是如是復告沙門當觀是相惟是像佛四體奇偉被服絢麗固無異者若比真佛神通變化無量無邊二者孰勝以此思惟佛身充滿遍周沙界豈同崖石拘礙方所況此文句才脫口吻即第二義書之簡編去道逾遠又如畫師和丹抹黛經營想像貌師子王拳毛旋螺利距削鐵威稜氣焰可怖可愕泊而視之真若飛動爾意云何是師子不沙門白言如是如是復告沙門有像皆假是師子相形模生獰踞視左右亦無異者若比于真奮迅跳擲百獸盡伏二者孰劣以此思惟物惟真者方能動物寓形縑素與木石等況此文句不見形聲徒存其迹用之求道如捕風影沙門當知法尚算權難齊一軌如求兔者必假于蹄欲致魚者定資于筌魚兔既護筌蹄則棄法因言入言入法空亦復如是是知汝師顯説密説權説實説縱説橫説無非闡揚我佛如來第一了義有能于此一句之中或四三句或五六句乃至無句勿著聲求忽然悟入譬一切衆眇者能視跛者能履瘖者能言疾者能起其為霑溉胡可喻云若執文句反為留礙沙門當知有物混然萬有之宗不依形色不墮斷常入離出微內外體淨衆生迷惑無繩自纏大覺世尊大含攝故大慈憫故別有正傳曰思惟修一念不生一法不立一法不立萬象朗融非生非佛非真非妄非小非大非一非多此即所謂常空不有常有不空初無對待亦無能所從古諸師燈燈相續咸以此故汝師繼承倡明大教一機一言皆轉法輪法不流通是為祕法宜示信心共入圓智既入圓智法何嘗法法而非法是為法法法法之法不可思議我言真實善思念之沙門聞説心大歡喜信解受持作禮而去志武林山志契嵩其山彌杭西北其道南北傍湖而入南出西關轉赤山踰麥嶺胭脂嶺北出錢唐門躋秦皇纜船石過秦望蜻蜓二山垂至駝巘嶺趾左趨入袁公松門抵行春橋橋西通南之支路過行春橋垂二里南北道會稍有居民逆旅行人可休益趨二里入二寺門逼合澗橋過合澗龍迹二橋自丹崖紫微亭緣石門澗趨冷泉亭至于靈隱流水清泚崖石環怪如刻削乍覩爽然也自合澗南趨更曲水亭並新移澗距天竺寺門西顧山障重沓相映若無有窮靈隱晉始寺之禪叢也天竺隋寺之講聚也其山起歙出睦湊于杭西南跨富春西北控餘杭蜿蜒曼衍聯數百里到武林遂播豁如引左右臂南垂胭脂嶺北垂駝巘嶺其山峰之北起者曰高峰冠飛塔而擁靈隱岑然也高峰之東者曰屏風嶺又東者曰西峰在郡之西又東者曰駝峴嶺俗謂之駝宛乃語訛也其高峰之西者曰烏峰又西者曰石笋又西者曰楊梅石門又西者曰西源亦曰西菴支出于西源之右者曰石人其峰南起望之而藹然者曰白猿左出于白猿之前者曰香罏益前而垂澗者曰興正右出于白猿之前而雲木森然者曰月桂白猿之東者曰胭脂嶺白猿之西者曰獅子又西者曰五峰又西者曰白雲又西者曰中印西向前走迤𨓦于武林之中者曰無礙又前者曰善住並善住而特起者曰稽留俗謂雞籠語訛也其稽留之西者曰蓮花有巖號玉女其蓮華之東者曰飛來峰乃西僧慧理所謂此吾國靈鷲小嶺之飛來者也昔多仙靈隱焉乃呼白猿而驗之南屏天竺北障靈隱其巔有天然石梁西跨其中有巖焉洞焉洞曰龍泓曰青林巖曰理公龍泓洞前者北瞰後者東出謂其潛徹異境絶浙江下過武林也然南北相望而起者孱巖大有百峰多無名之者惟二十有四與城闉相去十有二里周亦如之秦漢始號虎林以其棲白虎也晉曰靈隱用飛來故事也唐曰武林避國諱也或曰青林巖仙居洞亦武林之別號耳然其岪鬱巧秀氣象清淑而他山不及若其雄據高挹殆與衡廬羅浮等矣其山八九月每夜霽月皎則天雨桂實其狀如梧桐子其水南流者謂之南澗北流者謂之北澗自合澗橋至于白雲峰之址凡八踰橋其七石也其一木也北澗自龍迹橋至于西源峰之址凡七踰橋其四石也其三土木也南澗源出白雲峰之麓東注會他支澗逾第八橋之西復東注會奚家澗入新移澗出閘口曲流北之合澗橋北澗源出西源峰之腹東注過騰雲塢口稍逼楓樹塢口湍于第五橋下浸飛來峰趾滙于西塢漾渟于西耳潭瀦于渦渚東嶼亦謂之暖泉也瀲灩于冷泉亭下經呼猿石門澗潛激于伏龍泓過龍迹橋下東注于合澗又東注越二里過行春橋下出靈隱浦入錢唐湖古所謂錢唐源泉出武林山此其事也南北之澗雖多多無名然皆會二澗其並南澗而入者曰南塢南人謂谷為塢並北澗而入者曰北塢而北益有支塢者六曰靈隱曰巢拘曰白沙曰大同曰騰雲曰西源是六塢者皆有佛氏精舍曰靈隱曰碧泉曰法安曰資嚴曰辨利曰無著曰無量壽曰定慧曰永安曰彌陀曰吉祥曰西菴其精舍凡十有三缺一名其十者在支塢其三者宅正塢南亦有支塢皆有精舍曰天竺曰興聖曰崇壽講聚也曰慶寧曰永清曰金佛曰德澄曰福光曰天竺禪叢也古觀音氏垂像與人乞靈曰永寧其精舍凡十其五在支塢其五宅正塢諸塢皆有民居錯雜其殷處幾成村墅然無坂墾不牧牛犢羊豕水陸不甚汙其人不事釣弋漁獵以樵荈自業然同其在古潔淨清勝之風未嘗混也其俗在南塢者窮于白雲峰之巔在北塢者至于西源其坡陀西趨西溪南通南蕩其泉之南出者曰月桂曰伏犀曰丹井曰永清曰偃松曰聰明曰倚錫凡泉之源七月桂在天竺寺伏犀在飛來峰之巔流液不常其五皆在支塢其泉之北出者曰冷泉曰韜光曰白沙曰石笋曰白公茶井曰無著偃松曰永安北源曰彌陀西源曰騰雲上源西菴也凡泉之源九冷泉在澗壖其入在支塢古人之遺迹其南塢若吳葛玄之葛塢者若晉葛洪之丹井者若宋謝靈運之翻經臺者若隋真觀所標佛骨之塔者若唐道標杜多之草堂者其北塢若漢陸偉之九師堂者若晉葛洪之伏龍石門者若晉許邁之思真堂者若晉慧理之燕寂巖者若晉明甫之客兒亭者若宋智一之飯猿臺者若呼猿澗者若梁簡文所記之石像者若梁朱世卿之朱墅者若唐白居易之烹茶井者若唐袁仁敬之袁君亭者二塢總十有六事從古今相傳雖名存而其事頗亡不可按而備書其山無怪禽魗獸惟巢拘之樹最為古木松筠藥物果蓏與他山類惟美椒與靈山之所生枇杷桂花發其異香耳表謝還九里松表淳朋佛慧普覺大禪師杭州路景德靈隱寺住持臣僧淳朋言伏以衮冕端居致玉帛梯航之貢絲綸遐布增林泉草木之輝鴻祚永昌龍神胥悅臣僧淳朋誠歡誠忭稽首頓首竊以眷靈隱之古剎據錢唐之勝區昔創建于東晉咸和之年繼恢拓于南宋紹興之際實乃碑辭之具載詎期鄰壤之相侵私意町畦難罔以非其道細故芥蒂不得其平則鳴凛懼愚衷塵瀆聖聽茲蓋欽遇皇帝陛下剛健中正𥈠哲溫恭曰雨曰暘曰燠曰寒天心協應自東自西自南自北文德誕敷俗既底于雍熙化式行于慈儉尊臨五位膺帝業之延洪普濟羣生體佛恩之廣大匪巧言之可惑惟睿斷之至公特降璽書俾刊珉石臣僧淳朋欽承寵命格守成規闡大覺之真乘培皇元之景福三千世界瞻日月之光明億萬斯年共乾坤之悠久臣僧淳朋無任瞻天仰聖激切屏營之至書與拙菴書尤延之昔妙喜中興臨濟之道于雕零之秋而性尚謙虛未常馳騁見理平生不趨權勢不苟利養嘗曰萬事不可佚豫為不可奢泰持蓋有利于時而便于物者有其過而無其功者若縱之奢佚則不濟矣不肖佩服斯言遂為終身之戒老師遭遇主上留宿觀堂實佛法之幸切冀不倦悲願使進善之塗開明任衆之道益大庶幾後生晚輩不謀近習各懷遠圖豈不為叢林之利濟乎疏金陵諸山送圓通竹田和尚住靈隱疏在宋仁廟莫起訥公于圓通厥後孝宗特召拙菴于靈隱雖出處各欲行志而抑揚皆足扶宗及觀我師度越前古聲飛丹陛何天竺莫抗其高風名躍金甌若鷲嶺有待于今日某語空衆妙機透重玄宗性俱高與臨濟同出邢氏師資宿契喚雪峰萬福曾郎話行江西三十年增高廬阜幾千仞道闢于奧與日月而爭光宗會其元猶河漢之無極方喜金陵之會遽為錢塘而歸與其領徒勘驗諸方曷若據室大弘法施南山之南北山之北纘承祖父兄箕裘一乘非一三乘非三掃空經律論露布如佛出世大衆霑恩紹興天章吳郡諸山疏良用貞吳越同風于以修兩浙一家之好教禪合轍蓋將闢專門異戶之偏書稱立賢無方易貴同人于野某智禪兼暢名實相孚密用宏機允也龍翔法嗣高風遠度居然魏國諸孫蓋嘗涉教觀之津涯又復秉方章之機杼方將論薦忽覩橫翔因棋説法相推遠公修褉賦詩政須支遁彼固有得吾誰與遊黃絹色絲肯爭較于智謀之末青鞋布襪期相從于山水之間勿遐爾心尚敦舊好宣政院送東嶼和尚住靈隱疏推誠護教有如金城湯池倡道提綱要若銀山鐵壁我既不忘靈山記莂爾其闡揚少室宗風某行介而和言簡而要永明之書百卷異曲同工松源之道四傳一絲九鼎陽烏東升陰霾解駁天柱中立狂瀾障回願聞玉應金舂以警鯨瘖鼉寂二十四考中書之貴孰擬清高千二百人知識之尊式瞻光彩法輪三轉天子萬年化砌靈竺大路疏道濟一條滑路堂堂直透長安九里松關蕩蕩平趨佛國腳跟有礙未免遲疑眼底無私方為平穩斷羊腸曲折之崖履龜背坦夷之路江山聚勝人行翡翠途中車馬交馳身在畫圖影裏請題椽筆為注芳銜贊良禪師像贊宋濓眼光閃爍如秋隼之橫寥廓也威鋒峭崿猶於菟之踞叢薄也文彩彰灼藻火施而江漢濯也正令揮霍春雷霆而撒霰雹也縈然而若有著也悠然而無所泊也洸然而不可測也沉然而堪任其託也無忝佛智之孫廣智之子超然而頓覺者也蒲禪師像贊宋濂師名來復少有志行絶塵獨立與同袍恭肅翁誓屏諸緣直明涅槃妙旨久之窺見全體無礙然未以為至走雙徑謁法喜楚公當機鋒交觸如鶻落兔走不間一髮法喜留司內記三載復約標士瞻修西方淨土于吳天平山刻期破障比禪觀尤力會兵起避地慈溪定水院以干戈載塗不能見母作室東澗取陳尊宿故事名為蒲菴示思親也望日以重出主靈隱適有詔徵高行僧師兩至南京賜食內廷慰勞優渥師敏朗淵毅非惟克修內學形于詩文氣魄雄而辭調古有識之儒多自以為不及其推師者李諭德好文則曰任道德為住持假文辭為遊戲陳狀元祖仁則曰禪源妙悟教部精探內充外肆僧中指南至于楚國歐陽公玄潞國張公翥見諸觚翰間者奬豫為尤至師之徒鍠畫師像求贊係之辭曰大法如如流于旃丹不有君子荷之實難慧照正宗世濟其美一十九傳至于法喜據蓮華座大振玄風師承一喝三日耳聾聾極而聰至聞蟻戰祇為圓虛物無不見既入悟關可廢學功妄滅方真慧極則通乃即天平棲神淨域禪觀混融不二不一方嶽致聘耳若不聞優鉢曇花即見海濵有典必行無墜弗舉鐘魚互答笠鞋川委移錫州城歸者紛紜轉穢為淨載揚清芬有峰飛來千載不起師復主斯法筵重啓聲華遠揚達于帝宸有詔起之説法如雲錫饌禁中恩澤優渥四衆傾仰秋空孤鶚形諸辭章太陰四垂雷奮飈揚鬼神晝馳人爭傳寶如襲芳旨師笑受之吾遊戲爾內外兩充如師幾人暗室非燈曷照羣昏學徒歆豔丹青肖像我作贊辭毋住于相言代石言虞淳熙德園靈竺名勝惟九里松飛來石天下奇觀向年松厄道民曾作謠以泣轉移大老之意既已易容今此石災道民欲存開闢之峰比救唐時之松尤為急切故向既垂涕而道今可無髮沖冠而談理不欲默一也況貴人向頗有一日之雅因我卜鄰因鄰禍石勢不容默二也朋友之道小過責善大過痛言過而不改是為獨夫若苟懷小惠之私是坐視大惡之就誼不容默三也良醫對治有觸人之大怒而疾瘳世之忌醫有痛割其贅疣而痼愈蓋不比桀紂非至諫不牽猛索不回頭勸百諷一改悔庶幾情不容默四也山靈夜夜相泣欲言而無其聲寺僧隊隊石頑能言而詞不達天不容默五也作代石言石告貴人曰我石無口口在世間我石不言言在天下我石自盤古皇帝迄今萬歲聖人峙立此土名曰飛來蔭蔽郡城阜安人物富貴由我鍾育而致科名由我秀麗而崇許由愛我棲隱其間惠理知豫加之美號今蒙貴人見愛為寵實異諸君以為石乃公物疊靈山之假何妨取靈山之真不知石是雲根苟翦一片之雲實奪一峰之秀豈不聞玉在山而川媚乃忍珠盡徙而龍亡可憐去歲以至今朝始猶扛擡浮石今則穵掘心胸始言盆景列排今則勢侔艮嶽今雖掘土幾尋後必開坑百丈始雖勢在一門今則效尤接踵喊聲震地鎚鑿轟山鳩衆如虎而如雲扛插似戈而似雨金聲纍歲敲碎道民之心搬運百千活剜寺僧之肉然且嫁言已實不遺而暗利土人之盜來又復笑言我自美觀寧惜賤人之唾罵故土人有天坍長子頂之言山匠有地主大人歡之説是猶警盜而無論窩家詳刑而不認主使雄心惡發巧語誰欺雖宋世開花石之綱凶不若是元亂鑿佛身之血惡不如斯一寺之流散不足論獨不念會城之秀鍾乎一城之秀氣不挂意獨不念己身之富貴由來乎己身富貴欲享盡獨不顧朝廷之香火當存乎淫石迷樓窮奢極欲陳明土地含怨而未肯顯靈靈鷲山王睨視而共須時至我令冷泉終日湯湯相告而貴人若不聞我等衆峰終日點頭如求而貴人若不見必至崩我身絶我脈而後已哀哉痛哉賴有道民如刀之口尤恐言出而纍以禍隨幸而道民似鐵之心誓願頭存而與璧俱碎一言夕發萬里且聞伏願靈隱寺歲時朔望祝願萬歲聖天子聞之伏願守土觀風名山大川之寄大諸侯聞之伏願郡城內外間鍾靈峰諸大夫士庶聞之伏願會城遠近百姓軍民共有富貴科名之望墳墓祖孫之念者聞之定發公言將無清議倘然膚剝如救頭然泣血謹告論飛來峰不從巫山來論孫治理公見奇峰而歎曰此吾中天竺靈鷲山之東嶺不知何以飛來有黑白二猿呼之而出此其事甚奇而好事者指為越王時巫山飛來亦謬矣以楊升菴之博雅亦曰巫揚臺自巫峽飛來於靈隱亦何據耶昔先賢邵紫之以類徵也曰會稽陽明洞有飛來石龜山一名飛來山金華山寶掌洞有飛來峰蘇州天平山有飛來峰廣東羅浮山有飛來峰福建汀州府有飛來石福州府升山一名飛來山潛山有飛來峰贑州興國縣有飛來佛廣東中宿峽有飛來寺於潛縣有飛來橋岝崿山名飛來山然未有理公之證據茲山為可信也世之人何以不知西天竺而妄言巫陽臺耶靈隱號景德論靈隱之稱景德何也宋真宗景德四年敕賜額改靈隱寺作靈隱山景德寺而天禧五年又敕賜改景德寺作景德靈隱寺此靈隱之所以稱景德也雖然前此者有賜矣錢忠懿王賜靈隱新寺是也後此者有賜矣宋高宗賜靈隱崇恩顯親禪寺是也則曷為至今猶稱景德也元時中天竺賜額天曆永祚寺易世而變矣則曷為至今猶稱景德也雖然以靈隱稱景德以景德冠靈隱古今之殊絶也則曷為其不至今稱之也武林亦有祥符寺矣其猶然稱祥符也治潮皆靈隱僧論駱丞咏靈隱而及浙江潮也人咸疑之而余以為無可疑也乃治潮者皆出于靈隱僧又何奇也錢王時以萬弩射潮而潮不能卻也僧都統贊寧與智覺禪師延壽建塔創寺於江干以鎮之而潮循故道焉是其一也前南齊時驚濤為害寶達誦祕咒纍日吳行人形見于夢而潮擊西興東岸以平又其一也洪武初海潮崩岸壞民廬舍照菴慧炬時居理公巖為潮神説三皈戒楊枝灑處即止不崩又其一也然從靈隱之有關于浙江潮而靈隱僧之能治潮也所從來矣而又有異者往者六和塔災火出于北高峰飛而焚之夫北高峰固為火山而能飛火于六和塔者何也吾是以知靈隱之有關于浙江潮也靈隱不宜為第二山論宋寧宗嘉定時品第禪院五山以徑山為第一靈隱次之淨慈又次之天童又次之育王又次之其以徑山加于靈隱也則不知靈隱之為武林也知靈隱之為武林則徑山不得加于靈隱也或曰有徑山而後有靈隱以其沿流而言之而非也夫中國山川皆本于隴蜀安得執此以論徑山靈隱哉且是武林者四王七帝之所都也冝莫先于靈隱也靈隱遍五宗論靈隱之為禪天竺之為教夫人而知之也然中竺為禪院十山之首而下竺則亦多禪師居焉是教與禪則雜焉也則未有如靈隱之專于禪也南嶽青原以後五宗迭興而靈隱皆得而有之甚矣靈隱之盛也余序僧系自唐以下未有以教入焉者也略托其一二即如真觀之為曹洞也文喜之為溈仰也延壽之為法眼也契嵩之為雲門也瞎堂佛智密菴諸人之為臨濟也五宗之賢聖指不能屈靈隱皆得而有之則未有如靈隱之盛也蓮華石品論牛奇章僧孺以甲乙丙丁列石品謂太湖石為甲羅浮天竺石為乙焉其言天竺也猶言蓮華峰與飛來峰也蓮華之石若獅豹兕象莫可形容也而其鮮葩則若芙蕖焉故以為蓮華也雖然其甲與太湖與乙于太湖吾不得而知也而其與羅浮並者則奇章之不豫誑也乃蓮華之厄厄于楊髠有楊髠之鑿之也而石不得全矣有楊髠之鑿為己像也而石愈醜矣然其質固在也而惜乎後之人又欲伐之也故虞比部淳熙之代石言也曰石告貴人曰我石無口口在世間我石無言言在天下其以泄石之憤也云爾東坡之去杭也僧惠淨贈以石東坡詩曰還將天竺一峰去要把雲根到處栽其愛石也不亦至乎然東坡兩為政于杭也未嘗伐而取之也而奈何後之人不不知愛也或曰伏虎岩伐于某某焉唏也塔銘慧理大師塔銘虞淳熙理公本靈山羅漢垂迹晉咸和間鷲飛猿騰先來震旦公錫後落飯而問之誰摘陶輪若猶磨蟻會物不遷乃歸院焉俄窺神足圉相堲周開寶三載崇為方墳直清繞橋在式公不移澗上青烏氏曲鈴回龍則凡骨僭入塔矣萬曆丁亥夏雨夜圮庚寅春釋如通袚穢新之𣐙者程理于時崩洞扄公所周身可撫也當時覩史下生乘鷲呼猿而回龍華乃稱回龍哉萬曆庚寅梵網戒衆虞淳熙庸作銘辭銘曰石燕拂雲嶺鷲入吳公錫于飛猿心可呼安安而遷月運雲駛生滅毁成亦復如是謂公蓋殔雞足與夷謂蓋輪傾鱉足與支幡搖烏驚栱積星礙骨妖斯濯黑囊虛佩如梵天宮乘往當來南紅泗影不騫不摧普慈大師石塔碑銘契嵩師諱幻旻信陽玉山人姓葉童時出俗入興教蘭若師僧省覃既納戒乃訪道四方來虎林見慧明禪師於靈隱即服膺執弟子禮盡學其法久之慧明命師監寺其寺大火方根典守同事者危及禍曰我總寺事罪盡在我爾曹不必懼也吏不窮詢止坐爨者人咸偉之及慧明告終師即帥衆白府請慧照聰公鎮其寺仍以監寺輔之戮力相與復其寺不十年而葺屋廬嶷然千餘間蓋偉於舊慶曆中朝廷用某薦而錫之章服其後又賜號普照及慧照謝世遺書舉師自代官疑其事不與更命他僧主之師事其僧愈恭無毫髮見於聲彩知府龍圖季公知之乃以上天竺精舍命師以長老居之及觀文孫公蒞杭特遷主靈隱始演法之日孫公重師衣冠貴遊不翅百人預會爇香聽其所説而道俗老少貴賤摩肩趨者萬計是日人聲馬迹溢滿山谷法席之盛罕比師天性寬平慈恕居寺六年嘉祐己亥仲冬忽感微疾先一日與蒙語將授寺與今知禪德語氣詳正如平昔十三日雞鳴起潄洗問時辰乃安坐而盡世壽六十一僧臘四十一塔呼猿澗直北寺垣之內銘曰惟功在法惟德在法法既不生其勝緣豈有熄耶惟師之盛善常然不泯不墜斷可見矣輔良大師石塔碑銘宋濓洪武四年正月十六日師滅度報年五十有五僧夏四十龕留五日頂有暖氣體貌如生又二日用闍維法齒牙堅潔舌根紅潤皆無壞者火既滅諸舍利玉皎珠圓弟子智鎧等瘞骨歸雲塔中實在寺東偏若干步按大師諱輔良字用貞號介菴蘇州吳縣人范文正公十葉孫父伯和母鄭氏大師誕鍾粹氣聰悟夙發見浮圖氏書輒踴躍誦若所素習挾相形術者謂其父母曰是兒骨格清聳終非世間法可縛若使學佛大宗乘者此兒也父曰吾范氏無浮圖者顧頗聞先公鎮蜀時勉圓悟勤公卒為天下禪宗乎年十五遂捨同里迎福僧壽彌剃落未受具戒去從北禪澤法師習天台教觀時士瞻杓公住天平山白雲寺蓋范氏所建以奉先者士瞻見大師誨之曰教乘固當學若沉溺不返如入海算沙徒自困耳何不更衣以事禪宗乎今笑隱欣公其道被于東南朝廷賜以全悟大師之號盍往依焉於是大師往見廣智即以令器法身期之問答之際棒喝兼施弦發而箭馳雷奔而電掃剎那之頃凡情頓息舉揚大法不務緣飾而西來之旨自明復以淨土觀門誠苦海舟航時兼修之未嘗少怠於戲道行無迹極妙無象無形而即之吻契本真未定之先則萬緣鼎沸發慧之後則一性洞虛所謂不用其力則神功化于玄冥而忠信發乎天光矣有如大師和粹外形淵懿內朗叩請之間因言懸證不染不遷之域泯差別次第之門非上智宿植之恩能至此哉濓也不敏早從諸老遊欲假苦為宅心之地夙障已深竟為世諦文字之所纏縛雞鳴而起唯悵逐物而已操觚而銘大師之塔能不惻然以自憐悵然而遐思者乎銘曰真體如如絶垢離紛妄識所膠攪為法塵辟猶飈風鼓埃揚氛化晝俾夜觸目重昏佛啓覺塗高縣慧日白光爛然下銷羣慝破相玄門最為勝特能定諸緣即超祕密昭昭大師上承禪宗一真歸源萬幻咸空染淨兩冥本迹俱融廣智之傳其學遂東昭昭大師為法出世嬉笑怒罵皆真實諦湧殿嵯峨蜚樓弘麗假相以昭非與道戾昭昭大師變通弗拘緣盡即滅視世為虛死生者誰出沒在吾化為舍利如摩尼珠其來奚留其去何逝白雲在天周流無滯法象既亡勒石為偈式播徽音用垂南裔性原明禪師塔銘心泰洪武十九年六月二十三日靈隱住山幻隱禪師歿塔于寺之西岡世壽六十有九坐夏五十禪師諱慧明字性原幻隱其別號也台之黃巖項氏母陳師生七年患瘡幾死冥于床忽失故處母遽尋于他所得之問何為至此曰夢寐中見四童子舁至于茲翌日瘡愈則知四童子者天神也稍長不樂從事於俗乃往溫之樂清依寶冠寺魯山東公落髮年二十走宣城受具於廣教寺明律師往參徑山元叟端公公曰汝東嶺來西嶺來師以手指草鞋曰這個三文錢買得公曰未在更道師曰和尚何不領話公曰念汝新到且坐喫茶師曰千年桃核裏覔甚舊時仁公容其入室朝參夕扣遂得其旨既而出世鄞之五峰一瓣為端公嗣洪武五年壬午選舉高僧師與其選季潭泐公住持天界請師分座説法明年冬太師李公就鳳陽設會普度有旨命高行沙門領僧三十往作佛事師應詔以行既至柄法甚虔凡旬有五日時天陰晦欲雨太師問曰法會之設天神交接正宜晴朗以綏百靈其陰如此得非雨乎師曰無慮此特鬼神之格耳非致雨而然也太師初未然之及會散雲陰解駁月星呈露太師以前言為應合爪嘆曰禪師真達道肉身菩薩也又明年秋季潭公與京剎諸碩舉住京口金山師重其舉不辭以往九年丙辰奉旨預注三經之列十一年戊午杭靈隱虛席衆慕師之道合辭以請師不應使往還者三於是勉就至則以法為己任振揚宗風一時翕然首創大雄寶殿巋然瓦礫叢棘之墟屹如山峙雄冠諸峰觀者嘆美住靈隱幾十載塔之在北峰者則修治之九里松之被伐者皆補樹之又以學者泥於知解嘗垂問曰昨夜蓮花峰被蚍蜉食卻半邊你因甚麼不知又問冷泉亭吞卻壑雷亭即不問南高峰與北高峰鬥額是第幾機衆莫有契者先是有僧謁師師失禮焉銜之誣師以非言於朝使者至衆皆諷師自盡師怡然曰聽我去及至所司憩廡下端坐説偈而化得法上首弟子智誾等若干人手度弟子懷魯等若干人師所説偈句深密微妙四董名山有四會語銘曰於赫覺皇宏宣六度其一惟禪絶離言句拈華微旨飲光克承竺乾四七繼繼繩繩達摩西來厥宗蓋大濟北之喝啓盲闢瞶下至圜悟秀分兩歧卓哉妙喜全身荷持喜後四葉是寂為照猗歟幻隱于光有耀生以神祐死由人擠死生擠祐均為菩提塔于西岡山靈水秀銘以昭之千古不朽無文大師石塔碑銘心泰師諱本聚字無文別號無見四明定海謝氏父子祥母李氏師幼端穎童歲入黨庠語孟諸書過目即不忘年十四遣出家郡城五臺寺來公所三歲為剃染受具俾習毗尼久之嘆曰律以嚴身非究竟出世法時孤峰德禪師旺化金陵保寧師乃杖竹履芒踵繭數十舍前扣法要峰曰聞汝和梁山牧牛頌試舉看師擬議峰掩其口曰牛在甚麼處師曰已犯和尚苗稼了也峰曰未在更道師掩耳而出峰陰許之命為侍者數以語摩拂之仲芳倫禪師退休寺右新菴師往來決擇歷三寒燠知證日增聲譽聞諸方元至正二十六年開法蘇之覺嚴一瓣為孤峰嗣洪武中宜興靜樂講院請師開堂重創大雄寶殿由是易講為禪行百丈規繩太祖高皇帝徙蔣山禪寺於孝陵之東賜號靈谷詔物先仲義禪師住持天下慕道禪侶雲臻坌集數餘萬指物先以為衆廣易濫匪規罔肅必得儀行端潔威德嚴重人素信服者處之前板庶足糾正於是議僉歸師居第一座而師儀軌端飭聲律身度有衆秩秩肅若凜然叢林典禮講行無遺洪武二十八年杭之靈隱缺補處都掌教升鎮其席寺弊方將經營三十二年春示微疾丈室範堂洪公走方丈候問值師氣喘洪詰問趙州道諸人被十二時辰使老僧使得十二時辰作麼生師竦身曰喚甚麼作十二時辰洪曰不奈氣急乎師振聲一喝乃問左右今朝是幾對曰二月二十七日索筆書偈曰吾年七十有五涅槃生死不墮虛空背上翻身靠倒飛來小朵竟擲筆泊然而化闍維頂骨不壞舍利無算宗衍等斂諸不壞塔于演法堂東雙桂菴尋分爪髮歸宜興靜樂瘞焉圓慈正濟空叟悟禪師塔銘心泰大慧五傳至寂照寂照嗣法之子林立徑山愚菴禪師及公其一也愚菴再傳是為師師諱欣悟字空叟蘇吳縣人俗姓鈕父華母吳氏師生元至正丁丑貌簡重兒時聞梵音輒喜父母知非處俗子時九歲依龍興寺白雲間公祝髮受戒至正戊戌長遊武林參徑山愚菴及公公問曰如何是永明旨師曰某甲新到只見一湖水菴可之遂容入室壬寅居第二座癸卯中竺懶菴禪師俊公請分座説法時帝者師錫以圓慈正濟之號以彰其德皇明洪武庚戌京都宗剎疏住浙江崇寧瓣香為愚菴嗣振寺于百廢之餘閲八年還住中竺時寺廢役繁師力任不倦募建天香閣巋如山峙居者安恬遊者闓爽住九閲載集衆告間勤舊不忍其退有悲泣者洪武戊辰僧録惜其靖退會靈隱虛席以師名預適中其選四方學者皆喜躍贏糧願從鐘鼓變音叢林改觀矣居四年以前住持舊事逮至京病卒於行臨終偈曰我年五十五信是生多苦踏斷死生關夜半日卓午門人道淨等依法茶毗舌根數珠不壞全室泐公夢觀仁公存翁道公隨菴濬公一雨洽公咸具饌祭其徒德律等奉骨歸窆靈隱之東岡復分瘞于西溪九曲山之原師之歿實洪武二十四年辛未夏五月三日也世壽五十四僧臘四十愚於禪師為法門昆仲習聞平生以慈忍謹敏自將所説偈頌穩密不蕩三坐道場有三會語神感其誠人飫其德近世稱善知識如師者不多見也
