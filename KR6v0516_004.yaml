body:
  text: 法語宗門雖云教外別傳不立文字而祖師心印亦藉言宣故從上古雖拈椎豎拂皆有說法機緣玉句金章具載傳燈僧史具德老和尚性具宗通不由文字而一登廣座說法如河懸瓶瀉晦和尚繼之父子敲唱哮吼靈山真鼓吹祖庭萬載響震者矣為志法語第八具德和尚住靈隱進院上堂法語師于己丑春二月十三日住浙江杭州府靈隱寺闔郡薦紳文學及各山耆宿合院大衆請升座揮拂子云豁開宇宙萬象交參皎日當空十方烜赫還有共相證明者麼願雲西堂出問靈山古剎列聖覺場寶座師登將何行令師云人到靈山增意氣水歸大海長波濤進云從來萬派皆歸海今日千山盡仰宗師云靈山一會迦葉親聞世尊拈花貴須道得進云今日更添一重光彩師云七尺烏藤行活計杖頭八面起清風進云直得飛來峰頂青龍舞西子湖邊白鳳飛師云誰人不仰上頭關問剎竿高竪重興遠祖風規法令當陽號召諸方龍象作麼生是挽回風化底句師云金輪現瑞百鳳齊鳴進云奇峰巧石開新眼冷澗回波看主人師云一句當機普天匝地進云龍袖拂開全體現象王行處絶狐蹤師云好音在耳人皆聽進云誰個不知音師云禮拜有分問弘開法席大闡宗風滿目英靈誰是作者師竪起拂子僧更喝師亦喝僧又喝師云三十棒進云放老漢出一頭地師便打乃竪起拂子云昔日世尊拈華今朝靈隱舉拂會則同彼同此耀古騰今不會則乃聖乃凡隨波逐浪諸仁者世尊說法四十九年談經三百餘會末後向靈山會上百萬衆前拈華囑纍飲光尊者一笑相傳大法東來則此山預來震旦以待沒量大人爰有慧理永明延珊明教雪竇大慧瞎堂諸祖咸向此山立極開宗彼時問道上自帝王下及大臣以至名公巨老亦在此山共翼嘉猷激揚本分今日現前宰官居士與諸山名德本寺耆英五湖衲子亦在此山問似雲興答如瓶瀉豈非靈山一會重整頽綱再笑拈華知恩有地復舉拂子云諸仁者若向個裏會得則前佛性命後佛紀綱總在者裏似地擎山不知山之孤峻如石含玉不知玉之無瑕永絶遮闌更無向背其或機留玄解見逐偏枯縱使打破牢籠踢翻窠臼撒開離坎擺撥乾坤是甚麼熱碗鳴聲繫驢橛子所以道靈光不昧萬古徽猷入此門來莫存知解直須不慕諸聖不重己靈向威音那邊打疊定當然後獨步大方壁立千仞行不言之令嚴不罰之威淨裸裸沒可把赤灑灑無回互自然風行草偃水到渠成妙淨明心觸處青霄碧落正法眼藏等閒栗棘金圈八表同符三才合契諸仁者畢竟格外風規機先權要佛佛相授祖祖相傳一句作麼生道擲拂子震聲喝云丹壑羣真吟紫霧靈山萬衲笑春風開爐鑄萬僧鍋升座法語大人具大識見運大作略安大爐韛啓大模範成大鼎鑊此個大爐韛大模範成就來多少時也赤縣神州無處不知大乘氣象何人不具靈隱事不獲已因行掉臂遇緣即宗遂使三世諸佛振動天樞歷代祖師撼搖地軸盡法界若聖若凡若緇若素靡不瞻之仰之直得彌盧起舞香海波騰文殊普賢合水和泥彌勒善財添銅入炭山僧橫身宇宙號召當陽知事喚行者人力龍驤虎驟冶師與爐頭火伴電轉星馳鼓橐籥於晴空風摶六合運金鎚於肘後響震三千人人頂門瑞靄各各腳下光騰爍迦羅眼左右圜融母陀羅臂前遮後護火德以之振武金德以之圜成造化以之無私神功以之畢備然後普天匝地安靜如初若聖若凡各歸本位三世諸佛放下天樞歷代祖師仍還地軸靈隱個漢斂衣就座現前龍象參叩如常祇如一爐便就覿面賞勞底事又作麼生香積廚開雲出鼎金牛撫掌笑呵呵付授願雲西堂上堂法語召西堂願雲上座云靈山授受一笑相親雞足分燈衣傳慈氏殊不知釋迦不前彌勒不後法身不大此衣不小乃捧起伽黎云祇如者重公案畢竟以何為驗遂展付云以此為驗復說偈云鷲嶺一花開五葉神州紫氣藹三峰燈燈續焰交光處虎角新生佛日紅堂展具禮拜師下座開藏殿鐘樓基上堂法語僧問雲門道如何是自己光明廚庫山門今日和尚大啓靈山更拈出個甚麼師云握土成金進云作麼生著力師云打鼓普請看進云只如不施寸草梵剎圓成憑個甚麼如此奇特師卓拄杖乃云靈隱拂子頭現龍樹大月輪體性三昧與太陽紫微交互爭輝直得全賓讓主轉三能於東震全主讓賓挽五佐于西乾由是東西合轍南北通途據重關則先機立命別緇素則照用同時衲僧本分則固是祇如盡無邊華藏莊嚴海拈來如粟米大擲向靈隱青龍角上諸人還見麼不見道打鼓普請看供祖師上堂法語見性不留佛悟道不存師祖師玄旨是甚破草鞋寧可赤腳不著最好饒汝學得佛邊事機不離位學得法邊事智向偏枯兼帶去亦未免究妙失宗不見雲居膺禪師云如人頭頭上顯物物上通祇喚作了事人喚作尊貴得麼將知尊貴一路自別又云如日出時光照世間明朗是一半那一半喚作甚麼又云升天底事須對衆掉卻十成底事須對衆去卻擲地作金聲不得回頭顧著雲居恁麼道只解步步登高不解從空放下若是靈隱別有道處但頭頭不顯物物不通無事可了說甚尊貴如日落時不照世間晦昧是一半那一半幾曾缺少升天底事古廟香爐去十成底事冷湫湫地去擲地作金聲一條白練去且道雲居底是靈隱底是靈隱底是析旃檀片片皆香雲居底是碎拱璧塵塵是玉毫釐有差鳳縈金網趨霄漢以何期分文不值龍門躍鱗不墮漁人之手還有不藉功勳回途復妙底衲僧麼設有也是雲居羅漢法堂上梁顯寧義姪和尚請上堂法語僧問喚醒江畔魚龍烹煅大方麟鳳是和尚尋常作略祇如一莖草上現瓊樓玉殿明甚麼邊事師云人天喝彩佛祖解頤進云可謂魯班門下師云既截珊瑚樹還為架海梁進云點師云明甚麼邊事進云願白一槌于此地法王法令永流通師云欲賞其功姑驗其智乃云昔日靈山一會人天百萬見世尊于法座拈起一枝花今日靈山一會人天百萬見山僧于法堂上得一枝梁上梁大家著力出身白汗深明下載清風拈花大家一笑因甚傳燈續祖獨惟迦葉卓拄杖云盡從者裏出禪堂上梁上堂法語打鼓普請看好禪客前日拽木運石今朝立柱升梁遍剎海是個禪堂總諸佛為個衲子可中爾照我用我呼爾諾頭角相似肘臂相連性命相共教伊無一個不從者裏振綱肅紀去表帥人天去然後展黃龍佛手滿把楊枝庫內金剛圈栗棘蓬向雕梁畫棟上驀頭一撒五湖衲子同時下喝爭先拾得將謂有多少奇特放下手來只是饅頭佛殿天王殿同日升梁上堂法語師竪拄杖云諸人還知各各一毫頭有一座寶王金殿麼知則百萬人天匠作工徒都在汝四大色身中踐踏若不知諸人一身具八萬四千毛竅山僧亦八萬四千毛竅釋迦老子亦八萬四千毛竅于一毛端現寶王剎坐微塵裏轉大法輪莫是說了便當得麼卓拄杖一下云古佛來也世界起也時節至也棟梁枋柱知事人力畢集也那一柱不現丈六金身那一梁不具衲僧手眼那一金身一手眼不顯大檀樂施善信功勛究竟山僧兩序合院大衆無思無為無作無取而兩殿巍然干雲摩漢且道神通耶法雨耶喝云高著眼鐘樓立柱上梁上堂法語舉水潦和尚云無量妙義百千法門總向一毫頭上識得根源去靈隱道無量妙義百千法門總向一毫頭上識得作用去諸禪子若識作用徹根源今日鐘樓上梁竪柱柱柱金身孔孔法眼𢲜𢲜妙挾面面正中然雖如是因甚水潦呵呵大笑顧左右云大家出一隻手佛殿前大寶鼎成郇護法請上堂法語師竪拂子云見麼大人緣起梵王殿上投機千佛光中現相何況伊蒲為供錦繡為幡花插金瓶燈然寶炬盡華藏是個真實人體盡供養是個真實作用轉過那邊入門便棒進門便喝背手摸枕子當面露吹毛與衲僧把臂轉過者邊雲行雨施品物流行如雷如霆為照為用則父子同條那邊者邊無可不可昔日給孤布金于祇樹今日郇公鑄鼎于靈山五湖衲子忍俊不禁以須彌為果大地為盤為郇公賀良久云還會也無大家佛殿裏燒香下座大佛像成李青芝等請上堂法語僧問昔日金師補像果感傳燈今朝大佛告成得何利益師云法身開掌上進云妙手回天全憑作者功成不處又作麼生師云法眼照人間進云恁麼則大家慶讚有分師云上座也須看榜樣乃舉黃檗在裴相國府署裴一日託一尊佛於檗前跪云請師安名檗召曰裴休休應諾檗曰與汝安名竟諸子黃檗不動一旗一鎗裴公不施一韜一略和主賓于直下銷鋒鏑于人間且道在今日成得甚麼邊事高聲召曰李處士李舉首師云與汝說法竟大樹堂升梁上堂法語臨濟一株大樹蔭覆兒孫靈隱一株大樹蔭覆佛祖蔭覆兒孫為兒孫作祖蔭覆佛祖與祖佛為師喝云臨濟大師來也者老子動徹用大手腳撼動三有大城爭似靈隱並不費手腳動便撼動佛祖大城且道臨濟靈隱阿那個較親若明辨得請向大樹堂中坐第一座若明辨未得請向大樹堂前觀樹經行直得朝觀暮觀一觀觀透時如何又蔭著一個齊堂升梁上堂法語山僧年邁放閒久矣大衆真精進真建立檀護真精進真供養山僧隨例過堂未免受他檀施不隨例過堂亦未免受他檀施不如隨分納些些一任今日擎天架海業就功成山僧隨檀護大衆去也何故要且不負來機飛來峰牌樓升梁上堂法語峰既飛來玲瓏心印全彰樓當重建妙相莊嚴具足寬展處佛祖橫身挨拶處人天攘臂文殊普賢左右安排釋迦老子不敢正坐且大開門戶一句又作麼生喝云從者裏入晦山和尚進院上堂法語師在黃梅四祖徑山老和尚命繼席靈隱以丁未四月十二日進院當山護法闔郡紳士暨本寺耆宿兩序大衆請上堂拈香祝聖畢次拈云此一瓣香從苗辨地飲水知源德重邱山恩逾溟渤奉為重興靈隱現住徑山即此堂上本師上具下德老和尚用酬法乳遂斂衣就座南寺和尚白椎竟師云潑天門戶海納山容果是知音請出敲唱僧問雲從龍直得冷泉發焰風從虎會見鷲嶺增輝即今大座當軒請施一機師云一棒敲開靈鷲日普天匝地盡光輝進云一一應時擊節頭頭轉地回天是甚麼人境界師云大家在這裏進云但得皇風成一片不知何處是封疆師云且得領話問何如來擔人天輻凑振祖佛機衲子揚眉如何是紹隆一句師云青萍搖海嶽白棒驗龍蛇進云可謂光合東浙兒孫裔氣吸西江父子宗師云腳跟下一句作麼生道進云腳跟下一句且置祇如臨機有眼句裏無私增萬指稠林添三玄甲胄畢竟憑何施設師云腦後著眼進云昔年半院曾遺讖今日重將此話圓師云切莫當頭錯過問仙梵徹雲霄萬里山川增秀雨花飛滿岫大千草木生輝是何祥瑞師云拈出靈山一片石萬年何日不青青進云恁麼則冷泉勢接滹沱派青嶂遙隨雙徑來師云不妨好彩問向上宗乘學人不問入門一句試為展演師云請上階來問天得一以清地得一以寧衲僧得一時如何師云如龍得水似虎靠山進云恁麼則拍掌鼓乾坤一輪光透去也師云月落後作麼生透進云高開殿閣洪音振一句無私亘古今師云重言不當喫問高提祖印未審如何作用師云三十棒進云棒教誰喫師云不知痛癢漢進云和尚還知麼師云矢上加尖問一切言句即不問直指當陽事若何師一喝進云眼見是色耳聞是聲不見不聞是甚麼師云山僧退身有分僧一喝師拈棒僧便走師云走卻草賊乃云佛祖關棙西天令嚴向上提持誰容顧鑑要津把斷從來鐵壁無門棧道鑿開除是金鎚影動傾湫倒嶽止在針鋒跨海擎天不資餘力釋迦老子於靈山會上拈花示衆更加一道真言吾有正法眼藏涅槃妙心實相無相微妙法門一機才動東擲西拋毒氣流傳填溝塞壑既靈鷲寶峰飛來至此摩竭正令作麼生行卓拄杖云從上百四十代古錐將這個開大覺場雷驚電拂本師徑山老人亦將這個重興祖窟霧擁雲騰山僧以二十年前舊緣今日歸來就父也將這個權衡佛祖龜鑑宗乘截斷天下人舌頭進一步則乾坤陡變橫拈七事鉤錐退一步則海晏河清卸盡三玄戈甲不進不退又作麼生橫按拄杖云龍歸大海波濤壯虎到深山氣象雄復拈椎云諦觀法王法法王法如是下座圓成飛來峰牌樓江南佟方伯大護法請上堂法語僧問一笠蓋如來果感人王位今日莊嚴佛國輸金飯僧如何論量師云天垂寶蓋地湧金蓮進云靈山授說未到如此師云一朝圓好事萬古壯靈山乃云靈山秀異萬古雄觀奇特因緣花攢錦簇當門秀石從靈鷲以飛來證據無訛呼猿洞而現在此是第一重奇特廣大靈山氣吞海嶽先師老人二十餘年手拈莖草劈出天官移來華藏功高再造動地驚天此是第二重奇特留下飛來峰牌樓雖然建就未遂圓成幸江南旬宣佟大護法乘菩薩願力成就不思議大功德海又專令弟孚六大護法光賁山門肇啓華壇經開龍藏飯炊香積樂奏鈞天新題妙額重標鷲嶺飛來巨榜高懸指出現前佛國此是奇特中奇特昔世尊直指人心見性成佛且道心作麼生指現前靈峰壁立八面玲瓏豈不是正法眼藏千尺冷泉澄清徹底豈不是涅槃妙心山門飛樓湧翠藻繪浮天豈不是微妙法門於此見得直下知歸不惟佟大護法一門福慧圓滿并千百載後見聞隨喜個個成佛有分何故一手擎來真佛國萬年佳話播靈山下座送具老和尚全身入塔上堂法語戊申八月二十六日先老和尚入塔慧生上座請上堂問三文使盡塔湧靈山葉落歸根是何時節師云人天百萬仰浮圖進云古佛位中留不住分明獨露大家知師云琉璃古殿照明月乃云過量事非過量人不能開張奇特人非奇特事不能光顯臨濟七百年後老大法門誰敢拔山舉鼎全身扶起惟我老人用全象力奮鐵鶻機大行吳越應仰山遙讖作大竫子得鄧尉真傳此人是大唐國內甚麼人西晉二千年來老大靈山誰敢斬荊誅棘脫體鼎新先老人竭草載辛勤聚多人血汗以至嵬峩殿閣金碧晶鎣增武林莫大威光成四海無雙名勝此事是大唐國內甚麼事莫大功勳既在靈山葉落歸根自應在靈山建塔今日山僧及各山兄弟合院大衆就無陰陽地上竪起浮圖於呌不響谷中高懸慧日層落落影團團標出南陽面目淨裸裸光爍爍掀開大佛頂光既為天上天下獨尊之人自應建亘古亘今不朽之塔且道三千年後有人覓先師靈骨作麼生抵對竪拄杖云竪起剎竿長燦爛萬年標榜耀靈山為具老和尚上塔頂兼送位入祖堂法語一塔擎天萬古常懸慧日五燈續焰千年永耀靈山茲者窣堵告成高升塔頂靜眼觀來先老人分中著著無非是頂老人一生機靈鐵鶻用發獰龍竪四殺旌旗振三玄戈甲以致令行吳越海湧山翻五千衲子下揚州百萬人天常擁座豈不是天上天下諸善知識之頂十坐道場到處興功建業獨於靈隱一手擎出寶坊一腳踢開華藏現前崚嶒殿閣飛翬耀日鴟吻連雲豈不是獨冠海內功業之頂所居靈隱玲瓏萬竅靈鷲飛來噴雪奔雷冷泉徹骨豈不是一切名山道場之頂從來禪祖於此闡揚正令哮吼宗風自古迄今竟有百四十代現在祖堂燭排慧燈星聯道樹豈不是諸方祖堂之頂老人末後樹幢徑山卻到揚州遷化以兄弟孝心龕歸靈隱目今巍然一塔高跨北峰堅固比於金剛壯麗同於帝釋豈不是薄海內外一切浮圖之頂今日塔圓升頂兼送位入祖堂人天霧擁光騰杲日山靈喝采天樂鳴空真是以過量人顯過量事興奇特功感奇特報且道如何是大功圓滿底句嵯峨殿閣聳雲岑法道輝煌冠古今消得靈峰千嶂玉塔懸慧日照兒孫送興建亡僧靈骨及四衆遺骼入新建普同塔法語僧問轟塗毒鼓聞者皆喪為甚擊者不喪師云你試擊看進云擊個甚麼師云前言何在僧一喝師打云不知痛癢漢乃云十方同聚會個個學無為此是選佛場心空及第歸如何是心空及第洞摩醯正眼何聖何凡廓頂後神光誰幽誰顯人人在光明會集個個歸寂滅海中但得心空十方通暢臘月蓮花恰值滔天白浪龜毛數丈盡成充國黃金靈骨鏘鳴細看來總是瓊樓玉殿浮圖無縫卓竪起迥超潭北湘南一入此門悉皆成佛且道功德圓成一句又作麼生卓拄杖三下云堅固高幢三座湧萬年標榜在靈山
